<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="version" content="2026-05-03-v2">
<title>臺中榮總 — 實習學習護照 e-Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F9F6F0; --paper:#FDFBF7; --ink:#1A1612; --ink2:#3D3530; --ink3:#7A706A;
  --gold:#B8860B; --gold2:#D4A017; --red:#C0392B; --green:#27AE60; --blue:#2471A3;
  --border:#D4C9BB; --border2:#EAE2D8; --shadow:rgba(26,22,18,.08);
  --ff-serif:'Noto Serif TC',serif; --ff-sans:'Noto Sans TC',sans-serif;
  --r:6px; --r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ff-sans);background:var(--cream);color:var(--ink);min-height:100vh;font-size:14px;}

/* ─── WATERMARK TEXTURE ─── */
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(180,160,130,.06) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(180,160,130,.06) 40px);pointer-events:none;z-index:0;}

/* ─── SCREENS ─── */
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}

/* ─── LOGIN ─── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);box-shadow:0 4px 24px var(--shadow),0 0 0 1px rgba(180,160,130,.2);width:100%;max-width:460px;overflow:hidden;}
.login-header{background:var(--ink);padding:2rem;text-align:center;position:relative;}
.login-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));}
.login-header .hosp{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:8px;font-family:var(--ff-sans);}
.login-header .title{font-family:var(--ff-serif);font-size:20px;color:#fff;font-weight:600;line-height:1.4;}
.login-header .sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:6px;letter-spacing:.5px;}
.login-body{padding:2rem;}
.role-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.5rem;}
.role-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink3);background:var(--cream);transition:all .2s;border:none;border-right:1px solid var(--border);}
.role-tab:last-child{border-right:none;}
.role-tab.active{background:var(--ink);color:#fff;}
.fg{margin-bottom:1.1rem;}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.fg input,.fg select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:#fff;color:var(--ink);font-size:13px;font-family:var(--ff-sans);outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--ink);}
.login-err{font-size:12px;color:var(--red);margin-top:6px;display:none;}
.btn-primary{width:100%;padding:11px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff-sans);letter-spacing:.5px;transition:opacity .2s;margin-top:.25rem;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{width:100%;padding:10px;background:transparent;color:var(--ink3);border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;font-family:var(--ff-sans);margin-top:8px;transition:all .2s;}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink);}
.divider{display:flex;align-items:center;gap:10px;margin:1rem 0;}
.divider-line{flex:1;height:1px;background:var(--border2);}
.divider-text{font-size:11px;color:var(--ink3);}
.strength-bar{height:3px;border-radius:3px;background:var(--border2);margin-top:5px;overflow:hidden;}
.strength-fill{height:100%;border-radius:3px;transition:width .3s,background .3s;width:0;}

/* ─── MAIN APP ─── */
#app-screen{min-height:100vh;}
.topbar{background:var(--ink);color:#fff;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-family:var(--ff-serif);font-size:15px;font-weight:600;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.user-badge{font-size:11px;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:999px;color:rgba(255,255,255,.8);}
.role-chip{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:600;}
.chip-s{background:rgba(45,90,39,.8);color:#A8E6A0;}
.chip-t{background:rgba(139,32,32,.7);color:#F5C5C5;}
.chip-a{background:rgba(184,134,11,.7);color:#FFF0A0;}
.logout-btn{padding:5px 12px;background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:var(--r);color:rgba(255,255,255,.65);font-size:11px;cursor:pointer;transition:all .2s;}
.logout-btn:hover{background:rgba(255,255,255,.1);}

/* ─── BODY LAYOUT ─── */
.app-body{display:flex;min-height:calc(100vh - 54px);}
.sidebar{width:200px;background:var(--paper);border-right:1px solid var(--border);padding:1.25rem 0;flex-shrink:0;}
@media(max-width:768px){
  input[type="date"],input[type="number"]{min-width:0;width:100%;box-sizing:border-box;}

  .app-body{flex-direction:column;}
  .sidebar{display:none !important;}
  .main-content{width:100% !important;min-height:calc(100vh - 54px);}
  .form-detail-view{padding:.6rem;}
  .form-list-view{padding:.75rem;}
  .g2,.g3{grid-template-columns:1fr !important;}
  .card-body{padding:.75rem;}
  .form-grid{grid-template-columns:1fr !important;}
  .mobile-nav{display:flex !important;}
  .admin-section{padding:.75rem;}
  .admin-row{flex-wrap:wrap;}
  .rating-table th,.rating-table td{padding:4px 3px;font-size:10px;}
  .r-btn{width:22px;height:22px;font-size:9px;}
}
.mobile-nav{display:none;background:var(--paper);border-bottom:1px solid var(--border);padding:8px 12px;gap:6px;overflow-x:auto;align-items:center;position:sticky;top:54px;z-index:40;}
.mobile-nav-btn{padding:6px 12px;border:1px solid var(--border);border-radius:999px;font-size:11px;white-space:nowrap;cursor:pointer;color:var(--ink2);background:var(--cream);flex-shrink:0;transition:all .15s;}
.mobile-nav-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.mobile-menu-select{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--paper);color:var(--ink);max-width:100%;}
.sidebar-section{padding:0 1rem .5rem;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;margin-top:1rem;}
.sidebar-item{padding:8px 1.25rem;font-size:12px;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;border-left:2px solid transparent;}
.sidebar-item:hover{background:var(--cream);color:var(--ink);}
.sidebar-item.active{background:var(--cream);border-left-color:var(--gold);color:var(--ink);font-weight:500;}
.sidebar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-done{background:var(--green);}

.dot-partial{background:#5A8AAA;}
.dot-new{background:var(--border);}
.main-content{flex:1;overflow-y:auto;}

/* ─── FORM LIST (dashboard) ─── */
.form-list-view{padding:1.5rem;}
.section-header{display:flex;align-items:baseline;gap:10px;margin:1.5rem 0 .8rem;padding-bottom:6px;border-bottom:1px solid var(--border);}
.section-header:first-child{margin-top:0;}
.section-header h2{font-family:var(--ff-serif);font-size:16px;font-weight:600;color:var(--ink);}
.section-header span{font-size:11px;color:var(--ink3);}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}
.form-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);padding:1rem 1.1rem;cursor:pointer;transition:all .2s;position:relative;}
.form-card:hover{border-color:var(--gold);box-shadow:0 2px 12px var(--shadow);}
.form-card-num{font-size:10px;color:var(--ink3);margin-bottom:3px;font-weight:600;letter-spacing:.5px;}
.form-card-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.4;}
.form-card-sub{font-size:11px;color:var(--ink3);margin-top:4px;}
.form-card-meta{margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tag{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:500;}
.tag-both{background:#EEF3E8;color:var(--green);border:1px solid #C8DFC0;}
.tag-student{background:#E8F0EE;color:var(--blue);border:1px solid #BFD4D0;}
.tag-teacher{background:#F5EBE8;color:var(--red);border:1px solid #E0C8C0;}
.form-card-status{font-size:10px;color:var(--ink3);}

/* ─── FORM DETAIL ─── */
.form-detail-view{padding:1.5rem;max-width:860px;}
.form-detail-header{background:var(--ink);color:#fff;border-radius:var(--r2);padding:1.25rem 1.5rem;margin-bottom:1.25rem;position:relative;overflow:hidden;}
.form-detail-header::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));}
.form-detail-header h1{font-family:var(--ff-serif);font-size:17px;font-weight:600;}
.form-detail-header .fh-meta{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;}

/* ─── LOCK BAR ─── */
.lock-bar{background:#FFF8E8;border:1px solid #E8D080;border-radius:var(--r);padding:10px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:#7A6020;}
.lock-bar input{padding:5px 9px;border:1px solid #D4B840;border-radius:var(--r);font-size:12px;background:#fff;width:90px;color:var(--ink);}
.lock-bar .unlock-btn{padding:5px 12px;background:#7A6020;color:#fff;border:none;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;}

/* ─── CARDS ─── */
.card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:1rem;overflow:hidden;}
.card-head{background:var(--cream);border-bottom:1px solid var(--border2);padding:9px 1.1rem;display:flex;align-items:center;gap:8px;}
.card-head-title{font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.2px;}
.card-body{padding:1.1rem;}

/* ─── FIELDS ─── */
.field{margin-bottom:.9rem;}
.field:last-child{margin-bottom:0;}
.field>label{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:5px;letter-spacing:.3px;}
.field input[type=text],.field input[type=number],.field input[type=date],.field textarea,.field select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);background:#fff;color:var(--ink);font-size:13px;font-family:var(--ff-sans);outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold);}
.field input:disabled,.field textarea:disabled,.field select:disabled{background:var(--cream);color:var(--ink3);cursor:not-allowed;}
.field textarea{resize:vertical;min-height:68px;}
.t-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:999px;background:#F5EBE8;color:var(--red);border:1px solid #E8C8C0;margin-left:4px;font-weight:600;}
.s-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:999px;background:#E8F0EE;color:var(--blue);border:1px solid #C0D4D0;margin-left:4px;font-weight:600;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:560px){.g2,.g3{grid-template-columns:1fr;}}

/* ─── RATING ─── */
.rating-table{width:100%;border-collapse:collapse;font-size:12px;}
.rating-table th,.rating-table td{padding:6px 7px;border:1px solid var(--border2);vertical-align:middle;}
.rating-table th{background:var(--cream);font-size:10px;font-weight:600;color:var(--ink3);text-align:center;}
.rating-table td.row-label{font-size:12px;color:var(--ink);text-align:left;}
/* 簽名區統一樣式（select 和 date input 完全一致）*/
.sign-input{
  display:block;
  width:100%;
  max-width:100%;
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:var(--r);
  font-size:13px;
  box-sizing:border-box;
  margin:0;
  background:#fff;
  color:var(--ink);
  -webkit-appearance:none;
  appearance:none;
}
.sign-input:disabled{background:var(--cream);cursor:not-allowed;}
.sign-input[type="date"]{
  /* iOS Safari date input 特別處理 */
  -webkit-appearance:none;
  min-height:38px;
  line-height:1.4;
}
/* 手機版：簽名區強制全寬對齊 */
@media(max-width:767px){
  .sign-input,.sign-input[type="date"]{
    width:100% !important;
    max-width:100% !important;
    min-width:0 !important;
    box-sizing:border-box !important;
    font-size:16px !important;
  }
}
.r-btn{width:28px;height:28px;border-radius:4px;border:1px solid var(--border);background:#fff;font-size:10px;cursor:pointer;color:var(--ink3);transition:all .12s;}
.r-btn.sel-s{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}
.r-btn.sel-t{background:var(--red);border-color:var(--red);color:#fff;font-weight:600;}
.r-btn.sel-a{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600;}
.r-btn:disabled{cursor:not-allowed;opacity:.3;pointer-events:none;}
.r-btn:not(:disabled){cursor:pointer;}

/* ─── DOPS TABLE ─── */
.dops-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.dops-tbl th{background:#2471A3;color:#fff;border:1px solid #1A5276;padding:5px 4px;text-align:center;font-size:10px;}
.dops-tbl td{padding:5px 4px;border:1px solid var(--border2);vertical-align:middle;}
.dops-tbl .item-cell{font-size:11px;color:#1A5276;background:#EBF5FB;padding:4px 8px;border:1px solid #AED6F1;}
.d-btn{width:24px;height:24px;border-radius:4px;border:1px solid #AED6F1;background:#EBF5FB;font-size:11px;cursor:pointer;color:#1A5276;transition:all .12s;}
.d-btn:not(:disabled):hover{background:#AED6F1;color:#fff;}
.d-btn.sel{background:#2471A3;color:#fff;border-color:#1A5276;font-weight:700;}
.d-btn:disabled{cursor:not-allowed;opacity:.3;}

/* ─── EPA levels ─── */
.epa-level{display:flex;align-items:flex-start;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:6px;transition:all .2s;}
.epa-level.sel{border-color:var(--blue);background:#EBF5FB;}
.epa-level:hover:not([data-locked]){border-color:#AED6F1;background:#F0F7FF;}
.epa-level[data-locked]{cursor:not-allowed;opacity:0.6;pointer-events:none;}
.epa-lv-num{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.epa-lv-desc{font-size:12px;color:var(--ink2);}

/* ─── CHECK / RADIO ─── */
.check-group{display:flex;flex-wrap:wrap;gap:8px;}
.check-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink2);}
.check-item input{accent-color:var(--gold);}

/* ─── FORM FOOTER ─── */
.form-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:1rem 0 .5rem;flex-wrap:wrap;}
.form-footer-right{display:flex;gap:8px;align-items:center;}
.saved-msg{font-size:11px;color:var(--green);font-weight:500;display:none;}
.btn-save{padding:9px 22px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-save:hover{opacity:.85;}
.btn-pdf{padding:9px 18px;background:var(--red);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;display:none;transition:opacity .2s;}
.btn-pdf:hover{opacity:.85;}
.btn-back{padding:9px 16px;background:transparent;color:var(--ink3);border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;}

/* ─── HISTORY LOG ─── */
.history-log{margin-top:1rem;}
.history-title{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.history-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);margin-bottom:5px;background:#fff;font-size:11px;}
.history-time{color:var(--ink3);font-family:monospace;}
.history-who{padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600;}
.hw-s{background:#E8F0EE;color:var(--blue);}
.hw-t{background:#F5EBE8;color:var(--red);}
.hw-a{background:#FFF8E0;color:var(--gold);}

/* ─── ADMIN PANEL ─── */
.admin-section{padding:1.5rem;}
.admin-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:1rem;overflow:hidden;}
.admin-card-head{background:var(--ink);color:#fff;padding:10px 1.25rem;font-family:var(--ff-serif);font-size:14px;font-weight:600;}
.admin-card-body{padding:1.25rem;}
.admin-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.admin-row input{flex:1;min-width:120px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:#fff;color:var(--ink);}
.admin-row select{flex:1;min-width:120px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:#fff;color:var(--ink);}
.btn-add{padding:7px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;}
.btn-del{padding:5px 10px;background:var(--red);color:#fff;border:none;border-radius:var(--r);font-size:11px;cursor:pointer;}
.btn-update{padding:7px 14px;background:var(--gold);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;}
.accounts-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.accounts-table th{background:var(--cream);padding:6px 8px;text-align:left;border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--ink3);}
.accounts-table td{padding:6px 8px;border:1px solid var(--border2);color:var(--ink);}
.gs-status{font-size:12px;padding:6px 10px;border-radius:var(--r);margin-top:6px;}
.gs-ok{background:#EEF5E8;color:var(--green);border:1px solid #C8E0C0;}
.gs-err{background:#F5EAEA;color:var(--red);border:1px solid #E0C0C0;}
.gs-info{background:#F0F4F8;color:var(--blue);border:1px solid #C0D0E0;}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:12px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

/* ─── PDF ─── */
@media print{
  .topbar,.sidebar,.form-footer,.lock-bar,.history-log,.btn-back,.btn-save,.btn-pdf,.toast{display:none !important;}
  .app-body{display:block;}
  .form-detail-view{padding:.5rem;}
  .main-content{overflow:visible;}
}

input,select,textarea,button{-webkit-text-size-adjust:100%;}
input[type=text],input[type=date],input[type=number],input[type=password],select,textarea{font-size:16px !important;}

/* ══════════════════════════════════════════════════
   手機版響應式修正（僅在 < 768px 生效，不影響桌機）
   ══════════════════════════════════════════════════ */
@media (max-width: 767px) {

  /* 防止整體容器產生水平捲軸 */
  body, #main-content, .form-detail-body {
    max-width: 100vw;
    overflow-x: hidden;
  }

  /* 3. 簽名欄位日期 input：全寬，不超出螢幕 */
  input[type="date"] {
    width: 100% !important;
    max-width: 100% !important;
    min-width: 0 !important;
    box-sizing: border-box !important;
    font-size: 16px;
  }

  /* input / select / textarea 防溢出 */

function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  const u=APP.currentUser;
  const roleLabel={student:'學生',teacher:'臨床老師',admin:'管理員'}[APP.currentRole];
  const roleClass={student:'chip-s',teacher:'chip-t',admin:'chip-a'}[APP.currentRole];
  document.getElementById('topbar-user').textContent=u.name;
  const rc=document.getElementById('topbar-role');
  rc.textContent=roleLabel;rc.className='role-chip '+roleClass;
  const homeBtn=document.getElementById('btn-home');
  if(homeBtn) homeBtn.style.display=(APP.currentRole==='teacher'||APP.currentRole==='admin')?'inline-block':'none';
  // 登入時載入所有草稿資料到 APP.formData
  try{
    var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    Object.keys(drafts).forEach(function(fkey){
      if(!APP.formData[fkey])APP.formData[fkey]={};
      Object.assign(APP.formData[fkey],drafts[fkey]);
    });
  }catch(e){}
  // 登入後強制合併：把所有不帶學號的 key 合併到帶學號的版本
  setTimeout(function(){
    if(APP.currentUser&&APP.currentUser.sid){
      var sid=APP.currentUser.sid;
      Object.keys(APP.formData).forEach(function(k){
        // 找出不帶學號的 key（如 'F01A'）
        if(k.indexOf('_P')===-1&&k.indexOf('_'+sid)===-1){
          var fullKey=k+'_'+sid;
          if(!APP.formData[fullKey])APP.formData[fullKey]={};
          // 把短 key 的資料合併到長 key
          Object.assign(APP.formData[fullKey], APP.formData[k]);
          // 也存到 localStorage
          try{
            var drafts2=JSON.parse(localStorage.getItem('form_drafts')||'{}');
            if(!drafts2[fullKey])drafts2[fullKey]={};
            Object.assign(drafts2[fullKey],APP.formData[k]);
            localStorage.setItem('form_drafts',JSON.stringify(drafts2));
          }catch(e2){}
        }
      });
      renderSidebar(); // 更新狀態圖示
    }
  }, 100);
  renderSidebar();
  // 顯示快捷導覽列（非管理員）
  var qnav=document.getElementById('quick-nav');
  if(qnav) qnav.style.display=(APP.currentRole!=='admin')?'flex':'none';
  updateQuickNav();
  if(APP.currentRole==='admin'){renderAdmin();}
  else if(APP.currentRole==='teacher'){renderTeacherHome();}
  else{renderFormList(); setTimeout(showUnfilledNotification, 800);}
}

function hasValue(v){ return v!==undefined&&v!==''&&v!==false&&v!==null; }

function getStatus(id){
  const formKey=getFormKey(id);

  // 讀取資料：合併所有可能的 key
  const dByKey=APP.formData[formKey]||{};
  const dById=APP.formData[id]||{};
  var dFromDraft={};
  try{
    var allDrafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    Object.keys(allDrafts).forEach(function(k){
      if(k===id||k===formKey||k.startsWith(id+'_')) Object.assign(dFromDraft,allDrafts[k]);
    });
  }catch(e){}
  const d=Object.assign({},dFromDraft,dById,dByKey);

  // historyLog：找所有可能的 key
  var allLogs=[];
  var logSeen={};
  [formKey,id].forEach(function(k){
    (APP.historyLog[k]||[]).forEach(function(l){
      if(!logSeen[l.ts]){logSeen[l.ts]=true;allLogs.push(l);}
    });
  });
  try{
    var savedLogs=JSON.parse(localStorage.getItem('history_logs')||'{}');
    [formKey,id].forEach(function(k){
      (savedLogs[k]||[]).forEach(function(l){
        if(!logSeen[l.ts]){logSeen[l.ts]=true;allLogs.push(l);}
      });
    });
  }catch(e){}
  const hasRecord=allLogs.length>0;
  function hasRealVal(v){
    if(v===undefined||v===null||v===false) return false;
    return String(v).trim()!=='';
  }

  // 輔助：checkField 驗證單一必填欄位
  function checkField(k){
    var v=d[k];
    if(!hasRealVal(v)) return false;
    if(k==='s_date'){
      var sv=String(v).trim();
      if(sv.indexOf(' - ')>=0){
        var pts=sv.split(' - ');
        return pts.length===2&&pts[0].trim().length>=8&&pts[1].trim().length>=8;
      }
      return sv.length>=8;
    }
    if(k==='t_sign'||k==='s_sign'){
      var sv2=String(v).trim();
      return sv2!==''
        &&sv2!=='請選擇學生'&&sv2!=='請選擇老師'
        &&sv2!=='請選擇臨床老師'&&sv2!=='請選擇實習總指導教師'
        &&sv2!=='請選擇指導老師'&&sv2!=='請選擇主持人';
    }
    if(k==='t_sign_date'||k==='s_sign_date'){
      return String(v).trim().length>=8;
    }
    return true;
  }

  // ── 層級1：未填 ── 完全沒有實質資料
  const SKIP_KEYS=['intern_cat'];
  const hasAnyData=Object.keys(d).some(function(k){
    return SKIP_KEYS.indexOf(k)<0 && hasRealVal(d[k]);
  });
  if(!hasAnyData) return 'new';

  // ── 層級2：有資料但無儲存紀錄 → 仍視為未填
  if(!hasRecord) return 'new';

  // ── F04 床邊教學：特殊必填清單 ──
  if(id==='F04M'||id==='F04S'){
    var f04Req=['s_name','school','bed','pt_name',
      'diagnosis','medical_focus','rt_plan','t_fb','t_sign','t_sign_date','s_sign'];
    if(f04Req.every(function(k){return checkField(k);})) return 'done';
    return 'partial';
  }

  // ── F10A/F10B 輔導記錄：只看學生欄位 ──
  if(id==='F10A'||id==='F10B'){
    // F10 的日期欄位 key 是 'date'，不是 's_date'
    var f10Req=['s_name','intern_cat','date','school','t_sign'];
    var f10Ok=f10Req.every(function(k){
      if(k==='date'){return String(d[k]||'').trim().length>=8;}
      return checkField(k);
    });
    if(f10Ok) return 'done';
    return 'partial';
  }

  // ── 一般表單：REQUIRED_STUDENT_FIELDS ──
  const req=(REQUIRED_STUDENT_FIELDS[id]||[]).slice();

  // roles='both' 的表單：額外要求老師簽名（若 req 裡沒有）
  const f=findForm(id);
  if(f&&f.roles==='both'&&req.indexOf('t_sign')<0){
    req.push('t_sign');
  }

  const allFilled=req.length===0
    ? hasAnyData
    : req.every(function(k){return checkField(k);});

  if(allFilled) return 'done';
  return 'partial';
}

function getStatusSummary(){
  const statuses=FORMS.map(f=>getStatus(f.id));
  return{
    done:statuses.filter(s=>s==='done').length,
    partial:statuses.filter(s=>s==='partial').length,
    newF:statuses.filter(s=>s==='new').length,
    total:FORMS.length
  };
}

function getUnfilledForms(){
  return FORMS.filter(f=>['new','partial'].includes(getStatus(f.id)));
}

    g.ids.forEach(id=>{

      const st=getStudentFormStatus(id,sid);
      const dotC=st==='done'?'dot-done':st==='wait'?'dot-partial':st==='partial'?'dot-partial':'dot-new';
      const stLabel=st==='done'?'✅ 已完成':st==='wait'?'📝 進行中':st==='partial'?'📝 進行中':'⭕ 未填寫';
      const stColor=st==='done'?'var(--green)':st==='wait'?'var(--gold)':st==='partial'?'#5A8AAA':'var(--ink3)';
      html+=`<div class="form-card" onclick="openForm('${id}')">

        <div class="form-card-sub">${f.sub}</div>
        <div class="form-card-meta"><span class="sidebar-dot ${dotC}" style="display:inline-block;"></span><span class="form-card-status">${stLabel}</span></div>
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';
  mc.innerHTML=html;
}

function getStudentFormStatus(formId, sid){
  const key = formId+'_'+sid;
  const d = APP.formData[key]||{};
  if(Object.keys(d).length===0) return 'new';
  const f = findForm(formId);if(!f)return'new';
  const allT = f.tFields ? f.tFields.every(k=>d[k]&&String(d[k]).trim()) : true;
  if(Object.keys(d).length>0 && !allT) return 'wait';
  return 'done';
}

async function openForm(id){
  // 自動暫存目前表單（如果有未儲存的資料）
  if(APP.currentFormId && APP.currentFormId !== id && 
     !APP.currentFormId.startsWith('__')){
    autoSaveDraft(APP.currentFormId);
  }

  // 每次進入新表單，學生的老師解鎖狀態重置（防止竄改）
  if(APP.currentRole==='student'){
    if(APP._skipPinReset){
      APP._skipPinReset=false; // 用完即清除
    } else {
      APP.teacherUnlocked=false;
    }
  }

  APP.currentFormId=id;
  renderSidebar();
  const mc=document.getElementById('main-content');
  const f=findForm(id);if(!f)return;

  // 顯示載入中
  mc.innerHTML=`<div style="padding:2rem;text-align:center;color:var(--ink3);">
    <div style="font-size:24px;margin-bottom:8px;">⏳</div>
    <div style="font-size:13px;">載入表單資料中...</div>
  </div>`;

  const formKey = getFormKey(id);
  
  // 合併所有可能 key 的資料到 formKey
  function mergeAllKeys(){
    if(!APP.formData[formKey])APP.formData[formKey]={};
    // 合併所有相關 key（id, formKey, 及任何包含 id 的 key）
    var keysToMerge=[id, formKey];
    // 也找 APP.formData 裡所有以 id 開頭的 key
    Object.keys(APP.formData).forEach(function(k){
      if(k===id||k.startsWith(id+'_')||k===formKey) keysToMerge.push(k);
    });
    // 去重複
    keysToMerge=keysToMerge.filter(function(v,i,a){return a.indexOf(v)===i;});
    // 全部合併到 formKey
    keysToMerge.forEach(function(k){
      if(k!==formKey&&APP.formData[k]&&Object.keys(APP.formData[k]).length>0){
        Object.assign(APP.formData[formKey], APP.formData[k]);
      }
    });
    // 載入草稿（所有相關 key）
    try{
      var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
      keysToMerge.forEach(function(k){
        if(drafts[k]){
          Object.keys(drafts[k]).forEach(function(dk){
            if(drafts[k][dk]!==''&&drafts[k][dk]!==null&&drafts[k][dk]!==undefined){
              APP.formData[formKey][dk]=drafts[k][dk];
            }
          });
        }
      });
    }catch(e){}
    // 合併 historyLog
    if(!APP.historyLog[formKey])APP.historyLog[formKey]=[];
    keysToMerge.forEach(function(k){
      if(k!==formKey&&APP.historyLog[k]&&APP.historyLog[k].length>0){
        APP.historyLog[k].forEach(function(entry){
          var exists=APP.historyLog[formKey].some(function(e){return e.ts===entry.ts;});
          if(!exists)APP.historyLog[formKey].push(entry);
        });
        APP.historyLog[formKey].sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});
      }
    });
  }
  
  mergeAllKeys();

  const canT=APP.currentRole==='teacher'||APP.currentRole==='admin'||APP.teacherUnlocked;
  const canS=APP.currentRole==='student';
  const d=Object.assign({}, APP.formData[id]||{}, APP.formData[formKey]||{});
  APP.formData[formKey]=Object.assign({},d);

  let studentBanner='';
  if(APP.currentRole==='teacher'||APP.currentRole==='admin'){
  // 計算每位學生此表單的評核狀態
  const stuRows=Object.entries(APP.students).map(([sid,acc])=>{
    const fkey=id+'_'+sid;
    const fd=APP.formData[fkey]||{};
    const ff=findForm(id);
    const hasStudentData=Object.keys(fd).length>0;
    const hasTeacherData=ff&&ff.tFields&&ff.tFields.length>0?ff.tFields.some(k=>fd[k]&&String(fd[k]).trim()):false;
    let status='unevaluated';
    if(hasStudentData&&hasTeacherData) status='done';
    else if(hasStudentData) status='student_only';
    else if(hasTeacherData) status='teacher_only';
    return {sid,acc,status};
  });

  const stuOpts=stuRows.map(({sid,acc,status})=>{
    const mark=status==='done'?'✅ ':status==='student_only'?'📝 ':status==='teacher_only'?'✏️ ':'⭕ ';
    const label=status==='done'?'（已完成）':status==='student_only'?'（待老師評）':status==='teacher_only'?'（待學生填）':'（未填寫）';
    return `<option value="${sid}" ${APP.currentStudentId===sid?'selected':''}>${mark}${acc.name} ${label}</option>`;
  }).join('');

  const curStu=APP.currentStudentId?APP.students[APP.currentStudentId]:null;

  // 狀態統計列表
  const doneCount=stuRows.filter(r=>r.status==='done').length;
  const pendCount=stuRows.filter(r=>r.status==='student_only').length;
  const noneCount=stuRows.filter(r=>r.status==='unevaluated').length;

  // 學生狀態卡片列表
  const stuCards=stuRows.map(({sid,acc,status})=>{
    const isActive=APP.currentStudentId===sid;
    const bg=isActive?'background:var(--ink);color:#fff;':'background:#fff;color:var(--ink);';
    const dotColor=status==='done'?'#639922':status==='student_only'?'#EF9F27':status==='teacher_only'?'#1A3A5C':'#B4B2A9';
    const statusLabel=status==='done'?'已完成':status==='student_only'?'待評分':status==='teacher_only'?'待學生填':'未填寫';
    return `<div onclick="switchStudent('${sid}','${id}')" style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);cursor:pointer;${bg}border:1px solid ${isActive?'var(--ink)':'var(--border2)'};transition:all .15s;">
      <span style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;"></span>
      <span style="font-size:12px;font-weight:${isActive?'600':'400'};flex:1;">${acc.name}</span>
      <span style="font-size:10px;padding:1px 7px;border-radius:999px;background:${isActive?'rgba(255,255,255,.2)':'var(--cream)'};color:${isActive?'#fff':'var(--ink3)'};">${statusLabel}</span>
    </div>`;
  }).join('');

  studentBanner=`<div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--r2);padding:1rem;margin-bottom:1rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
      <div style="font-size:12px;font-weight:600;color:var(--ink3);">👤 選擇學生</div>
      <div style="display:flex;gap:8px;font-size:11px;">
        <span style="color:var(--green);">✅ 完成 ${doneCount}</span>
        <span style="color:var(--gold);">📝 待評 ${pendCount}</span>
        <span style="color:var(--ink3);">⭕ 未填 ${noneCount}</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;">
      ${stuCards}
    </div>
    ${!APP.currentStudentId?'<div style="font-size:11px;color:var(--red);margin-top:8px;padding:6px 8px;background:#FFF0F0;border-radius:var(--r);">⚠ 請點選上方學生姓名才能填寫表單</div>':''}
  </div>`;
  }

  let html=`<div class="form-detail-view">`;
  html+=`<div class="form-detail-header">
  <h1>${f.name}</h1>
  <div class="fh-meta">${f.sub}　｜　${f.roles==='both'?'學生＋老師填寫':f.roles==='student'?'學生填寫':'老師填寫'}</div>
  </div>`;
  html+=studentBanner;

  // Lock bar for student viewing teacher-only form
  if(f.roles==='both'&&APP.currentRole==='student'&&!APP.teacherUnlocked){
  html+=`<div class="lock-bar">🔒 老師評分欄位已鎖定。老師請輸入 PIN 碼解鎖：
    <input id="inline-pin" type="password" placeholder="PIN碼" maxlength="8">
    <button class="unlock-btn" onclick="inlineUnlock()">解鎖</button>
    <span id="inline-msg" style="font-size:11px;margin-left:4px;"></span>
  </div>`;
  }

  // Form content
  try{
    html+=buildFormBody(f,d,canT,formKey,canS);
  }catch(buildErr){
    console.error('buildFormBody error:',buildErr);
    html+='<div class="card"><div class="card-body" style="color:var(--red);">⚠ 表單載入失敗：'+buildErr.message+'</div></div>';
  }

  // Footer
  const hasSaved=APP.historyLog[formKey]&&APP.historyLog[formKey].length>0;
  html+=`<div class="form-footer">
  <button class="btn-back" onclick="renderFormList();window.scrollTo(0,0);">← 返回總覽</button>
  <div class="form-footer-right">
    <span class="saved-msg" id="saved-msg">✓ 已儲存</span>

    <button class="btn-save" onclick="saveForm('${id}')">儲存表單</button>
  </div>
  </div>`;

  // History log
  html+=buildHistoryLog(id);
  html+='</div>';
  mc.innerHTML=html;

  // 360度評估表：初始化自動計算
  if(APP.currentFormId==='F07M'||APP.currentFormId==='F07S'){
  setTimeout(function(){
    var fid2=APP.currentFormId;
    calc360Score(fid2);
    setTimeout(function(){calc360Score(fid2);},600);
    setTimeout(function(){calc360Score(fid2);},1500);
  },150);
  }

  // 回填日期區間欄位（drs_*_s / drs_*_e）
  setTimeout(function(){
    var data=APP.formData[formKey]||{};
    Object.keys(data).forEach(function(key){
      var val=data[key];
      if(!val||typeof val!=='string')return;
      if(val.indexOf(' - ')<0)return;
      var parts=val.split(' - ');
      var sv=parts[0]?parts[0].replace(/\//g,'-'):'';
      var ev=parts[1]?parts[1].replace(/\//g,'-'):'';
      var sEl=document.getElementById('drs_'+formKey+'_'+key+'_s')
           ||document.getElementById('drs_'+id+'_'+key+'_s');
      var eEl=document.getElementById('drs_'+formKey+'_'+key+'_e')
           ||document.getElementById('drs_'+id+'_'+key+'_e');
      if(sEl&&sv&&!sEl.value) sEl.value=sv;
      if(eEl&&ev&&!eEl.value) eEl.value=ev;
    });
  },50);

  // 老師登入：鎖定學生欄位（防止竄改）
  // 注意：F01A 是 student-only，老師登入不應鎖定學生評分按鈕
  if(APP.currentRole==='teacher'){
    var isStudentOnlyForm=(f&&f.roles==='student');
    if(!isStudentOnlyForm){
      mc.querySelectorAll('input[data-key],textarea[data-key],select[data-key]').forEach(function(el){
        var key=el.dataset.key||'';
        var isTField=['t_fb','t_sign','t_comment','t_good','t_improve','t_note',
          'epa_level','result','score','director_fb'].some(function(p){return key.startsWith(p);}) ||
          /^f(05|06|07|15)_/.test(key);
        if(!isTField) el.disabled=true;
      });
      mc.querySelectorAll('button[data-teacher="0"]').forEach(function(btn){
        btn.disabled=true;
        btn.style.opacity='0.35';

  if(GAS_URL && GAS_URL !== 'YOUR_GAS_URL_HERE'){
    loadFormFromSheets(formKey).then(function(){
      mergeAllKeys();
      // 若目前還在同一個表單，靜默更新 history 顯示
      if(APP.currentFormId===id){
        var hw=document.getElementById('history-wrap');
        if(hw) hw.innerHTML=buildHistoryItems(formKey);
      }
    }).catch(function(){});
  }
}

function inlineUnlock(){
  const pin=document.getElementById('inline-pin').value;
  const msg=document.getElementById('inline-msg');
  if(pin===APP.teacherPIN){
    APP.teacherUnlocked=true;
    APP._skipPinReset=true;
    msg.style.color='var(--green)';msg.textContent='解鎖成功！';
    // 直接在 DOM 解鎖老師欄位（不重新載入頁面）
    unlockTeacherFieldsInDOM();

function unlockTeacherFieldsInDOM(){
  var mc=document.getElementById('main-content');
  if(!mc)return;

  // 【直接解鎖】已知老師欄位（最可靠的方式）

      el.style.background='#fff';
      el.style.color='var(--ink)';
      el.style.cursor='';
      el.style.opacity='';
      el.style.pointerEvents='';

      ||/^f(06|07|15)_/.test(key)
      ||/^f0[67][MS]_/.test(key)

/* ═══════════ SAVE ═══════════ */
function saveForm(id){
  const formKey = getFormKey(id);
  // Collect all inputs (only editable fields for current role)
  if(!APP.formData[formKey])APP.formData[formKey]={};
  // 合併所有 key 的資料到 formKey
  if(id!==formKey && APP.formData[id]){
    Object.assign(APP.formData[formKey], APP.formData[id]);
  }
  // 也從草稿合併
  try{
    var saveDrafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    [id,formKey].forEach(function(k){
      if(saveDrafts[k]){
        Object.keys(saveDrafts[k]).forEach(function(dk){
          var dv=saveDrafts[k][dk];
          if(dv!==''&&dv!==null&&dv!==undefined)APP.formData[formKey][dk]=dv;
        });
      }
    });
  }catch(e){}
  // 收集所有可見欄位（用 id 或 formKey 都接受）
  document.querySelectorAll('[data-fid][data-key]').forEach(function(el){
    if(!el.disabled){
      var elFid=el.getAttribute('data-fid');
      if(elFid===id||elFid===formKey){
        var key=el.dataset.key||'';
        if(key.endsWith('_start')||key.endsWith('_end')) return; // 由下面統一處理
        var v=el.type==='checkbox'?el.checked:el.value;
        if(v!==''&&v!==null) APP.formData[formKey][key]=v;
      }
    }
  });
  // 明確收集日期區間欄位（drs_*_s / drs_*_e）
  document.querySelectorAll('input[id^="drs_"]').forEach(function(el){
    var elId=el.id; // e.g. drs_F04M_P145023_s_date_s
    var suffix=elId.slice(-1); // 's' or 'e'
    if(suffix!=='s') return;
    var eEl=document.getElementById(elId.slice(0,-1)+'e');
    var s=el.value, e=eEl?eEl.value:'';
    if(!s&&!e) return;
    var r=(s?s.replace(/-/g,'/'):'')+(s&&e?' - ':s||e?' - ':'')+(e?e.replace(/-/g,'/'):'');
    var elFid=el.getAttribute('data-fid');
    var dataKey=el.getAttribute('data-key'); // e.g. s_date_start
    if(!elFid||!dataKey) return;
    var baseKey=dataKey.replace('_start','');
    if(elFid===id||elFid===formKey){
      APP.formData[formKey][baseKey]=r;
    }
  });
  // 同時儲存到 localStorage 草稿
  try{
    var draftSave=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    draftSave[formKey]=Object.assign({},APP.formData[formKey]);
    localStorage.setItem('form_drafts',JSON.stringify(draftSave));
  }catch(e){}
  // Also collect ALL data stored via setRating/setDOPS/setEPA clicks (already in APP.formData[formKey])
  // These are stored directly, no need to re-collect from DOM
  // But ensure formKey data is synced
  // 合併 id key 和 formKey 的資料（解決 f01Click 存到 id 而不是 formKey 的問題）
  if(APP.formData[id] && Object.keys(APP.formData[id]).length>0){
    if(!APP.formData[formKey])APP.formData[formKey]={};
    Object.assign(APP.formData[formKey], APP.formData[id]);
  }

  // Record history - 判斷實際儲存角色
  // 若學生帳號但已解鎖老師欄位（PIN解鎖），儲存兩筆記錄（學生+老師都算完成）
  if(!APP.historyLog[formKey])APP.historyLog[formKey]=[];
  const now = new Date();
  const ts = now.toISOString();
  const effectiveRole = (APP.currentRole==='student' && APP.teacherUnlocked) ? 'both' : APP.currentRole;
  
  if(effectiveRole==='both'){
    // 學生帳號+PIN解鎖：同時記錄學生和老師儲存
    const sEntry={ts,role:'student',roleLabel:'學生',name:APP.currentUser.name};
    const tEntry={ts,role:'teacher',roleLabel:'臨床老師（PIN解鎖）',name:'PIN解鎖'};
    APP.historyLog[formKey].unshift(tEntry);
    APP.historyLog[formKey].unshift(sEntry);
  } else {
    const roleLabel={student:'學生',teacher:'臨床老師',admin:'管理員'}[APP.currentRole];
    const logEntry={ts,role:APP.currentRole,roleLabel,name:APP.currentUser.name};
    APP.historyLog[formKey].unshift(logEntry);
  }

  // Save to shared storage (GAS)
  saveFormToSheets(formKey);

  // 同時把 historyLog 存到 localStorage（確保 getStatus 能讀到）
  try{
    var savedLogs=JSON.parse(localStorage.getItem('history_logs')||'{}');
    savedLogs[formKey]=APP.historyLog[formKey]||[];
    savedLogs[id]=APP.historyLog[formKey]||[];
    localStorage.setItem('history_logs',JSON.stringify(savedLogs));
  }catch(e){}

  // Show saved
  const msg=document.getElementById('saved-msg');
  if(msg){msg.style.display='inline';setTimeout(()=>msg.style.display='none',2500);}

  // Update history display
  const histWrap=document.getElementById('history-wrap');
  if(histWrap)histWrap.innerHTML=buildHistoryItems(formKey);

  // PDF 按鈕：儲存後更新狀態但不自動下載
  const pdfBtn=document.getElementById('btn-pdf');
  if(pdfBtn&&canDownloadPDF(id)){
    pdfBtn.style.display='inline-block';
    pdfBtn.setAttribute('onclick',"checkAndDownloadPDF('"+id+"')");
  }

  // Also upload summary to sheets tab
  uploadToSheets(id);
  // 保留草稿作為備份（不清除，讓使用者隨時可以看到資料）
  // clearDraft(formKey); // 已停用清除草稿
  
  // 儲存後立即鎖回老師欄位（學生帳號一律鎖定，無論有無 PIN）
  if(APP.currentRole==='student'){
    APP.teacherUnlocked=false;
    lockTeacherFields();
    toast('表單已儲存 ✓（老師欄位已重新鎖定）');
  } else {
    toast('表單已儲存 ✓');
  }
  // 更新進度條
  renderSidebar();
  updateQuickNav();
}

/* ── 將表單資料存到 GAS（共享給所有人） ── */
async function saveFormToSheets(id){
  // id 可能是裸 formId 或 formKey，統一處理
  // saveForm 呼叫時傳的是 formKey（含學號）
  const formKey=id; // saveForm已傳formKey
  const bareId=id.split('_')[0]; // 取裸 formId
  // 合併兩個來源的資料
  const mergedData=Object.assign({},APP.formData[bareId]||{},APP.formData[formKey]||{});
  const mergedLog=(APP.historyLog[formKey]||[]).concat(APP.historyLog[bareId]||[]);
  // 去重複 log
  const logMap={};mergedLog.forEach(function(l){if(!logMap[l.ts])logMap[l.ts]=l;});
  const deduped=Object.values(logMap).sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});

  const payload = {
    action: 'saveForm',
    formId: formKey,
    data: JSON.stringify(mergedData),
    history: JSON.stringify(deduped),
    studentId: APP.currentRole==='student' ? APP.currentUser.sid : (APP.currentRole==='teacher'?APP.currentUser.card:'admin')
  };
  const configStr = JSON.stringify(payload);
  // Use iframe form submit
  try{
    const iframeId='_gas_form_'+Date.now();
    const iframe=document.createElement('iframe');
    iframe.name=iframeId;iframe.id=iframeId;iframe.style.display='none';
    document.body.appendChild(iframe);
    const form=document.createElement('form');
    form.method='POST';form.action=GAS_URL;form.target=iframeId;form.style.display='none';
    Object.entries(payload).forEach(([k,v])=>{
      const inp=document.createElement('input');
      inp.type='hidden';inp.name=k;inp.value=v;
      form.appendChild(inp);
    });
    document.body.appendChild(form);
    form.submit();
    setTimeout(()=>{
      try{document.body.removeChild(form);document.body.removeChild(iframe);}catch(e){}
    },3000);
  }catch(e){console.warn('saveFormToSheets error:',e);}
}

/* ── 從 GAS 讀取表單資料（載入時呼叫） ── */
async function loadFormFromSheets(id){
  // 使用 formKey（含學號）確保資料存到正確的 key
  const formKey=getFormKey(id);
  try{
    const controller=new AbortController();
    const tid=setTimeout(function(){controller.abort();},8000); // 增加到8秒
    const url=GAS_URL+'?action=loadForm&formId='+encodeURIComponent(formKey)+'&t='+Date.now();
    const resp=await fetch(url,{cache:'no-cache',signal:controller.signal});
    clearTimeout(tid);
    if(!resp.ok)return;
    const data=await resp.json();
    if(data.formData){
      try{
        const loaded=JSON.parse(data.formData);
        // 存到 formKey（含學號）
        if(!APP.formData[formKey])APP.formData[formKey]={};
        APP.formData[formKey]=Object.assign({},loaded,APP.formData[formKey]);
        // 同步到 id（無學號）作為備份
        if(!APP.formData[id])APP.formData[id]={};
        APP.formData[id]=Object.assign({},loaded,APP.formData[id]);
      }catch(e2){console.warn('formData parse:',e2);}
    }
    if(data.history){
      try{
        const remoteLog=JSON.parse(data.history);
        // 同時存到 formKey 和 id
        const localLog=APP.historyLog[formKey]||[];
        APP.historyLog[formKey]=localLog.length>=remoteLog.length?localLog:remoteLog;
        const localLogId=APP.historyLog[id]||[];
        APP.historyLog[id]=localLogId.length>=remoteLog.length?localLogId:remoteLog;
      }catch(e2){}
    }
  }catch(e){
    console.warn('loadFormFromSheets skipped:',formKey,e.name);
  }
  // 載入完成後重新計算分數（確保資料已就緒）
  var cid=APP.currentFormId;
  if(cid){
    setTimeout(function(){
      if(cid==='F07M'||cid==='F07S') calc360Score(getFormKey(cid));
      if(cid==='F15') calcF15Score(getFormKey(cid));
    },200);
  }
}

function buildHistoryLog(id){
  const logs=APP.historyLog[id]||[];
  if(logs.length===0)return'';
  const formKey2=getFormKey(id);
  return`<div class="history-log">
    <div class="history-title">歷次修改紀錄</div>
    <div id="history-wrap">${buildHistoryItems(formKey2)}</div>
  </div>`;
}
function buildHistoryItems(id){
  const logs=APP.historyLog[id]||[];
  if(logs.length===0)return'';
  return logs.map((l,i)=>{
    const dt=new Date(l.ts);
    const ts=`${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}:${String(dt.getSeconds()).padStart(2,'0')}`;
    const wClass={student:'hw-s',teacher:'hw-t',admin:'hw-a'}[l.role]||'hw-s';
    return`<div class="history-item"><span style="font-size:11px;color:var(--ink3);">#${logs.length-i}</span><span class="history-time">${ts}</span><span class="history-who ${wClass}">${l.roleLabel}：${l.name}</span></div>`;
  }).join('');
}

/* ═══════════ PDF DOWNLOAD ═══════════ */
function canDownloadPDF(id){
  const formKey=getFormKey(id);
  // 同時檢查 formKey 和 id 兩個可能的 key
  const logs=(APP.historyLog[formKey]||[]).concat(APP.historyLog[id]||[]);
  // 合併兩個可能的 formData
  const d=Object.assign({},APP.formData[id]||{},APP.formData[formKey]||{});

  // 條件1：有儲存記錄
  if(logs.length===0) return false;

  // 條件2：有實質資料（至少2個欄位有值）
  const filledKeys=Object.keys(d).filter(function(k){
    var v=d[k];
    return v!==undefined && v!=='' && v!==false && v!==null;
  });
  if(filledKeys.length < 2) return false;

  return true;
}

function checkAndDownloadPDF(id){
  if(!canDownloadPDF(id)){
    const f=findForm(id);
    const needsTeacher=f&&f.roles==='both';
    if(needsTeacher){
      const formKey=getFormKey(id);
      const logs=APP.historyLog[formKey]||[];
      const hasStudentSaved=logs.some(function(l){return l.role==='student';});
      const hasTeacherSaved=logs.some(function(l){return l.role==='teacher'||l.role==='admin';});
      var missing=[];
      if(!hasStudentSaved) missing.push('學生');
      if(!hasTeacherSaved) missing.push('臨床老師');
      toast('⚠ 尚未完成：'+missing.join('、')+'的資料尚未儲存，雙方都儲存後才可下載 PDF', false);
    } else {
      toast('⚠ 請先儲存表單再下載 PDF', false);
    }
    return;
  }
  downloadPDF(id);
}

    html+='<table><tr><th style="background:#1A3A5C;color:#fff;padding:5px;border:1px solid #DDD;text-align:left;">評核項目</th><th style="background:#1A3A5C;color:#fff;padding:5px;border:1px solid #DDD;width:50px;">滿分</th><th style="background:#1A3A5C;color:#fff;padding:5px;border:1px solid #DDD;width:50px;">得分</th></tr>';

    html+='</table>';
    html+='<table>'+tRow('老師評語','t_fb',true)+'</table>';
    return html;
  }

  // ─── DOPS ───
  if(id==='D01'||id==='D02'||id==='D03'||id==='D04'){
    var dopsData=DOPS_DATA[id];
    if(dopsData){
      var itemIdx=0;
      dopsData.groups.forEach(function(g){
        html+='<table><tr><th colspan="12" style="background:#1A5276;color:#fff;padding:5px;border:1px solid #DDD;text-align:left;">'+g.hd+'</th></tr>';
        html+='<tr><th style="text-align:left;border:1px solid #DDD;padding:4px;">評核項目</th>';
        [1,2,3,4,5,6,7,8,9].forEach(function(n){html+='<th style="border:1px solid #DDD;width:22px;padding:2px;font-size:8pt;">'+n+'</th>';});
        html+='<th style="border:1px solid #DDD;width:28px;font-size:8pt;">NA</th></tr>';
        g.items.forEach(function(item){
          var key='dops_'+id+'_'+itemIdx;
          var v=val(key);
          html+='<tr><td style="padding:3px 6px;border:1px solid #DDD;font-size:8pt;">'+item+'</td>';
          [1,2,3,4,5,6,7,8,9].forEach(function(n){html+='<td style="text-align:center;border:1px solid #DDD;background:'+(String(v)===String(n)?'#2471A3':'#fff')+';color:'+(String(v)===String(n)?'#fff':'transparent')+';font-size:10pt;">'+(String(v)===String(n)?'●':'')+'</td>';});
          html+='<td style="text-align:center;border:1px solid #DDD;background:'+(v==='NA'?'#E8DAEF':'#fff')+';font-size:8pt;">'+(v==='NA'?'✓':'')+'</td></tr>';
          itemIdx++;
        });
        html+='</table>';
      });
    }
    html+='<table>';
    html+=secHd('評量結果');
    html+=rRow('評量結果','result',['合格','不合格'],true);
    html+=tRow('老師回饋','t_fb',true);
    html+=tRow('學生病情複雜度自評','complexity',false);
    html+=tRow('學生心得','s_feeling',false);
    html+='</table>';
    return html;
  }

  // ─── EPA ───
  if(id==='E01'||id==='E02'||id==='E03'){
    html+='<table>';
    html+=secHd('可信賴等級');
    var lvlMap={'1':'Level 1：學習者在旁觀察','2':'Level 2：教師直接觀察','3':'Level 3：教師間接觀察','4':'Level 4：可獨立執行','5':'Level 5：可對其他人進行教學'};
    var epaLv=val('epa_level');
    html+='<tr class="t-row"><td style="padding:4px 8px;border:1px solid #DDD;font-weight:600;">可信賴等級</td><td style="padding:4px 8px;border:1px solid #DDD;font-size:12pt;font-weight:700;color:#2471A3;">'+(epaLv?lvlMap[epaLv]||('Level '+epaLv):'—')+'</td></tr>';
    html+=tRow('老師回饋','t_fb',true);
    html+='</table>';
    return html;
  }

  // ─── F15 實習課程評值 ───
  if(id==='F15'){
    var atts=['能確立個人學習目標','能主動參與所有教學活動、尋求學習機會','能遵守臨床實習規則','能適切表達意見、提出問題或尋求協助','能誠懇接受指導者之教導及建議','負責盡職'];
    var skls=['能利用適當工具執行病人評估及確立病人問題','能依病人問題擬定適當治療計劃選擇適當治療項目並評值','能擬定適當治療項目','能正確獨立執行各項治療技術','能評值治療結果作後續之建議','能正確執行呼吸監護紀錄','能正確操作及運用實習單位相關設備','能正確設定與調整呼吸器並評估病人反應','具備病人照護基本知識與技能','具備邏輯思考能力，能統整專業知識'];
    var coms=['能尊重與溝通實習單位其他醫療人員','能運用適當溝通技巧，與病人及家屬溝通','在提供治療時顧及病人安全舒適及隱私','能維持適當的專業角色'];
    function f15Section(items,prefix,title){
      var s='<table><tr><th style="background:#1A3A5C;color:#fff;padding:5px;border:1px solid #DDD;text-align:left;">'+title+'</th>';
      [5,4,3,2,1].forEach(function(n){s+='<th style="background:#1A3A5C;color:#fff;border:1px solid #DDD;width:25px;font-size:9pt;">'+n+'</th>';});
      s+='</tr>';
      var sub=0;
      items.forEach(function(item,i){
        var v=parseInt(val(prefix+'_'+i))||0;
        sub+=v;
        s+='<tr><td style="padding:3px 6px;border:1px solid #DDD;font-size:9pt;">'+(i+1)+'. '+item+'</td>';
        [5,4,3,2,1].forEach(function(n){s+='<td style="text-align:center;border:1px solid #DDD;background:'+(v===n?'#2471A3':'#fff')+';color:'+(v===n?'#fff':'#ccc')+';font-size:11pt;">'+(v===n?'●':'')+'</td>';});
        s+='</tr>';
      });
      s+='<tr style="background:#EBF5FB;"><td style="padding:4px 8px;border:1px solid #DDD;font-weight:700;">小計</td><td colspan="5" style="text-align:center;border:1px solid #DDD;font-size:13pt;font-weight:700;color:#2471A3;">'+sub+'</td></tr>';
      s+='</table>';
      return s;
    }
    html+=f15Section(atts,'f15_att','一、學習態度（滿分30分）');
    html+=f15Section(skls,'f15_skl','二、專業知識及技能（滿分50分）');
    html+=f15Section(coms,'f15_com','三、溝通、協調與專業態度（滿分20分）');
    var bonus=(val('bonus')||'').indexOf('+5')>=0?5:0;
    var f15Att=atts.reduce(function(s,_,i){return s+(parseInt(val('f15_att_'+i))||0);},0);
    var f15Skl=skls.reduce(function(s,_,i){return s+(parseInt(val('f15_skl_'+i))||0);},0);
    var f15Com=coms.reduce(function(s,_,i){return s+(parseInt(val('f15_com_'+i))||0);},0);
    var f15Tot=f15Att+f15Skl+f15Com+bonus;
    html+='<table><tr style="background:'+(f15Tot>=60?'#D5F5E3':'#FADBD8')+';"><td colspan="2" style="padding:6px 10px;border:1px solid #DDD;font-size:13pt;font-weight:700;text-align:center;">實習總分：'+f15Tot+' / 105　'+(f15Tot>=60?'✅ 及格':'❌ 未及格')+'</td></tr>';
    html+=tRow('加分項目','bonus',true)+tRow('師生檢討與回饋','t_fb',true);
    html+='</table>';
    return html;
  }

  // ─── 通用（其他表單）───
  html+='<table>';
  var allKeys=Object.keys(d).filter(function(k){
    return d[k]&&String(d[k]).trim()!==''&&d[k]!==false;
  });
  allKeys.forEach(function(k){
    var v=String(d[k]).trim();
    if(!v) return;
    var label=FIELD_LABELS[k]||k;
    var isT=['t_','host_','director_','peer_','f01_p'].some(function(p){return k.startsWith(p);});
    html+='<tr class="'+(isT?'t-row':'s-row')+'"><td style="width:38%;font-weight:600;padding:4px 8px;border:1px solid #DDD;">'+label+'</td><td style="padding:4px 8px;border:1px solid #DDD;white-space:pre-wrap;">'+v+'</td></tr>';
  });
  html+='</table>';
  return html;
}

function batchDownloadPDF(){
  var doneForms=FORMS.filter(function(f){return getStatus(f.id)==='done';});
  if(doneForms.length===0){toast('目前沒有已完成的表單');return;}

  // 收集所有已完成表單的 HTML
  var allHtml='<!DOCTYPE html><html><head><meta charset="UTF-8">';
  allHtml+='<title>臺中榮總 e-Portfolio 已完成表單</title>';
  allHtml+='<style>';
  allHtml+='@page{size:A4;margin:1.5cm;}';
  allHtml+='body{font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;font-size:10pt;color:#1A1612;margin:0;}';
  allHtml+='table{width:100%;border-collapse:collapse;margin-bottom:10px;}';
  allHtml+='td,th{border:1px solid #DDD;padding:5px 8px;font-size:10pt;}';
  allHtml+='.page-break{border-bottom:3px double #B8860B;margin-bottom:20px;padding-bottom:20px;}';
  allHtml+='.header{text-align:center;border-bottom:3px solid #B8860B;padding-bottom:10px;margin-bottom:12px;}';
  allHtml+='.hosp{font-size:9pt;color:#666;letter-spacing:1px;}';
  allHtml+='.title{font-size:15pt;font-weight:700;margin:5px 0;}';
  allHtml+='.sub{font-size:9pt;color:#888;}';
  allHtml+='.info-bar{font-size:9pt;color:#555;margin-top:5px;background:#F5F5F0;padding:4px 8px;border-radius:3px;}';
  allHtml+='.sec{background:#1A3A5C;color:#fff;font-weight:700;padding:5px 10px;margin-top:10px;}';
  allHtml+='.t-row td{background:#FFF5F5;}';
  allHtml+='.s-row td{background:#F5F9FF;}';
  allHtml+='.r-sel-s{background:#2471A3!important;color:#fff!important;font-weight:700;}';
  allHtml+='.r-sel-t{background:#C0392B!important;color:#fff!important;font-weight:700;}';
  allHtml+='.history{border-top:2px solid #DDD;margin-top:12px;padding-top:8px;font-size:9pt;color:#666;}';
  allHtml+='.history-row{padding:2px 0;border-bottom:1px dashed #EEE;}';
  allHtml+='</style></head><body>';

  var studentName='',studentId='',studentSchool='';
  if(APP.currentRole==='student'&&APP.currentUser){
    studentName=APP.currentUser.name;
    studentId=APP.currentUser.sid||'';
    studentSchool=APP.currentUser.school||'';
  } else if(APP.currentStudentId){
    var stu=APP.students[APP.currentStudentId];
    if(stu){studentName=stu.name;studentId=APP.currentStudentId;studentSchool=stu.school||'';}
  }

  doneForms.forEach(function(f,idx){
    var formKey=getFormKey(f.id);
    // 從所有來源合併資料：localStorage草稿 + APP.formData（裸id）+ APP.formData（formKey含學號）
    var dFromDraft={};
    try{
      var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
      [f.id,formKey].forEach(function(k){
        if(drafts[k]) Object.assign(dFromDraft,drafts[k]);
      });
    }catch(e2){}
    var d=Object.assign({},dFromDraft,APP.formData[f.id]||{},APP.formData[formKey]||{});
    // historyLog 也從 localStorage 補充
    var logs=[];var logSeen={};
    [formKey,f.id].forEach(function(k){
      (APP.historyLog[k]||[]).forEach(function(l){if(!logSeen[l.ts]){logSeen[l.ts]=true;logs.push(l);}});
    });
    try{
      var sLogs=JSON.parse(localStorage.getItem('history_logs')||'{}');
      [formKey,f.id].forEach(function(k){
        (sLogs[k]||[]).forEach(function(l){if(!logSeen[l.ts]){logSeen[l.ts]=true;logs.push(l);}});
      });
    }catch(e3){}
    // 去重 logs
    var logSeen={};
    var uniqueLogs=logs.filter(function(l){if(logSeen[l.ts])return false;logSeen[l.ts]=true;return true;});
    uniqueLogs.sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});

    var sName=studentName||d['s_name']||'';
    var sSchool=studentSchool||d['school']||'';
    var lastSave=uniqueLogs.length>0?new Date(uniqueLogs[0].ts).toLocaleString('zh-TW'):'';

    // 頁首
    allHtml+='<div class="'+(idx<doneForms.length-1?'page-break':'')+'">';
    allHtml+='<div class="header">';
    allHtml+='<div class="hosp">臺中榮民總醫院 胸腔部 呼吸治療科</div>';
    allHtml+='<div class="title">'+f.name+'</div>';
    allHtml+='<div class="sub">'+f.sub+'</div>';
    allHtml+='<div class="info-bar">';
    if(sName) allHtml+='學生：<b>'+sName+'</b>　';
    if(studentId) allHtml+='學號：'+studentId+'　';
    if(sSchool) allHtml+='學校：'+sSchool+'　';
    if(lastSave) allHtml+='最後儲存：'+lastSave;
    allHtml+='</div></div>';

    // 表單內容生成
    function val(key){
      var v=d[key];
      if(v===undefined||v===null||v===''||v===false) return '';
      if(Array.isArray(v)) return v.join('、');
      if(typeof v==='object') return JSON.stringify(v);
      return String(v).trim();
    }
    function chk(key,options){
      // 點選型欄位：用 ✅ 顯示已選項目
      var v=val(key);
      if(!v) return '';
      return options.map(function(o){return(o===v?'✅ ':'☐ ')+o;}).join('　');
    }
    function row(label,v,isT){
      if(!v&&v!==0) return '';
      return '<tr class="'+(isT?'t-row':'s-row')+'"><td style="width:35%;font-weight:600;vertical-align:top;">'+label+'</td><td style="white-space:pre-wrap;">'+v+'</td></tr>';
    }
    function sec(title){return '<tr><td colspan="2" class="sec">'+title+'</td></tr>';}

    allHtml+='<table>';
    // 基本資料
    allHtml+=sec('基本資料');
    allHtml+=row('學生姓名',val('s_name'),false);
    allHtml+=row('實習學校',val('school'),false);
    allHtml+=row('實習日期',val('s_date'),false);
    allHtml+=row('實習類別',val('intern_cat'),false);

    // 從 DOM 補充最新資料（如果該表單目前在頁面上開啟）
    if(APP.currentFormId===f.id||APP.currentFormId===formKey){
      document.querySelectorAll('[data-fid][data-key]').forEach(function(el){
        var elFid=el.getAttribute('data-fid');
        var key=el.getAttribute('data-key')||'';
        if(key.endsWith('_start')||key.endsWith('_end')) return;
        if(elFid===f.id||elFid===formKey){
          var v=el.type==='checkbox'?el.checked:el.value;
          if(v!==''&&v!==null&&v!==false) d[key]=v;
        }
      });
      // 日期區間
      document.querySelectorAll('input[id^="drs_"]').forEach(function(el){
        var sid=el.id;var suffix=sid.slice(-1);
        if(suffix!=='s') return;
        var eEl=document.getElementById(sid.slice(0,-1)+'e');
        var s=el.value,e=eEl?eEl.value:'';
        if(!s&&!e) return;
        var r=(s?s.replace(/-/g,'/'):'')+(s&&e?' - ':'')+(e?e.replace(/-/g,'/'):'');
        var elFid=el.getAttribute('data-fid');
        var dk=el.getAttribute('data-key');
        if(!elFid||!dk) return;
        var baseKey=dk.replace('_start','');
        if(elFid===f.id||elFid===formKey) d[baseKey]=r;
      });
    }
    // 各表單特定欄位（帶入所有欄位+評分）
    allHtml+=buildPDFContent(f.id,f,d,val,row,sec,sName,sSchool,chk);
    allHtml+='</table>';

    // 簽名區
    allHtml+='<table><tr class="sec"><td colspan="4" class="sec">簽名區</td></tr>';
    allHtml+='<tr>';
    allHtml+='<td style="width:25%;font-weight:600;">學生簽名</td><td>'+(val('s_sign')||'—')+'</td>';
    allHtml+='<td style="width:25%;font-weight:600;">學生簽名日期</td><td>'+(val('s_sign_date')||'—')+'</td>';
    allHtml+='</tr><tr class="t-row">';
    allHtml+='<td style="font-weight:600;">老師/指導老師簽名</td><td>'+(val('t_sign')||'—')+'</td>';
    allHtml+='<td style="font-weight:600;">老師簽名日期</td><td>'+(val('t_sign_date')||'—')+'</td>';
    allHtml+='</tr></table>';

    // 填寫歷史紀錄
    if(uniqueLogs.length>0){
      allHtml+='<div class="history">';
      allHtml+='<b>填寫歷史紀錄</b>（共'+uniqueLogs.length+'筆）<br>';
      uniqueLogs.forEach(function(l,i){
        var ts=new Date(l.ts).toLocaleString('zh-TW');
        allHtml+='<div class="history-row">#'+(uniqueLogs.length-i)+'&nbsp;&nbsp;'+ts+'&nbsp;&nbsp;'+l.roleLabel+'：'+l.name+'</div>';
      });
      allHtml+='</div>';
    }
    allHtml+='</div>'; // end page-break div
  });

  allHtml+='</body></html>';

  // 直接用 Blob + <a> 下載 HTML 檔案（不需彈出視窗）
  var blob=new Blob([allHtml],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  var now=new Date();
  var ts=now.getFullYear()+''+String(now.getMonth()+1).padStart(2,'0')+String(now.getDate()).padStart(2,'0');
  var sn=studentName||'學生';
  a.download='臺中榮總_ePortfolio_'+sn+'_已完成表單_'+ts+'.html';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  toast('✅ 已下載！請用瀏覽器開啟該檔案，再按 Ctrl+P 選「另存為PDF」');
}

function renderStatusSection(filterStatus){
  APP.currentFormId='__status_'+filterStatus;
  renderSidebar();
  const mc=document.getElementById('main-content');
  const labelMap={done:'✅ 已完成',partial:'📝 進行中',new:'⭕ 未填寫'};
  const colorMap={done:'var(--green)',wait:'var(--gold)',partial:'#5A8AAA',new:'var(--red)'};
  const filtered=FORMS.filter(function(f){return getStatus(f.id)===filterStatus;});
  let html='<div class="form-list-view">';
  var batchBtn=filterStatus==='done'
    ?`<button onclick="batchDownloadPDF()" style="padding:6px 16px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:12px;cursor:pointer;font-weight:600;">⬇ 下載此分類所有 PDF</button>`
    :'';
  html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;">
    <button onclick="renderFormList()" style="padding:6px 14px;background:none;border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--ink3);">← 返回總覽</button>
    <div style="font-family:var(--ff-serif);font-size:18px;font-weight:600;">${labelMap[filterStatus]}</div>
    <span style="background:${colorMap[filterStatus]};color:#fff;padding:2px 10px;border-radius:999px;font-size:13px;font-weight:600;">${filtered.length} 份</span>
    ${batchBtn}
  </div>`;
  if(filtered.length===0){
    html+=`<div style="text-align:center;padding:3rem;color:var(--ink3);">此分類目前沒有表單</div>`;
  } else {
    html+='<div class="form-grid">';
    filtered.forEach(function(f){
      const st=getStatus(f.id);
      const dotC=st==='done'?'dot-done':st==='wait'?'dot-partial':st==='partial'?'dot-partial':'dot-new';
      const stLabel=st==='done'?'✅ 已完成':st==='wait'?'📝 進行中':st==='partial'?'📝 進行中':'⭕ 未填寫';
      const stColor=st==='done'?'var(--green)':st==='wait'?'var(--gold)':st==='partial'?'#5A8AAA':'var(--ink3)';
      html+=`<div class="form-card" onclick="openForm('${f.id}')">
        <div class="form-card-name" style="margin-top:4px;">${f.name}</div>
        <div class="form-card-sub">${f.sub}</div>
        <div class="form-card-meta"><span style="font-size:11px;color:${stColor};font-weight:500;">${stLabel}</span></div>
      </div>`;
    });
    html+='</div>';
  }
  html+='</div>';
  mc.innerHTML=html;
}

window.debugStatus=function(id){
  var formKey=getFormKey(id);
  var dById=APP.formData[id]||{};
  var dByKey=APP.formData[formKey]||{};
  var dFromDraft={};
  try{
    var allDrafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    Object.keys(allDrafts).forEach(function(k){
      if(k===id||k===formKey||k.startsWith(id+'_')) Object.assign(dFromDraft,allDrafts[k]);
    });
  }catch(e){}
  var d=Object.assign({},dFromDraft,dById,dByKey);

  var allLogs=[];var logSeen={};
  [formKey,id].forEach(function(k){(APP.historyLog[k]||[]).forEach(function(l){if(!logSeen[l.ts]){logSeen[l.ts]=true;allLogs.push(l);}});});
  try{var sl=JSON.parse(localStorage.getItem('history_logs')||'{}');[formKey,id].forEach(function(k){(sl[k]||[]).forEach(function(l){if(!logSeen[l.ts]){logSeen[l.ts]=true;allLogs.push(l);}});});}catch(e){}

  var req=(REQUIRED_STUDENT_FIELDS[id]||[]).slice();
  var f=findForm(id);
  if(f&&f.roles==='both'&&req.indexOf('t_sign')<0) req.push('t_sign');
  if(id==='F04M'||id==='F04S') req=['s_name','school','s_date','bed','pt_name','diagnosis','medical_focus','rt_plan','t_fb','t_sign','s_sign'];
  if(id==='F10A'||id==='F10B') req=['s_name','school'];

  function hasRealVal(v){if(v===undefined||v===null||v===false)return false;return String(v).trim()!=='';}
  function checkField(k){
    var v=d[k];if(!hasRealVal(v))return false;
    if(k==='s_date'){var sv=String(v).trim();if(sv.indexOf(' - ')>=0){var pts=sv.split(' - ');return pts.length===2&&pts[0].trim().length>=8&&pts[1].trim().length>=8;}return sv.length>=8;}
    if(k==='t_sign'||k==='s_sign'){var sv2=String(v).trim();return sv2!==''&&sv2!=='請選擇學生'&&sv2!=='請選擇老師'&&sv2!=='請選擇臨床老師'&&sv2!=='請選擇實習總指導教師'&&sv2!=='請選擇指導老師';}
    if(k==='t_sign_date'||k==='s_sign_date')return String(v).trim().length>=8;
    return true;
  }

  console.group('🔍 診斷：'+id+' | formKey='+formKey);
  console.log('📁 APP.formData[id]:', JSON.stringify(dById));
  console.log('📁 APP.formData[formKey]:', JSON.stringify(dByKey));
  console.log('📁 localStorage draft:', JSON.stringify(dFromDraft));
  console.log('📝 historyLog 合計:', allLogs.length,'筆');
  if(allLogs.length>0) console.log('   最新:', allLogs[0].role, allLogs[0].ts);
  console.log('');
  console.log('必填欄位 ('+req.length+'個):');
  req.forEach(function(k){
    var ok=checkField(k);
    console.log(' '+(ok?'✅':'❌')+' ['+k+'] =',JSON.stringify(d[k]));
  });
  var allOk=req.every(function(k){return checkField(k);});
  console.log('');
  console.log('→ 必填全滿:',allOk,'| 有記錄:',allLogs.length>0);
  console.log('→ getStatus:',getStatus(id));
  console.groupEnd();
};

};
