<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="version" content="2026-05-05-v17-f16-learning-style">
<title>臺中榮總 — 實習學習護照 e-Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* ─── 配色系統 v2 ─── 現代醫療專業風 ─── */
  /* 中性色（主背景與文字）*/
  --bg:           #F4F6FA;       /* 主背景：清爽灰藍 */
  --bg-soft:      #EAEEF5;       /* 次背景 */
  --paper:        #FFFFFF;       /* 卡片底色：純白 */
  --ink:          #1A2332;       /* 主要文字：深藍黑 */
  --ink2:         #3D4A5C;       /* 次要文字 */
  --ink3:         #6B7689;       /* 輔助文字 */
  --ink4:         #9CA5B5;       /* 提示文字 */

  /* 主色：專業深藍（醫療信任感）*/
  --primary:      #2563EB;       /* 主色 */
  --primary2:     #1E40AF;       /* 主色深 */
  --primary-soft: #DBEAFE;       /* 主色淡底 */
  --primary-line: #BFDBFE;       /* 主色淡邊 */

  /* 強調色（金色保留作為高貴點綴，但更柔和）*/
  --gold:         #C28A2C;
  --gold2:        #E0A943;
  --gold-soft:    #FBF3E2;

  /* 狀態色 */
  --red:          #DC2626;       /* 警告/老師 */
  --red-soft:     #FEE2E2;
  --red-line:     #FCA5A5;
  --green:        #059669;       /* 成功/已完成 */
  --green-soft:   #D1FAE5;
  --green-line:   #A7F3D0;
  --blue:         #2563EB;       /* 藍 = 學生（同 primary 系）*/
  --blue-soft:    #DBEAFE;
  --blue-line:    #BFDBFE;

  /* 邊線與陰影 */
  --border:       #D1D9E6;       /* 主邊線 */
  --border2:      #E5EAF1;       /* 次邊線 */
  --shadow-sm:    0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.06);
  --shadow:       0 2px 4px rgba(15,23,42,.06), 0 4px 12px rgba(15,23,42,.08);
  --shadow-lg:    0 4px 8px rgba(15,23,42,.08), 0 12px 24px rgba(15,23,42,.10);

  /* 向下相容（舊變數仍指向新色）*/
  --cream:        var(--bg);
  --border-old:   var(--border);

  /* 字型與圓角 */
  --ff-serif:'Noto Serif TC',serif;
  --ff-sans:'Noto Sans TC',sans-serif;
  --r:    8px;     /* 一般圓角（從 6 增至 8）*/
  --r2:   12px;    /* 大圓角（從 10 增至 12）*/
  --r-sm: 4px;    /* 小圓角 */
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ff-sans);background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}

/* ─── WATERMARK TEXTURE ─── 改為極淡的點狀紋理 ─── */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px, rgba(37,99,235,.04) 1px, transparent 0);background-size:24px 24px;pointer-events:none;z-index:0;}

/* ─── SCREENS ─── */
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}

/* ─── LOGIN ─── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:linear-gradient(135deg,#EEF3FB 0%,#F8FAFE 50%,#EEF3FB 100%);}
.login-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);box-shadow:var(--shadow-lg);width:100%;max-width:460px;overflow:hidden;}
.login-header{background:linear-gradient(135deg,#1E40AF 0%,#2563EB 100%);padding:2rem;text-align:center;position:relative;}
.login-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));}
.login-header .hosp{font-size:11px;color:rgba(255,255,255,.65);letter-spacing:1.5px;margin-bottom:8px;font-family:var(--ff-sans);font-weight:500;}
.login-header .title{font-family:var(--ff-serif);font-size:20px;color:#fff;font-weight:600;line-height:1.4;text-shadow:0 1px 2px rgba(0,0,0,.1);}
.login-header .sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:6px;letter-spacing:.5px;}
.login-body{padding:2rem;}
.role-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.5rem;background:var(--bg-soft);}
.role-tab{flex:1;padding:11px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink3);background:transparent;transition:all .2s;border:none;border-right:1px solid var(--border);}
.role-tab:last-child{border-right:none;}
.role-tab.active{background:var(--primary);color:#fff;font-weight:600;box-shadow:inset 0 -2px 0 var(--gold);}
.fg{margin-bottom:1.1rem;}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.fg input,.fg select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);background:#fff;color:var(--ink);font-size:13px;font-family:var(--ff-sans);outline:none;transition:all .2s;}
.fg input:focus,.fg select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
.login-err{font-size:12px;color:var(--red);margin-top:6px;display:none;background:var(--red-soft);padding:6px 10px;border-radius:var(--r);border:1px solid var(--red-line);}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,var(--primary) 0%,var(--primary2) 100%);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff-sans);letter-spacing:.5px;transition:all .2s;margin-top:.25rem;box-shadow:var(--shadow-sm);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.btn-primary:active{transform:translateY(0);}
.btn-ghost{width:100%;padding:10px;background:transparent;color:var(--ink3);border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;font-family:var(--ff-sans);margin-top:8px;transition:all .2s;}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-soft);}
.divider{display:flex;align-items:center;gap:10px;margin:1rem 0;}
.divider-line{flex:1;height:1px;background:var(--border2);}
.divider-text{font-size:11px;color:var(--ink3);}
.strength-bar{height:3px;border-radius:3px;background:var(--border2);margin-top:5px;overflow:hidden;}
.strength-fill{height:100%;border-radius:3px;transition:width .3s,background .3s;width:0;}
.pwd-wrap{position:relative;}
.pwd-wrap input{padding-right:38px !important;}
.pwd-eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;padding:4px 8px;color:var(--ink3);user-select:none;line-height:1;border-radius:4px;transition:background .15s;}
.pwd-eye:hover{color:var(--primary);background:var(--primary-soft);}

/* ─── MAIN APP ─── */
#app-screen{min-height:100vh;}
.topbar{background:linear-gradient(135deg,#1E40AF 0%,#2563EB 100%);color:#fff;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(15,23,42,.15);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-family:var(--ff-serif);font-size:15px;font-weight:600;letter-spacing:.3px;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.user-badge{font-size:11px;background:rgba(255,255,255,.18);padding:5px 12px;border-radius:999px;color:#fff;font-weight:500;backdrop-filter:blur(8px);}
.role-chip{font-size:10px;padding:3px 9px;border-radius:999px;font-weight:600;letter-spacing:.3px;}
.chip-s{background:rgba(255,255,255,.95);color:var(--green);}
.chip-t{background:rgba(255,255,255,.95);color:var(--red);}
.chip-a{background:rgba(255,255,255,.95);color:var(--gold);}
.logout-btn{padding:6px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:var(--r);color:#fff;font-size:11px;cursor:pointer;transition:all .15s;font-weight:500;}
.logout-btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4);}

/* ─── BODY LAYOUT ─── */
.app-body{display:flex;min-height:calc(100vh - 56px);}
.sidebar{width:220px;background:var(--paper);border-right:1px solid var(--border);padding:1.25rem 0;flex-shrink:0;box-shadow:1px 0 3px rgba(15,23,42,.03);}
@media(max-width:768px){
  input[type="date"],input[type="number"]{min-width:0;width:100%;box-sizing:border-box;}

  .app-body{flex-direction:column;}
  .sidebar{display:none !important;}
  .main-content{width:100% !important;min-height:calc(100vh - 56px);}
  .form-detail-view{padding:.6rem;}
  .form-list-view{padding:.75rem;}
  .g2,.g3{grid-template-columns:1fr !important;}
  .card-body{padding:.75rem;}
  .form-grid{grid-template-columns:1fr !important;}
  .mobile-nav{display:flex !important;}
  .admin-section{padding:.75rem;}
  .admin-row{flex-wrap:wrap;}
  .rating-table th,.rating-table td{padding:4px 3px;font-size:10px;}
  .r-btn{width:24px;height:24px;font-size:9px;}
}
.mobile-nav{display:none;background:var(--paper);border-bottom:1px solid var(--border);padding:10px 12px;gap:6px;overflow-x:auto;align-items:center;position:sticky;top:56px;z-index:40;box-shadow:0 1px 3px rgba(15,23,42,.04);}
.mobile-nav-btn{padding:7px 14px;border:1px solid var(--border);border-radius:999px;font-size:11px;white-space:nowrap;cursor:pointer;color:var(--ink2);background:#fff;flex-shrink:0;transition:all .15s;font-weight:500;}
.mobile-nav-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 6px rgba(37,99,235,.25);}
.mobile-menu-select{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--paper);color:var(--ink);max-width:100%;}
.sidebar-section{padding:0 1rem .5rem;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:1.2px;text-transform:uppercase;margin-top:1rem;}
.sidebar-item{padding:9px 1.25rem;font-size:12px;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;border-left:3px solid transparent;}
.sidebar-item:hover{background:var(--bg-soft);color:var(--ink);}
.sidebar-item.active{background:var(--primary-soft);border-left-color:var(--primary);color:var(--primary2);font-weight:600;}
.sidebar-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.7);}
.dot-done{background:var(--green);}

.dot-partial{background:#F59E0B;}
.dot-draft{background:#0EA5E9;animation:draftPulse 2s ease-in-out infinite;}
.dot-new{background:var(--ink4);}
@keyframes draftPulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.main-content{flex:1;overflow-y:auto;}

/* ─── FORM LIST (dashboard) ─── */
.form-list-view{padding:1.5rem;}
.section-header{display:flex;align-items:baseline;gap:10px;margin:1.5rem 0 1rem;padding:0 0 8px 0;border-bottom:2px solid var(--border2);}
.section-header:first-child{margin-top:0;}
.section-header h2{font-family:var(--ff-serif);font-size:17px;font-weight:600;color:var(--ink);}
.section-header span{font-size:11px;color:var(--ink3);background:var(--bg-soft);padding:3px 9px;border-radius:999px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.form-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);padding:1rem 1.15rem;cursor:pointer;transition:all .2s;position:relative;box-shadow:var(--shadow-sm);}
.form-card:hover{border-color:var(--primary);box-shadow:var(--shadow);transform:translateY(-2px);}
.form-card-num{font-size:10px;color:var(--primary2);margin-bottom:4px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.form-card-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.5;}
.form-card-sub{font-size:11px;color:var(--ink3);margin-top:5px;line-height:1.4;}
.form-card-meta{margin-top:10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tag{font-size:10px;padding:3px 8px;border-radius:999px;font-weight:600;letter-spacing:.2px;}
.tag-both{background:var(--green-soft);color:var(--green);border:1px solid var(--green-line);}
.tag-student{background:var(--blue-soft);color:var(--blue);border:1px solid var(--blue-line);}
.tag-teacher{background:var(--red-soft);color:var(--red);border:1px solid var(--red-line);}
.form-card-status{font-size:10px;color:var(--ink3);}

/* ─── FORM DETAIL ─── */
.form-detail-view{padding:1.5rem;max-width:900px;}
.form-detail-header{background:linear-gradient(135deg,#1E40AF 0%,#2563EB 100%);color:#fff;border-radius:var(--r2);padding:1.4rem 1.5rem;margin-bottom:1.25rem;position:relative;overflow:hidden;box-shadow:var(--shadow);}
.form-detail-header::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));}
.form-detail-header::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none;}
.form-detail-header h1{font-family:var(--ff-serif);font-size:18px;font-weight:600;letter-spacing:.3px;}
.form-detail-header .fh-meta{font-size:11px;color:rgba(255,255,255,.75);margin-top:5px;letter-spacing:.3px;}

/* ─── LOCK BAR ─── 改成警告色明亮樣式 ─── */
.lock-bar{background:linear-gradient(90deg,#FEF3C7 0%,#FDE68A 100%);border:1px solid #F59E0B;border-radius:var(--r);padding:11px 16px;margin-bottom:1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px;color:#78350F;font-weight:500;box-shadow:0 1px 3px rgba(245,158,11,.15);}
.lock-bar input{padding:6px 10px;border:1px solid #D97706;border-radius:var(--r);font-size:12px;background:#fff;width:100px;color:var(--ink);outline:none;transition:all .15s;}
.lock-bar input:focus{box-shadow:0 0 0 2px rgba(217,119,6,.25);border-color:#B45309;}
.lock-bar .unlock-btn{padding:6px 14px;background:#92400E;color:#fff;border:none;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.3px;}
.lock-bar .unlock-btn:hover{background:#78350F;transform:translateY(-1px);}

/* ─── CARDS ─── */
.card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:1.1rem;overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .2s;}
.card:hover{box-shadow:var(--shadow);}
.card-head{background:linear-gradient(180deg,#F8FAFC 0%,#F1F5F9 100%);border-bottom:1px solid var(--border2);padding:11px 1.2rem;display:flex;align-items:center;gap:8px;}
.card-head-title{font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.2px;}
.card-body{padding:1.2rem;}

/* ─── 統一配色標準 ───
   學生區（藍）：邊框 #93C5FD、底色 #F0F7FF、標題列漸層 #3B82F6→#1D4ED8（白字）
   老師區（紅）：邊框 #FCA5A5、底色 #FFF5F5、標題列漸層 #DC2626→#991B1B（白字）
   這個色組是全站基準，所有「學生／老師」區塊都遵循，避免深淺不一。 */

/* 學生卡片 */
.card.s-card{background:#F0F7FF;border:2px solid #93C5FD;}
.card.s-card .card-head{background:linear-gradient(135deg,#3B82F6 0%,#1D4ED8 100%);border-bottom:none;}
.card.s-card .card-head-title{color:#fff;}

/* 老師卡片（手動加 class） */
.card.t-card{background:#FFF5F5;border:2px solid #FCA5A5;}
.card.t-card .card-head{background:linear-gradient(135deg,#DC2626 0%,#991B1B 100%);border-bottom:none;}
.card.t-card .card-head-title{color:#fff;}

/* 混合卡片（共同填寫） */
.card.m-card{background:linear-gradient(180deg,#F0F7FF 0%,#FFF5F5 100%);}
.card.m-card .card-head{background:linear-gradient(90deg,#DBEAFE 0%,#FEE2E2 100%);}
.card.m-card .card-head-title{color:#1F2937;}

/* ─── 自動套用「老師」配色：所有 card-head 內含 t-badge 的卡片，自動視為老師卡片 ───
   不論 build 函式是否手動加上 .t-card class，只要標題列寫了 <span class="t-badge">老師</span>
   就會自動上紅色配色。這樣未來新增的卡片不需特別處理。 */
.card:not(.s-card):not(.m-card):has(.card-head .t-badge){
  background:#FFF5F5;
  border:2px solid #FCA5A5;
}
.card:not(.s-card):not(.m-card):has(.card-head .t-badge) > .card-head{
  background:linear-gradient(135deg,#DC2626 0%,#991B1B 100%);
  border-bottom:none;
}
.card:not(.s-card):not(.m-card):has(.card-head .t-badge) > .card-head .card-head-title{
  color:#fff;
}
/* 在白色標題列中，t-badge 應該變成半透明白色才看得見 */
.card.t-card .t-badge,
.card:not(.s-card):not(.m-card):has(.card-head .t-badge) > .card-head .t-badge{
  background:rgba(255,255,255,.25);
  color:#fff;
  border-color:rgba(255,255,255,.4);
}

/* 混合卡片內的學生／老師子區塊 */
.s-block{background:#F0F7FF;border:1px solid #93C5FD;border-radius:var(--r);padding:12px 14px;margin:10px 0;}
.s-block-title{font-size:12px;font-weight:700;color:#1E40AF;margin-bottom:8px;letter-spacing:.2px;}
.t-block{background:#FFF5F5;border:1px solid #FCA5A5;border-radius:var(--r);padding:12px 14px;margin:10px 0;}
.t-block-title{font-size:12px;font-weight:700;color:#991B1B;margin-bottom:8px;letter-spacing:.2px;}

/* ─── FIELDS ─── */
.field{margin-bottom:.95rem;}
.field:last-child{margin-bottom:0;}
.field>label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px;letter-spacing:.2px;}
.field input[type=text],.field input[type=number],.field input[type=date],.field textarea,.field select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:#fff;color:var(--ink);font-size:13px;font-family:var(--ff-sans);outline:none;transition:all .15s;box-shadow:inset 0 1px 2px rgba(15,23,42,.02);}
.field input:hover,.field textarea:hover,.field select:hover{border-color:#9CA5B5;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
.field input:disabled,.field textarea:disabled,.field select:disabled{background:var(--bg-soft);color:var(--ink3);cursor:not-allowed;border-color:var(--border2);}
.field textarea{resize:vertical;min-height:72px;line-height:1.6;}
.t-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;background:var(--red-soft);color:var(--red);border:1px solid var(--red-line);margin-left:6px;font-weight:600;letter-spacing:.2px;}
.s-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;background:var(--blue-soft);color:var(--blue);border:1px solid var(--blue-line);margin-left:6px;font-weight:600;letter-spacing:.2px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:560px){.g2,.g3{grid-template-columns:1fr;}}

/* ─── RATING ─── */
.rating-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;}
.rating-table th,.rating-table td{padding:8px 8px;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);vertical-align:middle;}
.rating-table th:last-child,.rating-table td:last-child{border-right:none;}
.rating-table tr:last-child td{border-bottom:none;}
.rating-table th{background:linear-gradient(180deg,#F8FAFC 0%,#F1F5F9 100%);font-size:11px;font-weight:700;color:var(--ink2);text-align:center;letter-spacing:.2px;}
.rating-table td.row-label{font-size:12px;color:var(--ink);text-align:left;background:#FCFCFD;}

/* Sticky first column for scrollable tables */
.sticky-col{position:sticky;left:0;z-index:1;background:#FCFCFD;}
.sticky-head{position:sticky;left:0;z-index:2;background:#F8FAFC;}
.r-btn{width:30px;height:30px;border-radius:6px;border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:500;cursor:pointer;color:var(--ink3);transition:all .15s;}

.r-btn.sel-s{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700;box-shadow:0 2px 4px rgba(37,99,235,.25);}
.r-btn.sel-t{background:var(--red);border-color:var(--red);color:#fff;font-weight:700;box-shadow:0 2px 4px rgba(220,38,38,.25);}
.r-btn.sel-a{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:700;box-shadow:0 2px 4px rgba(194,138,44,.25);}

/* ─── DOPS TABLE ─── */
.dops-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:11px;border:1px solid #1E40AF;border-radius:var(--r);overflow:hidden;}
.dops-tbl th{background:linear-gradient(180deg,#2563EB 0%,#1E40AF 100%);color:#fff;border-right:1px solid #1E3A8A;padding:7px 5px;text-align:center;font-size:10px;font-weight:600;letter-spacing:.2px;}
.dops-tbl th:last-child{border-right:none;}
.dops-tbl td{padding:6px 5px;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);vertical-align:middle;background:#fff;}
.dops-tbl td:last-child{border-right:none;}
.dops-tbl tr:last-child td{border-bottom:none;}
.dops-tbl .item-cell{font-size:11px;color:var(--primary2);background:linear-gradient(90deg,#EFF6FF 0%,#DBEAFE 100%);padding:6px 10px;font-weight:500;}
.d-btn{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--blue-line);background:var(--blue-soft);font-size:12px;cursor:pointer;color:var(--primary2);transition:all .15s;font-weight:600;}
.d-btn:not(:disabled):hover{background:var(--primary);color:#fff;border-color:var(--primary);transform:translateY(-1px);}
.d-btn.sel{background:var(--primary);color:#fff;border-color:var(--primary2);font-weight:700;box-shadow:0 2px 4px rgba(37,99,235,.3);}

/* ─── EPA levels ─── */
.epa-level{display:flex;align-items:flex-start;gap:12px;padding:14px;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:8px;transition:all .2s;background:#fff;}
.epa-level.sel{border-color:var(--primary);background:linear-gradient(135deg,var(--primary-soft) 0%,#EFF6FF 100%);box-shadow:0 2px 8px rgba(37,99,235,.12);}
.epa-level:hover:not([data-locked]):not(.sel){border-color:var(--primary-line);background:#F8FAFE;transform:translateX(2px);}
.epa-level[data-locked]{cursor:not-allowed;opacity:0.6;pointer-events:none;background:var(--bg-soft);}
.epa-lv-num{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--ink) 0%,var(--ink2) 100%);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow-sm);}
.epa-lv-desc{font-size:12px;color:var(--ink2);}

/* ─── CHECK / RADIO ─── */
.check-group{display:flex;flex-wrap:wrap;gap:10px;}
.check-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink2);padding:6px 10px;border-radius:var(--r);transition:background .15s;cursor:pointer;}
.check-item:hover{background:var(--bg-soft);}
.check-item input{accent-color:var(--primary);width:15px;height:15px;cursor:pointer;}

/* ─── FONT-SIZE NORMALIZATION ───
   全表單區字體統一規範，覆蓋所有 inline font-size 樣式
   - Labels（欄位標籤）       : 12px
   - Inputs/Textareas/Selects : 13px
   - Body text / 輔助文字     : 12px
   - 說明文字 / hint          : 11px
   - 表格內容                  : 12px
   - 評分按鈕（r-btn）        : 12px
   - 卡片標題                  : 13px
*/
.form-detail-view .field > label{font-size:12px !important;}
.form-detail-view .field input[type=text],
.form-detail-view .field input[type=number],
.form-detail-view .field input[type=date],
.form-detail-view .field textarea,
.form-detail-view .field select{font-size:13px !important;}
.form-detail-view .card-head-title{font-size:13px !important;}
.form-detail-view .check-item{font-size:12px !important;}
.form-detail-view .check-item input{flex-shrink:0;}
/* 表格內容統一 */
.form-detail-view .rating-table th,
.form-detail-view .rating-table td{font-size:12px;}
.form-detail-view .rating-table .row-label{font-size:12px !important;}
.form-detail-view .dops-tbl th,
.form-detail-view .dops-tbl td{font-size:12px;}
.form-detail-view .dops-tbl .item-cell{font-size:12px !important;}
/* badge 統一 */
.form-detail-view .t-badge,
.form-detail-view .s-badge{font-size:10px !important;}
/* 表單區內 inline span/div 預設字體（不影響特定 size class） */
.form-detail-view .card-body > div:not([class]),
.form-detail-view .card-body > span:not([class]){font-size:12px;}
/* 評分按鈕統一 */
.form-detail-view .r-btn{font-size:12px !important;}
.form-detail-view .d-btn{font-size:12px !important;}
/* lock-bar 與 saved-msg */
.form-detail-view .lock-bar{font-size:12px;}
/* 行動裝置：表格內字體微縮以利顯示，但仍維持一致 */
@media(max-width:768px){
  .form-detail-view .rating-table th,
  .form-detail-view .rating-table td,
  .form-detail-view .rating-table .row-label,
  .form-detail-view .dops-tbl th,
  .form-detail-view .dops-tbl td,

  .form-detail-view .r-btn,

}
/* F01A/F01B 較窄標題列 */
.form-detail-view .f01b-label{font-size:11px !important;}

/* ─── FORM FOOTER ─── */
.form-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:1.2rem 0 .5rem;flex-wrap:wrap;border-top:1px solid var(--border2);margin-top:1.2rem;}
.form-footer-right{display:flex;gap:10px;align-items:center;}
.saved-msg{font-size:12px;color:var(--green);font-weight:600;display:none;background:var(--green-soft);padding:5px 12px;border-radius:999px;border:1px solid var(--green-line);}
.btn-save{padding:11px 24px;background:linear-gradient(135deg,var(--primary) 0%,var(--primary2) 100%);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px;box-shadow:0 2px 6px rgba(37,99,235,.25);}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.35);}
.btn-save:active{transform:translateY(0);}
.btn-pdf{padding:10px 20px;background:linear-gradient(135deg,var(--red) 0%,#B91C1C 100%);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;display:none;transition:all .2s;letter-spacing:.3px;box-shadow:0 2px 6px rgba(220,38,38,.25);}
.btn-pdf:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(220,38,38,.35);}
.btn-back{padding:10px 18px;background:#fff;color:var(--ink2);border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;font-weight:500;transition:all .15s;}
.btn-back:hover{background:var(--bg-soft);border-color:var(--ink3);}

/* ─── HISTORY LOG ─── */
.history-log{margin-top:1.2rem;}
.history-title{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.history-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r);margin-bottom:6px;background:#fff;font-size:11px;transition:all .15s;}
.history-item:hover{border-color:var(--primary-line);box-shadow:var(--shadow-sm);}
.history-time{color:var(--ink3);font-family:'SF Mono','Monaco','Cascadia Code',monospace;font-size:11px;}
.history-who{padding:2px 9px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.2px;}
.hw-s{background:var(--blue-soft);color:var(--blue);border:1px solid var(--blue-line);}
.hw-t{background:var(--red-soft);color:var(--red);border:1px solid var(--red-line);}
.hw-a{background:var(--gold-soft);color:var(--gold);border:1px solid #ECD08C;}

/* ─── ADMIN PANEL ─── */
.admin-section{padding:1.5rem;}
.admin-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:1.1rem;overflow:hidden;box-shadow:var(--shadow-sm);}
.admin-card-head{background:linear-gradient(135deg,#1E40AF 0%,#2563EB 100%);color:#fff;padding:12px 1.3rem;font-family:var(--ff-serif);font-size:14px;font-weight:600;letter-spacing:.3px;}
.admin-card-body{padding:1.3rem;}
.admin-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.admin-row input{flex:1;min-width:120px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:#fff;color:var(--ink);transition:all .15s;}
.admin-row input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12);outline:none;}
.admin-row select{flex:1;min-width:120px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:#fff;color:var(--ink);}
.btn-add{padding:8px 16px;background:linear-gradient(135deg,var(--green) 0%,#047857 100%);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(5,150,105,.25);}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(5,150,105,.35);}
.btn-del{padding:6px 11px;background:#fff;color:var(--red);border:1px solid var(--red-line);border-radius:var(--r);font-size:11px;cursor:pointer;font-weight:500;transition:all .15s;}
.btn-del:hover{background:var(--red);color:#fff;border-color:var(--red);}
.btn-update{padding:7px 14px;background:linear-gradient(135deg,var(--gold) 0%,#A16207 100%);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(194,138,44,.25);}
.btn-update:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(194,138,44,.35);}
.accounts-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;margin-top:8px;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;}
.accounts-table th{background:linear-gradient(180deg,#F8FAFC 0%,#F1F5F9 100%);padding:10px 12px;text-align:left;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.2px;}
.accounts-table th:last-child{border-right:none;}
.accounts-table td{padding:9px 12px;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);color:var(--ink);background:#fff;}
.accounts-table td:last-child{border-right:none;}
.accounts-table tr:last-child td{border-bottom:none;}
.accounts-table tbody tr:hover td{background:#F8FAFE;}
.gs-status{font-size:12px;padding:8px 12px;border-radius:var(--r);margin-top:6px;font-weight:500;}
.gs-ok{background:var(--green-soft);color:#065F46;border:1px solid var(--green-line);}
.gs-err{background:var(--red-soft);color:#991B1B;border:1px solid var(--red-line);}
.gs-info{background:var(--blue-soft);color:var(--primary2);border:1px solid var(--blue-line);}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:linear-gradient(135deg,var(--ink) 0%,var(--ink2) 100%);color:#fff;padding:12px 22px;border-radius:var(--r);font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;box-shadow:var(--shadow-lg);transform:translateY(10px);}
.toast.show{opacity:1;transform:translateY(0);}

/* ─── QUICK NAV BUTTONS ─── */
.qnav-btn{padding:6px 14px;border-radius:999px;background:#fff;font-size:12px;cursor:pointer;transition:all .15s;font-weight:500;letter-spacing:.2px;}
.qnav-btn b{font-weight:700;margin:0 2px;}
.qnav-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.qnav-overview{border:1px solid var(--primary-line);color:var(--primary2);font-weight:600;}
.qnav-overview:hover{background:var(--primary-soft);}
.qnav-new{border:1px solid var(--border);color:var(--ink3);}
.qnav-new:hover{border-color:var(--ink3);color:var(--ink2);}
.qnav-draft{border:1px solid #BAE6FD;color:#075985;background:#F0F9FF;font-weight:600;}
.qnav-draft:hover{background:#E0F2FE;}
.qnav-draft b{color:#0C4A6E;}
.qnav-partial{border:1px solid #FCD34D;color:#92400E;background:#FFFBEB;}
.qnav-partial:hover{background:#FEF3C7;}
.qnav-done{border:1px solid var(--green-line);color:var(--green);font-weight:600;background:var(--green-soft);}
.qnav-done:hover{background:#A7F3D0;}

/* ─── PDF ─── */
@media print{
  .topbar,.sidebar,.form-footer,.lock-bar,.history-log,.btn-back,.btn-save,.btn-pdf,.toast{display:none !important;}
  .app-body{display:block;}
  .form-detail-view{padding:.5rem;}
  .main-content{overflow:visible;}
}

input,select,textarea,button{-webkit-text-size-adjust:100%;}
input[type=text],input[type=date],input[type=number],input[type=password],select,textarea{font-size:16px !important;}

/* ─── 全域修正：所有 date input 不可超出容器 ─── */
input[type="date"]{
  box-sizing:border-box !important;
  max-width:100% !important;
  min-width:0 !important;
}

/* ══════════════════════════════════════════════════
   手機版響應式修正（僅在 < 768px 生效，不影響桌機）
   ══════════════════════════════════════════════════ */
@media (max-width: 767px) {

  /* 防止整體容器產生水平捲軸 */
  body, #main-content, .form-detail-body {
    max-width: 100vw;
    overflow-x: hidden;
  }

  /* 3. 簽名欄位日期 input：全寬，不超出螢幕 */
  input[type="date"] {
    width: 100% !important;
    max-width: 100% !important;
    min-width: 0 !important;
    box-sizing: border-box !important;
    font-size: 16px;
  }

  /* input / select / textarea 防溢出 */
  input[type="text"], input[type="number"], input[type="password"],
  select, textarea {
    max-width: 100%;
    box-sizing: border-box;
    font-size: 16px;
  }

  /* 3. 簽名區 g2：強制單欄，確保日期欄位不被截斷 */
  .g2, .card .g2 {
    grid-template-columns: 1fr !important;
  }
  .g2 > *, .card .g2 > * {
    min-width: 0 !important;
    width: 100% !important;
  }

  /* g3 Grid：手機版改為單欄 */
  .g3 {
    grid-template-columns: 1fr !important;
  }
  .g3 > * {
    min-width: 0 !important;
  }

  /* 4+5. 所有表格允許橫向捲動（不截斷內容） */
  .card-body {
    overflow-x: auto !important;
    -webkit-overflow-scrolling: touch;
    padding: 10px 8px;
  }

  /* 4. F01B 指導者評核表格：sticky 首欄 + 橫向捲動 */
  .f01b-table {
    font-size: 9px !important;
    width: max-content;
    min-width: 100%;
  }
  .f01b-table th, .f01b-table td {
    padding: 2px 1px !important;
    font-size: 9px !important;
  }
  .f01b-label {
    font-size: 9px !important;
    max-width: 80px !important;
    min-width: 70px !important;
    word-break: break-all;
  }
  .f01b-table button {
    width: 20px !important;
    height: 20px !important;
    font-size: 8px !important;
    padding: 0 !important;
  }
  /* 一般 rating-table */
  .rating-table {
    font-size: 9px;
  }
  .rating-table th, .rating-table td {
    padding: 2px 2px;
    font-size: 9px;
  }
  .rating-table td.row-label {
    font-size: 9px;
  }

  /* 5. 所有表格外層：overflow-x:auto */
  .card-body table {
    max-width: none;
  }
  /* 呼吸器設定表格 */
  table td input[type="text"] {
    width: 32px !important;
    font-size: 10px !important;
    padding: 1px 2px !important;
  }

  .dops-tbl th, .dops-tbl td {
    font-size: 10px;
    padding: 3px 2px;
  }

  /* 快捷列允許換行 */
  .quick-nav {
    flex-wrap: wrap;
  }

  /* r-btn 評分按鈕在手機版調整 */
  .r-btn {
    min-width: 26px;
    padding: 3px 2px;
    font-size: 10px;
  }

  /* F04 呼吸器設定 input 小一點 */
  td input[type="text"] {
    width: 38px !important;
    font-size: 11px;
    padding: 2px 3px;
  }
}
/* ══════════════════════════════════════════════════ */
</style>

/* ── HTML escape：防止 XSS ── */
const _ESC_MAP={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','/':'&#x2F;','`':'&#x60;','=':'&#x3D;'};
function esc(str){
  if(str===null||str===undefined) return '';
  return String(str).replace(/[&<>"'`=\/]/g, function(c){return _ESC_MAP[c];});
}

/* ── 屬性 escape：用於 HTML attribute 值 ── */
function escAttr(str){
  if(str===null||str===undefined) return '';
  return String(str).replace(/[&<>"']/g, function(c){return _ESC_MAP[c];});
}

/* ── 雜湊：用於密碼/PIN 不以明文存於前端 ── */
async function sha256(text){
  if(!text) return '';
  try{
    const enc=new TextEncoder();
    const buf=await crypto.subtle.digest('SHA-256', enc.encode(String(text)));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    // 老瀏覽器 fallback：簡易 hash（並非密碼學安全，但比明文好）
    let h=0;
    for(let i=0;i<text.length;i++){h=((h<<5)-h)+text.charCodeAt(i);h|=0;}
    return 'fb_'+Math.abs(h).toString(16);
  }
}

/* ── 同步雜湊 fallback（用於初始化時無法等 await）── */
function syncHash(text){
  if(!text) return '';
  let h=0;
  for(let i=0;i<text.length;i++){h=((h<<5)-h)+text.charCodeAt(i);h|=0;}
  return 'sync_'+Math.abs(h).toString(16);
}

const MAX_NAME_LENGTH = 50;          // 姓名上限

}

/* ── 失敗次數計數器：防止暴力破解 ── */
const _failCounts={};
const MAX_FAILS_PER_MIN = 5;
function recordFail(key){
  const now=Date.now();
  if(!_failCounts[key]) _failCounts[key]={count:0, firstAt:now, lockedUntil:0};
  const rec=_failCounts[key];
  // 60 秒重置計數
  if(now - rec.firstAt > 60000){
    rec.count=1; rec.firstAt=now; rec.lockedUntil=0;
  } else {
    rec.count++;
    if(rec.count >= MAX_FAILS_PER_MIN){
      rec.lockedUntil = now + 60000; // 鎖 60 秒
    }
  }
}
function isLocked(key){
  const rec=_failCounts[key];
  if(!rec) return false;
  if(Date.now() < rec.lockedUntil) return Math.ceil((rec.lockedUntil-Date.now())/1000);
  return false;
}
function clearFails(key){
  delete _failCounts[key];
}

}

/* ── 密碼比對 helper ── 自動辨識雜湊或明文（為了向下相容） */
async function passwordMatches(input, stored){
  if(!stored) return false;
  // 若儲存的是雜湊（以 'h:' 開頭），則對 input 做雜湊後比對
  if(typeof stored==='string' && stored.indexOf('h:')===0){
    const hashed = 'h:' + (await sha256(input));
    return hashed === stored;
  }
  // 否則為明文（向下相容舊資料）
  return stored === input;
}

/* ── 把現有明文密碼/PIN 自動轉換為雜湊 ── 在 enterApp 後背景執行
   ※ 注意：依管理需求，學生與老師「帳號密碼」採明文儲存以便管理員查看；
     管理員密碼、老師 PIN、筆試後測 PIN 仍以雜湊儲存（這些不需檢視原值）。
*/
async function migratePlaintextSecrets(){
  let changed=false;
  // 【依設定】學生密碼：不再自動雜湊化（保持明文以供管理員檢視）
  // 【依設定】老師密碼：不再自動雜湊化
  // 管理員密碼
  if(APP.adminPwd && typeof APP.adminPwd==='string' && APP.adminPwd.indexOf('h:')!==0){
    APP.adminPwd = 'h:' + (await sha256(APP.adminPwd));
    changed=true;
  }
  // 老師 PIN
  if(APP.teacherPIN && typeof APP.teacherPIN==='string' && APP.teacherPIN.indexOf('h:')!==0){
    APP.teacherPIN = 'h:' + (await sha256(APP.teacherPIN));
    changed=true;
  }
  // 筆試後測專用 PIN（獨立於 teacherPIN，可由管理員另行設定）
  if(APP.examPIN && typeof APP.examPIN==='string' && APP.examPIN.indexOf('h:')!==0){
    APP.examPIN = 'h:' + (await sha256(APP.examPIN));
    changed=true;
  }
  if(changed){
    try{ saveConfigToSheets(); }catch(e){console.warn('hash migration save failed',e);}
  }
}
async function doRegister(){
  const sid=clipInput((document.getElementById('r-sid').value||'').trim(), MAX_SHORT_LENGTH);
  const name=clipInput((document.getElementById('r-name').value||'').trim(), MAX_NAME_LENGTH);
  const school=clipInput((document.getElementById('r-school').value||'').trim(), MAX_NAME_LENGTH);
  const pwd=clipInput(document.getElementById('r-pwd').value, MAX_SHORT_LENGTH);
  const pwd2=clipInput(document.getElementById('r-pwd2').value, MAX_SHORT_LENGTH);
  const err=document.getElementById('r-err');

  // 【安全】註冊頻率限制:每 5 分鐘最多註冊 3 個帳號(防自動化建大量假帳號)
  try{
    var now=Date.now();
    var regLog=JSON.parse(localStorage.getItem('register_log')||'[]');
    regLog=regLog.filter(function(t){return (now-t)<300000;});  // 5 分鐘內
    if(regLog.length>=3){
      err.textContent='⚠ 註冊次數過多，請 5 分鐘後再試';err.style.display='block';return;
    }
  }catch(e){}

  if(!sid||!name||!school||!pwd){err.textContent='請填寫所有欄位';err.style.display='block';return;}
  if(pwd.length<6){err.textContent='密碼至少6個字元';err.style.display='block';return;}
  // 【安全】密碼長度上限,避免 DoS
  if(pwd.length>64){err.textContent='密碼過長（上限 64 碼）';err.style.display='block';return;}
  if(pwd!==pwd2){err.textContent='兩次密碼不一致';err.style.display='block';return;}
  // 【安全】驗證學號格式（防止特殊字元、HTML 注入）
  if(!/^[A-Za-z0-9_-]+$/.test(sid)){err.textContent='學號只能包含英文字母、數字、底線或減號';err.style.display='block';return;}
  // 【安全】學號長度檢查
  if(sid.length<3 || sid.length>20){err.textContent='學號長度應為 3-20 碼';err.style.display='block';return;}
  // 【安全】姓名只允許中英文、空格、撇號(O'Brien 之類)、連字號;不允許 < > & " 等可能 HTML 注入的字元
  if(/[<>&"\\\/]/.test(name)){err.textContent='姓名包含不允許的特殊字元';err.style.display='block';return;}
  // 檢查學號是否已存在
  if(APP.students[sid]){err.textContent='此學號已被註冊，請聯繫管理員';err.style.display='block';return;}
  err.style.display='none';

  // 記錄註冊時間
  try{
    var now2=Date.now();
    var regLog2=JSON.parse(localStorage.getItem('register_log')||'[]');
    regLog2=regLog2.filter(function(t){return (now2-t)<300000;});
    regLog2.push(now2);
    localStorage.setItem('register_log',JSON.stringify(regLog2));
  }catch(e){}

  // 依管理需求：學生密碼以明文儲存
  APP.students[sid]={name,school,pwd:pwd,registeredAt:new Date().toISOString(),selfRegistered:true};
  // ★★★ 同步到 GAS，讓管理員後台看得到 ★★★
  try{ saveConfigToSheets(); }catch(e){console.warn('同步學生帳號失敗',e);}
  APP.currentRole='student';APP.currentUser={sid,name,school};
  enterApp();
}
async function changeStudentPwd(){
  const sid=clipInput((document.getElementById('cp-sid').value||'').trim(), MAX_SHORT_LENGTH);
  const old=clipInput(document.getElementById('cp-old').value, MAX_SHORT_LENGTH);
  const nw=clipInput(document.getElementById('cp-new').value, MAX_SHORT_LENGTH);
  const nw2=clipInput(document.getElementById('cp-new2').value, MAX_SHORT_LENGTH);
  const err=document.getElementById('cp-err');
  // 【安全】暴力破解保護
  const lockKey='changepwd_'+sid;
  const locked=isLocked(lockKey);
  if(locked){err.textContent='嘗試次數過多，請等待 '+locked+' 秒';err.style.display='block';return;}
  // 1. 學號必填
  if(!sid){err.textContent='請輸入學號';err.style.display='block';return;}
  // 2. 學號必須存在
  const acc=APP.students[sid];
  if(!acc){err.textContent='查無此學號，請聯繫管理員';err.style.display='block';return;}
  // 3. 舊密碼必須正確（用雜湊比對）
  const oldOk = await passwordMatches(old, acc.pwd);
  if(!oldOk){
    recordFail(lockKey);
    err.textContent='舊密碼錯誤';err.style.display='block';return;
  }
  // 4. 新密碼長度
  if(nw.length<6){err.textContent='新密碼至少 6 碼';err.style.display='block';return;}
  // 5. 兩次輸入需一致
  if(nw!==nw2){err.textContent='新密碼兩次輸入不一致';err.style.display='block';return;}
  // 6. 新舊密碼不可相同
  if(nw===old){err.textContent='新密碼不可與舊密碼相同';err.style.display='block';return;}
  clearFails(lockKey);
  // 依管理需求：學生密碼以明文儲存
  APP.students[sid].pwd = nw;
  try{ saveConfigToSheets(); }catch(e){console.warn('同步密碼失敗',e);}
  err.style.display='none';
  // 清空表單
  document.getElementById('cp-sid').value='';
  document.getElementById('cp-old').value='';
  document.getElementById('cp-new').value='';
  document.getElementById('cp-new2').value='';
  toast('✓ '+esc(acc.name)+' 的密碼已更新，請以新密碼登入');
  // 自動帶回登入畫面並預填學號
  showPanel('student-login-panel');
  setTimeout(function(){
    var sidInput=document.getElementById('s-sid');
    if(sidInput) sidInput.value=sid;
  },50);
}

  // 學生 / 已選擇學生的老師才需要拉表單
  if(APP.currentRole==='student' || (APP.currentRole==='teacher' && APP.currentStudentId)){
    try{
      await loadAllFormsFromSheets();

      console.warn('批次載入失敗，改用本機備份:', e);
      try{
        var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
        Object.keys(drafts).forEach(function(fkey){
          if(!APP.formData[fkey])APP.formData[fkey]={};
          Object.assign(APP.formData[fkey],drafts[fkey]);
        });
        var hlogs=JSON.parse(localStorage.getItem('history_logs')||'{}');
        Object.assign(APP.historyLog, hlogs);
      }catch(e2){}
    }
  } else {

        Object.assign(APP.formData[fkey],drafts[fkey]);
      });
    }catch(e){}
  }
  // ★ 登入後執行一次性 migration：把裸 id 的殘留資料整理到 canonical formKey
  setTimeout(function(){
    try{ migrateBareKeysToFormKey(); }catch(e){console.warn('migration failed:',e);}
    // 【安全】把明文密碼轉換為雜湊（背景執行，不阻塞 UI）
    try{ migratePlaintextSecrets(); }catch(e){console.warn('hash migration failed:',e);}
    // 【安全】啟動閒置自動登出
    bumpActivity();
    startSessionWatchdog();
    renderSidebar(); // 更新狀態圖示
  }, 100);
  renderSidebar();
  // 顯示快捷導覽列（非管理員）
  var qnav=document.getElementById('quick-nav');

  else if(APP.currentRole==='teacher'){renderTeacherHome();}
  else{renderFormList(); setTimeout(showUnfilledNotification, 800);}
}

/* 取得課後測驗題庫資訊（含題目陣列） */
function getCourseTestBank(fid){
  // fid 可能是 'F-CT01' 或 'F-CT01_<sid>'，取出前綴
  var bareId = String(fid||'').split('_')[0];
  return COURSE_TEST_BANK[bareId] || null;
}

/* 課後測驗計分（前端直接計算，不需呼叫後端） */
function _courseTestCalcScore(fid){
  var bank = getCourseTestBank(fid);
  if(!bank) return null;
  var d = APP.formData[fid] || {};
  var qs = bank.questions;
  var correct = 0, wrongList = [], answered = 0;
  for(var i=0; i<qs.length; i++){
    var qNum = i + 1;
    var u = String(d['q'+qNum]||'').toUpperCase();
    var corr = String(qs[i].answer||'').toUpperCase();
    if(u) answered++;
    if(u === corr){
      correct++;
    } else {
      // 答錯或未作答都算錯
      wrongList.push(qNum);
    }
  }
  return {
    score: correct * COURSE_TEST_PER_QUESTION_SCORE,
    correctCnt: correct,
    wrongList: wrongList,
    answered: answered,
    total: qs.length
  };
}

function findForm(id){return FORMS.find(f=>f.id===id);}
function getFormKey(id){
  // 每位學生有獨立的表單資料
  if(APP.currentRole==='student' && APP.currentUser && APP.currentUser.sid){
    return id+'_'+APP.currentUser.sid;
  }
  if((APP.currentRole==='teacher'||APP.currentRole==='admin') && APP.currentStudentId){
    return id+'_'+APP.currentStudentId;
  }
  return id; // fallback：登入流程未完成時暫用裸 id（會於 enterApp/openForm 時 migration）
}

/* ── 取得「應寫入的正規 key」── 寫入點統一呼叫此函式，永不寫入裸 id（除非真的沒有學生 context） */
function getCanonicalKey(id){
  // 若有任一學生 context，永遠回傳 formKey（含學號）
  if(APP.currentRole==='student' && APP.currentUser && APP.currentUser.sid){
    return id+'_'+APP.currentUser.sid;
  }
  if(APP.currentStudentId){
    return id+'_'+APP.currentStudentId;
  }
  // 真的沒有 context（極少見，例如尚未登入）→ 退回裸 id
  return id;
}

/* ── 一次性 migration：把所有「裸 id」key 的資料搬到對應的「formKey」key ──
   避免後續 getStatus / openForm 在多個 key 之間來回 merge 造成不穩定
*/
function migrateBareKeysToFormKey(){
  if(!APP.formData) return;
  // 確認有目標學號可搬
  var sid=null;
  if(APP.currentRole==='student' && APP.currentUser && APP.currentUser.sid) sid=APP.currentUser.sid;
  else if(APP.currentStudentId) sid=APP.currentStudentId;
  if(!sid) return;
  // 蒐集所有 FORMS 的裸 id
  var formIds=(typeof FORMS!=='undefined'&&FORMS)?FORMS.map(function(f){return f.id;}):[];
  formIds.forEach(function(fid){
    var bare=APP.formData[fid];
    if(!bare || Object.keys(bare).length===0) return;
    var formKey=fid+'_'+sid;
    if(!APP.formData[formKey]) APP.formData[formKey]={};
    // 用「非空值優先」的方式合併，不讓裸 id 內的空字串覆蓋已存在的有效值
    Object.keys(bare).forEach(function(k){
      var v=bare[k];
      if(v==='' || v===null || v===undefined) return;
      // 若 formKey 已經有值，且裸 id 是空的，保留 formKey 的
      if(APP.formData[formKey][k]==='' || APP.formData[formKey][k]===null || APP.formData[formKey][k]===undefined){
        APP.formData[formKey][k]=v;
      } else {
        // 兩邊都有值 → 採用裸 id（可能是最新的 inline 寫入）
        APP.formData[formKey][k]=v;
      }
    });
    // 搬完後刪除裸 id 版本
    delete APP.formData[fid];
  });
  // historyLog 也一併搬移
  if(APP.historyLog){
    formIds.forEach(function(fid){
      var bare=APP.historyLog[fid];
      if(!bare || bare.length===0) return;
      var formKey=fid+'_'+sid;
      if(!APP.historyLog[formKey]) APP.historyLog[formKey]=[];
      bare.forEach(function(entry){
        var exists=APP.historyLog[formKey].some(function(e){return e.ts===entry.ts;});
        if(!exists) APP.historyLog[formKey].push(entry);
      });
      APP.historyLog[formKey].sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});
      delete APP.historyLog[fid];
    });
  }
  // localStorage 草稿也搬
  try{
    var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    var changed=false;
    formIds.forEach(function(fid){
      if(!drafts[fid] || Object.keys(drafts[fid]).length===0) return;
      var formKey=fid+'_'+sid;
      if(!drafts[formKey]) drafts[formKey]={};
      Object.keys(drafts[fid]).forEach(function(k){
        var v=drafts[fid][k];
        if(v==='' || v===null || v===undefined) return;
        drafts[formKey][k]=v;
      });
      delete drafts[fid];
      changed=true;
    });
    if(changed) localStorage.setItem('form_drafts',JSON.stringify(drafts));
  }catch(e){}
  // localStorage history 也搬
  try{
    var hLogs=JSON.parse(localStorage.getItem('history_logs')||'{}');
    var hChanged=false;
    formIds.forEach(function(fid){
      if(!hLogs[fid] || hLogs[fid].length===0) return;
      var formKey=fid+'_'+sid;
      if(!hLogs[formKey]) hLogs[formKey]=[];
      hLogs[fid].forEach(function(entry){
        var exists=hLogs[formKey].some(function(e){return e.ts===entry.ts;});
        if(!exists) hLogs[formKey].push(entry);
      });
      delete hLogs[fid];
      hChanged=true;
    });
    if(hChanged) localStorage.setItem('history_logs',JSON.stringify(hLogs));
  }catch(e){}
}

/* ── 全域寫入 helper：所有 inline onchange 改呼叫此函式，永遠寫到 canonical formKey ── */
function writeField(fid, key, val){
  // 安全：限制長度，避免大字串攻擊
  val = clipInput(val, MAX_FIELD_LENGTH);
  var bareId = (typeof fid==='string' && fid.indexOf('_')>=0) ? fid.split('_')[0] : fid;
  var targetKey = getCanonicalKey(bareId);
  if(!APP.formData[targetKey]) APP.formData[targetKey] = {};
  APP.formData[targetKey][key] = val;
  try{
    var drafts = JSON.parse(localStorage.getItem('form_drafts')||'{}');
    if(!drafts[targetKey]) drafts[targetKey] = {};
    drafts[targetKey][key] = val;
    localStorage.setItem('form_drafts', JSON.stringify(drafts));
  }catch(e){}
  // ★ 觸發自動儲存
  scheduleAutoSave(bareId);
}

/* ════════════════════════════════════════════════
   自動儲存機制（Auto-Save）
   每次資料變動 → 等待 20 秒（debounce）→ 自動觸發儲存
   進入儲存前 10 秒切換為倒數提示 + 顏色閃爍，作為視覺緩衝
   ════════════════════════════════════════════════ */
const AUTO_SAVE_DEBOUNCE_MS = 20000;            // 停止輸入 20 秒後自動存
const AUTO_SAVE_COUNTDOWN_MS = 10000;           // 儲存前 10 秒進入倒數提示
let _autoSaveTimers = {};            // 每張表單獨立計時器
let _autoSaveCountdownTimers = {};   // 每張表單的倒數提示計時器
let _autoSaveCountdownInterval = null; // 全域倒數刷新 interval
let _autoSaveCountdownEnd = 0;       // 預定觸發儲存的絕對時間（ms）
let _autoSaveInFlight = {};          // 避免重複觸發

function scheduleAutoSave(bareId){
  // 必須有登入身分才自動儲存
  if(!APP.currentRole || !APP.currentUser) return;
  // 學生：只能自動儲存自己的表單
  if(APP.currentRole==='student' && !APP.currentUser.sid) return;
  // 老師：必須選定學生
  if(APP.currentRole==='teacher' && !APP.currentStudentId) return;
  // 管理員：跳過自動儲存（管理員多半在管理帳號，不該觸發表單儲存）
  if(APP.currentRole==='admin') return;

  // 取消舊計時器，重設 debounce
  if(_autoSaveTimers[bareId]) clearTimeout(_autoSaveTimers[bareId]);
  if(_autoSaveCountdownTimers[bareId]) clearTimeout(_autoSaveCountdownTimers[bareId]);
  if(_autoSaveCountdownInterval){ clearInterval(_autoSaveCountdownInterval); _autoSaveCountdownInterval=null; }

  // 顯示「未儲存」指示
  showAutoSaveIndicator('pending');

  // 主計時器：20 秒後觸發儲存
  _autoSaveTimers[bareId] = setTimeout(function(){
    runAutoSave(bareId);
  }, AUTO_SAVE_DEBOUNCE_MS);

  // 倒數提示計時器：在儲存前 10 秒切換為倒數狀態
  _autoSaveCountdownEnd = Date.now() + AUTO_SAVE_DEBOUNCE_MS;
  _autoSaveCountdownTimers[bareId] = setTimeout(function(){
    // 進入倒數狀態時，立即顯示完整剩餘秒數，避免第一秒沒有數字
    var initialRemain = Math.max(0, Math.ceil((_autoSaveCountdownEnd - Date.now())/1000));
    showAutoSaveIndicator('countdown', initialRemain);
    // 每秒刷新倒數秒數，產生「即將儲存」的視覺緩衝
    _autoSaveCountdownInterval = setInterval(function(){
      var remain = Math.max(0, Math.ceil((_autoSaveCountdownEnd - Date.now())/1000));
      showAutoSaveIndicator('countdown', remain);
      if(remain <= 0){
        clearInterval(_autoSaveCountdownInterval);
        _autoSaveCountdownInterval = null;
      }
    }, 1000);
  }, AUTO_SAVE_DEBOUNCE_MS - AUTO_SAVE_COUNTDOWN_MS);
}

function runAutoSave(bareId){
  if(_autoSaveInFlight[bareId]) return;
  _autoSaveInFlight[bareId] = true;
  // 停止倒數刷新
  if(_autoSaveCountdownInterval){ clearInterval(_autoSaveCountdownInterval); _autoSaveCountdownInterval=null; }
  showAutoSaveIndicator('saving');
  try{
    // 直接呼叫 saveForm，與「按儲存按鈕」效果完全相同
    // 這會建立 historyLog 紀錄，讓狀態判定能正確運作
    if(typeof saveForm === 'function'){
      saveForm(bareId);
      showAutoSaveIndicator('saved');
    }
  }catch(e){
    console.warn('autoSave failed:', e);
    showAutoSaveIndicator('error');
  }finally{
    setTimeout(function(){ _autoSaveInFlight[bareId] = false; }, 1000);
  }
}

/* ── 自動儲存狀態指示器（右下角小提示） ── */
function showAutoSaveIndicator(state, countdownSec){
  let el = document.getElementById('auto-save-indicator');
  if(!el){
    el = document.createElement('div');
    el.id = 'auto-save-indicator';
    el.style.cssText = 'position:fixed;bottom:1.2rem;left:1.2rem;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;z-index:9998;transition:background .25s,color .25s,border-color .25s,opacity .3s;pointer-events:none;box-shadow:0 2px 8px rgba(15,23,42,.12);opacity:0;';
    document.body.appendChild(el);
  }
  // 注入閃爍動畫樣式（只注入一次）
  if(!document.getElementById('auto-save-indicator-style')){
    var st = document.createElement('style');
    st.id = 'auto-save-indicator-style';
    st.textContent = '@keyframes autoSaveFlash{0%,100%{box-shadow:0 2px 8px rgba(15,23,42,.12),0 0 0 0 rgba(245,158,11,.55);}50%{box-shadow:0 2px 12px rgba(245,158,11,.45),0 0 0 6px rgba(245,158,11,0);}}';
    document.head.appendChild(st);
  }
  var cdSec = (typeof countdownSec==='number') ? countdownSec : null;
  const conf = {
    pending:   { txt:'✏️ 編輯中…20 秒後自動儲存', bg:'#FEF3C7', color:'#78350F', border:'#F59E0B', flash:false },
    countdown: { txt:'⏳ 即將自動儲存…' + (cdSec!==null?(' '+cdSec+' 秒'):''), bg:'#FFEDD5', color:'#9A3412', border:'#F97316', flash:true },
    saving:    { txt:'⏳ 自動儲存中…',           bg:'#DBEAFE', color:'#1E40AF', border:'#2563EB', flash:false },
    saved:     { txt:'☁ 已自動儲存',             bg:'#D1FAE5', color:'#065F46', border:'#059669', flash:false },
    error:     { txt:'⚠ 自動儲存失敗',           bg:'#FEE2E2', color:'#991B1B', border:'#DC2626', flash:false }
  }[state] || null;
  if(!conf){ el.style.opacity='0'; el.style.animation=''; return; }
  el.textContent = conf.txt;
  el.style.background = conf.bg;
  el.style.color = conf.color;
  el.style.border = '1px solid '+conf.border;
  el.style.opacity = '1';
  // 倒數狀態才啟用閃爍動畫，其他狀態移除
  el.style.animation = conf.flash ? 'autoSaveFlash 1s ease-in-out infinite' : '';
  // 「已儲存」狀態 3 秒後自動淡出
  if(state === 'saved' || state === 'error'){
    setTimeout(function(){
      if(el.textContent === conf.txt){ el.style.opacity = '0'; el.style.animation=''; }
    }, 3000);
  }
}

function hasValue(v){ return v!==undefined&&v!==''&&v!==false&&v!==null; }

function getStatus(id){
  const formKey=getFormKey(id);

  // ★ 讀取資料：以 formKey 為主，但仍向下相容讀取裸 id（避免 migration 還沒跑時誤判）
  // 用「非空值優先」合併，避免空字串覆蓋有效值
  function mergeReadOnly(dest, src){
    if(!src) return;
    Object.keys(src).forEach(function(k){
      var v=src[k];
      if(v===''||v===null||v===undefined||v===false) return;
      if(dest[k]===''||dest[k]===null||dest[k]===undefined||dest[k]===false){
        dest[k]=v;
      }
    });
  }
  const d={};
  // 1) 先填 formKey 的值（最新最權威）
  mergeReadOnly(d, APP.formData[formKey]||{});
  // 2) 再從草稿補空缺
  try{
    var allDrafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    mergeReadOnly(d, allDrafts[formKey]||{});
    // 向下相容：若還有裸 id 殘留草稿，補空缺
    if(formKey!==id) mergeReadOnly(d, allDrafts[id]||{});
  }catch(e){}
  // 3) 向下相容：若 APP.formData[id] 還有殘留（migration 失敗時的安全網），補空缺
  if(formKey!==id) mergeReadOnly(d, APP.formData[id]||{});

  // historyLog：以 formKey 為主，向下相容讀裸 id
  var allLogs=[];
  var logSeen={};
  function pushLogs(arr){
    if(!arr) return;
    arr.forEach(function(l){
      if(!logSeen[l.ts]){logSeen[l.ts]=true;allLogs.push(l);}
    });
  }
  pushLogs(APP.historyLog[formKey]);
  if(formKey!==id) pushLogs(APP.historyLog[id]);
  try{
    var savedLogs=JSON.parse(localStorage.getItem('history_logs')||'{}');
    pushLogs(savedLogs[formKey]);
    if(formKey!==id) pushLogs(savedLogs[id]);
  }catch(e){}
  const hasRecord=allLogs.length>0;
  function hasRealVal(v){
    if(v===undefined||v===null||v===false) return false;
    return String(v).trim()!=='';
  }

  // 輔助：checkField 驗證單一必填欄位
  function checkField(k){
    // ── 虛擬必填項：複合條件 ──
    // __prof_any：F08/F09 「參加職類」17 個 prof_* 任一個 truthy 即算填
    if(k==='__prof_any'){
      return Object.keys(d).some(function(kk){
        return kk.indexOf('prof_')===0 && d[kk]===true;
      });
    }
    // __team_first：F08 「跨團隊照護」第一組 team_type_1 + team_care_1 都要填
    if(k==='__team_first'){
      return hasRealVal(d['team_type_1']) && hasRealVal(d['team_care_1']);
    }
    // __sc_any：EPA 「臨床情境」JSON array (e0X_sc) 至少一項
    if(k==='__sc_any'){
      var raw=d['e01_sc']||d['e02_sc']||d['e03_sc']||'';
      if(!raw) return false;
      try{
        var arr=JSON.parse(raw);
        return Array.isArray(arr) && arr.length>0;
      }catch(e){
        return false;
      }
    }
    var v=d[k];
    if(!hasRealVal(v)) return false;
    if(k==='s_date'){
      var sv=String(v).trim();
      if(sv.indexOf(' - ')>=0){
        var pts=sv.split(' - ');
        return pts.length===2&&pts[0].trim().length>=8&&pts[1].trim().length>=8;
      }
      return sv.length>=8;
    }
    if(k==='t_sign'||k==='s_sign'||k==='t_sign2'||k==='host_sign'){
      var sv2=String(v).trim();
      return sv2!==''
        &&sv2!=='請選擇學生'&&sv2!=='請選擇老師'
        &&sv2!=='請選擇臨床老師'&&sv2!=='請選擇實習總指導教師'
        &&sv2!=='請選擇指導老師'&&sv2!=='請選擇主持人';
    }
    if(k==='t_sign_date'||k==='s_sign_date'||k==='t_sign2_date'||k==='host_sign_date'||k==='host_date'||k==='follow_date'){
      return String(v).trim().length>=8;
    }
    // F04 呼吸問題確立、呼吸器機型 等 JSON array：parse 後至少一項
    if(k==='rt_ind'||k==='vent_type'){
      try{
        var arr2=JSON.parse(String(v));
        return Array.isArray(arr2) && arr2.length>0;
      }catch(e){
        return false;
      }
    }
    return true;
  }

  // ── 層級1：未填 ── 完全沒有實質資料
  // 「自動帶入」欄位不算實質資料：
  // - intern_cat 是預設值
  // - s_name / s_sign / school 在學生登入時自動帶入，本身不代表使用者「有填寫」
  const SKIP_KEYS=['intern_cat','s_name','s_sign','school'];
  const hasAnyData=Object.keys(d).some(function(k){
    return SKIP_KEYS.indexOf(k)<0 && hasRealVal(d[k]);
  });
  if(!hasAnyData) return 'new';

  // ── 層級2：有資料但無儲存紀錄 → 'draft'（草稿中，提醒使用者尚未儲存） ──
  if(!hasRecord) return 'draft';

  // ── F04 床邊教學：特殊必填清單 ──
  if(id==='F04M'||id==='F04S'){
    var f04Req=['s_name','school','bed','pt_name',
      'diagnosis','medical_focus','rt_plan','t_fb','t_sign','t_sign_date','s_sign'];
    if(f04Req.every(function(k){return checkField(k);})) return 'done';
    return 'draft';
  }

  // ── F10A/F10B 輔導記錄：只看學生欄位 ──
  if(id==='F10A'||id==='F10B'){
    // F10 的日期欄位 key 是 'date'，不是 's_date'
    var f10Req=['s_name','intern_cat','date','school','t_sign'];
    var f10Ok=f10Req.every(function(k){
      if(k==='date'){return String(d[k]||'').trim().length>=8;}
      return checkField(k);
    });
    if(f10Ok) return 'done';
    return 'draft';
  }

  // ── 筆試前測 / 後測：以 submitted 標記為 done ──
  if(id==='F-PRE'||id==='F-POST'){
    var subVal=d['submitted'];
    var isSubmitted=(subVal==='true'||subVal===true);
    var basicReq=['s_name','school','intern_cat','s_date'];
    var basicOk=basicReq.every(function(k){return checkField(k);});
    if(isSubmitted && basicOk) return 'done';
    return 'draft';
  }

  // ── 核心課程-課後測驗（F-CT01 等）：以 submitted 標記為 done ──
  if(typeof id==='string' && id.indexOf('F-CT')===0){
    var ctSubVal=d['submitted'];
    var ctIsSubmitted=(ctSubVal==='true'||ctSubVal===true);
    var ctBasicReq=['s_name','school','intern_cat','s_date'];
    var ctBasicOk=ctBasicReq.every(function(k){return checkField(k);});
    if(ctIsSubmitted && ctBasicOk) return 'done';
    return 'draft';
  }

  // ── 一般表單：REQUIRED_STUDENT_FIELDS ──
  const req=(REQUIRED_STUDENT_FIELDS[id]||[]).slice();

  // roles='both' 的表單：額外要求老師簽名（若 req 裡沒有）
  const f=findForm(id);
  if(f&&f.roles==='both'&&req.indexOf('t_sign')<0){
    req.push('t_sign');
  }

  const allFilled=req.length===0
    ? hasAnyData
    : req.every(function(k){return checkField(k);});

  if(allFilled) return 'done';
  return 'draft';
}

function getStatusSummary(){
  const statuses=FORMS.map(f=>getStatus(f.id));
  return{
    done:statuses.filter(s=>s==='done').length,
    partial:0, // 已合併到 draft（保留欄位避免相容性問題）
    draft:statuses.filter(s=>s==='draft').length,
    newF:statuses.filter(s=>s==='new').length,
    total:FORMS.length
  };
}

function getUnfilledForms(){
  return FORMS.filter(f=>['new','draft'].includes(getStatus(f.id)));
}

function getStudentFormStatus(formId, sid){
  // 借用 getStatus 的完整必填邏輯，先暫時把 currentStudentId 指向目標學生
  const key = formId+'_'+sid;
  const data = APP.formData[key];
  if(!data || Object.keys(data).length===0) return 'new';
  // 暫存目前狀態
  const savedStudentId = APP.currentStudentId;
  const savedRole = APP.currentRole;
  const savedUser = APP.currentUser;
  // 切換成 admin/teacher 模式 + currentStudentId=sid，讓 getFormKey 回傳 formId+'_'+sid
  if(APP.currentRole === 'student'){
    // 學生不會用到此函式（學生只看自己），但仍保險處理
    APP.currentRole = 'admin';
    APP.currentUser = null;
  }
  APP.currentStudentId = sid;
  let st;
  try {
    st = getStatus(formId);
  } finally {
    APP.currentStudentId = savedStudentId;
    APP.currentRole = savedRole;
    APP.currentUser = savedUser;
  }
  return st;
}

/* ═══════════ OPEN FORM ═══════════ */
async function openForm(id){
  // ★ 切換表單前：強制觸發目前表單的待儲存草稿（若有未完成的 debounce 計時）
  if(APP.currentFormId && APP.currentFormId !== id && !APP.currentFormId.startsWith('__')){
    const oldBare = APP.currentFormId.indexOf('_')>=0 ? APP.currentFormId.split('_')[0] : APP.currentFormId;
    if(_autoSaveTimers[oldBare]){
      clearTimeout(_autoSaveTimers[oldBare]);
      delete _autoSaveTimers[oldBare];
      // 立即儲存而非等 5 秒
      try{ runAutoSave(oldBare); }catch(e){console.warn('flush autoSave failed:',e);}
    }
  }
  // 自動暫存目前表單（如果有未儲存的資料）
  if(APP.currentFormId && APP.currentFormId !== id && 
     !APP.currentFormId.startsWith('__')){
    autoSaveDraft(APP.currentFormId);
  }

  // ★★★ 修正 PIN 重複鎖回 bug ★★★
  // 只有「真的切到不同表單」才重置老師解鎖狀態；同表單重新渲染（雲端同步、刷新等）不應該強制鎖回。
  // 並尊重 _skipPinReset 旗標：剛 PIN 解鎖完不立即被重置。
  if(APP.currentRole==='student'){
    var _isSwitchingForm = (APP.currentFormId && APP.currentFormId !== id);
    if(_isSwitchingForm && !APP._skipPinReset){
      APP.teacherUnlocked=false;
    }
    // 筆試後測 PIN：只要離開 F-POST（切到任何其他表單），一律重置解鎖狀態
    // 即便考生作答到一半，跳到其他表單再回來，仍需重新輸入 PIN（防止離座後旁人偷看）
    if(_isSwitchingForm && APP.currentFormId==='F-POST' && id!=='F-POST'){
      APP.examUnlocked=false;
    }
    // 只有在真正切表單時才清旗標；同表單再次渲染保留旗標
    if(_isSwitchingForm){
      APP._skipPinReset=false;
    }
  }

  APP.currentFormId=id;
  renderSidebar();
  const mc=document.getElementById('main-content');
  const f=findForm(id);if(!f)return;

  // 顯示載入中
  mc.innerHTML=`<div style="padding:2rem;text-align:center;color:var(--ink3);">
    <div style="font-size:24px;margin-bottom:8px;">⏳</div>
    <div style="font-size:13px;">載入表單資料中...</div>
  </div>`;

  const formKey = getFormKey(id);
  
  // 合併所有可能 key 的資料到 formKey
  function mergeAllKeys(){
    if(!APP.formData[formKey])APP.formData[formKey]={};
    // 合併目標：永遠是 formKey
    // 來源 keys（除 formKey 自己外）：裸 id、其他可能殘留的 key
    var keysToMerge=[id, formKey];
    Object.keys(APP.formData).forEach(function(k){
      if(k===id||k.startsWith(id+'_')||k===formKey) keysToMerge.push(k);
    });
    keysToMerge=keysToMerge.filter(function(v,i,a){return a.indexOf(v)===i;});

    // ★ 改用「非空值優先」合併：來源的空字串/null/undefined 不能覆蓋 formKey 已有的有效值
    function mergeNonEmpty(target, source){
      if(!source) return;
      Object.keys(source).forEach(function(k){
        var v=source[k];
        if(v===''||v===null||v===undefined||v===false) return;
        // 只在 target 該 key 為空時填入；若 target 已有有效值，保留 target
        var tv=target[k];
        if(tv===''||tv===null||tv===undefined||tv===false){
          target[k]=v;
        }
        // 若兩邊都有 → 保留 target（formKey 是正規來源），不覆蓋
      });
    }

    keysToMerge.forEach(function(k){
      if(k!==formKey && APP.formData[k] && Object.keys(APP.formData[k]).length>0){
        mergeNonEmpty(APP.formData[formKey], APP.formData[k]);
      }
    });
    // 載入草稿（同樣非空值優先）
    try{
      var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
      keysToMerge.forEach(function(k){
        if(drafts[k]){
          mergeNonEmpty(APP.formData[formKey], drafts[k]);
        }
      });
    }catch(e){}
    // 合併 historyLog（這個沒有「空值覆蓋」問題，照舊去重合併即可）
    if(!APP.historyLog[formKey])APP.historyLog[formKey]=[];
    keysToMerge.forEach(function(k){
      if(k!==formKey&&APP.historyLog[k]&&APP.historyLog[k].length>0){
        APP.historyLog[k].forEach(function(entry){
          var exists=APP.historyLog[formKey].some(function(e){return e.ts===entry.ts;});
          if(!exists)APP.historyLog[formKey].push(entry);
        });
        APP.historyLog[formKey].sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});
      }
    });
    // ★ 合併完後，把裸 id 的殘留資料清掉，避免下次又被掃進來
    if(id!==formKey && APP.formData[id]){
      delete APP.formData[id];
    }
    // 同步清掉 localStorage 內的裸 id 草稿
    try{
      var drafts2=JSON.parse(localStorage.getItem('form_drafts')||'{}');
      if(drafts2[id] && id!==formKey){
        // 確認 formKey 草稿存在後才清
        if(drafts2[formKey]){
          delete drafts2[id];
          localStorage.setItem('form_drafts',JSON.stringify(drafts2));
        }
      }
    }catch(e){}
  }
  
  mergeAllKeys();

  const canT=APP.currentRole==='teacher'||APP.currentRole==='admin'||APP.teacherUnlocked;
  const canS=APP.currentRole==='student';
  const d=Object.assign({}, APP.formData[id]||{}, APP.formData[formKey]||{});
  APP.formData[formKey]=Object.assign({},d);

  let studentBanner='';
  if(APP.currentRole==='teacher'||APP.currentRole==='admin'){
  // 計算每位學生此表單的評核狀態
  const stuRows=Object.entries(APP.students).map(([sid,acc])=>{
    const fkey=id+'_'+sid;
    const fd=APP.formData[fkey]||{};
    const ff=findForm(id);
    const hasStudentData=Object.keys(fd).length>0;
    const hasTeacherData=ff&&ff.tFields&&ff.tFields.length>0?ff.tFields.some(k=>fd[k]&&String(fd[k]).trim()):false;
    let status='unevaluated';
    if(hasStudentData&&hasTeacherData) status='done';
    else if(hasStudentData) status='student_only';
    else if(hasTeacherData) status='teacher_only';
    return {sid,acc,status};
  });

  const stuOpts=stuRows.map(({sid,acc,status})=>{
    const mark=status==='done'?'✅ ':status==='student_only'?'📝 ':status==='teacher_only'?'✏️ ':'⭕ ';
    const label=status==='done'?'（已完成）':status==='student_only'?'（待老師評）':status==='teacher_only'?'（待學生填）':'（未填寫）';
    return `<option value="${escAttr(sid)}" ${APP.currentStudentId===sid?'selected':''}>${mark}${esc(acc.name)} ${label}</option>`;
  }).join('');

  const curStu=APP.currentStudentId?APP.students[APP.currentStudentId]:null;

  // 狀態統計列表
  const doneCount=stuRows.filter(r=>r.status==='done').length;
  const pendCount=stuRows.filter(r=>r.status==='student_only').length;
  const noneCount=stuRows.filter(r=>r.status==='unevaluated').length;

  // 學生狀態卡片列表
  const stuCards=stuRows.map(({sid,acc,status})=>{
    const isActive=APP.currentStudentId===sid;
    const bg=isActive?'background:var(--ink);color:#fff;':'background:#fff;color:var(--ink);';
    const dotColor=status==='done'?'#639922':status==='student_only'?'#EF9F27':status==='teacher_only'?'#1A3A5C':'#B4B2A9';
    const statusLabel=status==='done'?'已完成':status==='student_only'?'待評分':status==='teacher_only'?'待學生填':'未填寫';
    return `<div onclick="switchStudent('${sid}','${id}')" style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r);cursor:pointer;${bg}border:1px solid ${isActive?'var(--ink)':'var(--border2)'};transition:all .15s;">
      <span style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;"></span>
      <span style="font-size:12px;font-weight:${isActive?'600':'400'};flex:1;">${esc(acc.name)}</span>
      <span style="font-size:10px;padding:1px 7px;border-radius:999px;background:${isActive?'rgba(255,255,255,.2)':'var(--cream)'};color:${isActive?'#fff':'var(--ink3)'};">${statusLabel}</span>
    </div>`;
  }).join('');

  studentBanner=`<div style="background:var(--cream);border:1px solid var(--border);border-radius:var(--r2);padding:1rem;margin-bottom:1rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
      <div style="font-size:12px;font-weight:600;color:var(--ink3);">👤 選擇學生</div>
      <div style="display:flex;gap:8px;font-size:11px;">
        <span style="color:var(--green);">✅ 完成 ${doneCount}</span>
        <span style="color:var(--gold);">📝 待評 ${pendCount}</span>
        <span style="color:var(--ink3);">⭕ 未填 ${noneCount}</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;">
      ${stuCards}
    </div>
    ${!APP.currentStudentId?'<div style="font-size:11px;color:var(--red);margin-top:8px;padding:6px 8px;background:#FFF0F0;border-radius:var(--r);">⚠ 請點選上方學生姓名才能填寫表單</div>':''}
  </div>`;
  }

  let html=`<div class="form-detail-view">`;
  html+=`<div class="form-detail-header">
  <h1>${f.name}</h1>
  <div class="fh-meta">${f.sub}　｜　${f.roles==='both'?'學生＋老師填寫':f.roles==='student'?'學生填寫':'老師填寫'}</div>
  </div>`;
  html+=studentBanner;

  // Lock bar for student viewing teacher-only form
  if(f.roles==='both'&&APP.currentRole==='student'&&!APP.teacherUnlocked){
  html+=`<div class="lock-bar">🔒 老師評分欄位已鎖定。老師請輸入 PIN 碼解鎖：
    <input id="inline-pin" type="password" placeholder="PIN碼" maxlength="8">
    <button class="unlock-btn" onclick="inlineUnlock()">解鎖</button>
    <span id="inline-msg" style="font-size:11px;margin-left:4px;"></span>
  </div>`;
  }

  // Form content
  try{
    html+=buildFormBody(f,d,canT,formKey,canS);
  }catch(buildErr){
    console.error('buildFormBody error:',buildErr);
    html+='<div class="card"><div class="card-body" style="color:var(--red);">⚠ 表單載入失敗：'+buildErr.message+'</div></div>';
  }

  // Footer
  const hasSaved=APP.historyLog[formKey]&&APP.historyLog[formKey].length>0;
  html+=`<div class="form-footer">
  <button class="btn-back" onclick="renderFormList();window.scrollTo(0,0);">← 返回總覽</button>
  <div class="form-footer-right">
    <span class="saved-msg" id="saved-msg">✓ 已儲存</span>

    <button class="btn-save" onclick="saveForm('${id}')">儲存表單</button>
  </div>
  </div>`;

  // History log
  html+=buildHistoryLog(id);
  html+='</div>';
  mc.innerHTML=html;
  // 切換表單時：永遠從表單最上方（基本資料區）開始顯示，不要保留前一張表單的捲動位置
  try{ window.scrollTo({top:0, behavior:'auto'}); }catch(e){ window.scrollTo(0,0); }
  // 部分行動瀏覽器需在下一個 frame 才生效，加一個保險
  setTimeout(function(){
    try{ window.scrollTo({top:0, behavior:'auto'}); }catch(e){ window.scrollTo(0,0); }
    var mcEl = document.getElementById('main-content');
    if(mcEl) mcEl.scrollTop = 0;
  }, 0);

  // 自動為每張 card 套上學生藍／老師紅／混合色
  try{ applyCardColors(); }catch(e){console.warn('applyCardColors failed:',e);}

  // 360度評估表：初始化自動計算
  if(APP.currentFormId==='F07M'||APP.currentFormId==='F07S'){
  setTimeout(function(){
    var fid2=APP.currentFormId;
    calc360Score(fid2);
    setTimeout(function(){calc360Score(fid2);},600);
    setTimeout(function(){calc360Score(fid2);},1500);
  },150);
  }

  // 回填日期區間欄位（drs_*_s / drs_*_e）
  setTimeout(function(){
    var data=APP.formData[formKey]||{};
    Object.keys(data).forEach(function(key){
      var val=data[key];
      if(!val||typeof val!=='string')return;
      if(val.indexOf(' - ')<0)return;
      var parts=val.split(' - ');
      var sv=parts[0]?parts[0].replace(/\//g,'-'):'';
      var ev=parts[1]?parts[1].replace(/\//g,'-'):'';
      var sEl=document.getElementById('drs_'+formKey+'_'+key+'_s')
           ||document.getElementById('drs_'+id+'_'+key+'_s');
      var eEl=document.getElementById('drs_'+formKey+'_'+key+'_e')
           ||document.getElementById('drs_'+id+'_'+key+'_e');
      if(sEl&&sv&&!sEl.value) sEl.value=sv;
      if(eEl&&ev&&!eEl.value) eEl.value=ev;
    });
  },50);

  // 老師登入：鎖定學生欄位（防止竄改）
  // 注意：F01A 是 student-only，老師登入不應鎖定學生評分按鈕
  if(APP.currentRole==='teacher'){
    var isStudentOnlyForm=(f&&f.roles==='student');
    if(!isStudentOnlyForm){
      mc.querySelectorAll('input[data-key],textarea[data-key],select[data-key]').forEach(function(el){
        var key=el.dataset.key||'';
        var isTField=['t_fb','t_sign','t_comment','t_good','t_improve','t_note',
          'epa_level','result','score','director_fb'].some(function(p){return key.startsWith(p);}) ||
          /^f(05|06|07|15)_/.test(key);
        if(!isTField) el.disabled=true;
      });
      mc.querySelectorAll('button[data-teacher="0"]').forEach(function(btn){
        btn.disabled=true;
        btn.style.opacity='0.35';
        btn.style.cursor='not-allowed';
      });
    }
  }

  if(GAS_URL && GAS_URL !== 'YOUR_GAS_URL_HERE'){
    loadFormFromSheets(formKey).then(function(){
      mergeAllKeys();
      // 若目前還在同一個表單，靜默更新 history 顯示
      if(APP.currentFormId===id){
        var hw=document.getElementById('history-wrap');
        if(hw) hw.innerHTML=buildHistoryItems(formKey);
      }
    }).catch(function(){});
  }

  // ★ F10A / F10B 殘留值清理：若先前因 saveForm 的 bug 把 radio 寫成 'on'，
  //   清掉這些壞值，讓使用者重新勾選即可（避免 'on' 卡住 PDF 顯示）
  if(id==='F10A' || id==='F10B'){
    var f10keys=['q_basic','q_self','q_progress','q_detail','q_t_sign','q_feeling','q_t_fb','q_all_sign',
                 's_q2','s_q3','s_q4','s_q5','s_q6'];
    var changed=false;
    [id, formKey].forEach(function(k){
      if(APP.formData[k]){
        f10keys.forEach(function(fk){
          if(APP.formData[k][fk]==='on'){ delete APP.formData[k][fk]; changed=true; }
        });
      }
    });
    try{
      var lsDr=JSON.parse(localStorage.getItem('form_drafts')||'{}');
      [id, formKey].forEach(function(k){
        if(lsDr[k]){
          f10keys.forEach(function(fk){
            if(lsDr[k][fk]==='on'){ delete lsDr[k][fk]; changed=true; }
          });
        }
      });
      if(changed) localStorage.setItem('form_drafts', JSON.stringify(lsDr));
    }catch(e){}
    if(changed){
      console.log('[F10 修補] 清除舊版殘留的 "on" 值，請重新勾選查核項目');
    }
  }

  // ★ F15 加分項目殘留值清理：先前 onchange 用 this.value 但 radio 沒有 value 屬性，
  //   所以 bonus 被存成 "on"。現在修好之後清掉舊的壞值，讓使用者重新勾選。
  if(id==='F15'){
    var f15changed=false;
    [id, formKey].forEach(function(k){
      if(APP.formData[k] && APP.formData[k]['bonus']==='on'){
        delete APP.formData[k]['bonus']; f15changed=true;
      }
    });
    try{
      var ls15=JSON.parse(localStorage.getItem('form_drafts')||'{}');
      [id, formKey].forEach(function(k){
        if(ls15[k] && ls15[k]['bonus']==='on'){
          delete ls15[k]['bonus']; f15changed=true;
        }
      });
      if(f15changed) localStorage.setItem('form_drafts', JSON.stringify(ls15));
    }catch(e){}
    if(f15changed){
      console.log('[F15 修補] 清除舊版加分項目殘留的 "on" 值，請重新勾選');
    }
  }
}

async function inlineUnlock(){
  const pinInput=document.getElementById('inline-pin');
  const pin=clipInput(pinInput?pinInput.value:'', 16);
  const msg=document.getElementById('inline-msg');
  if(!msg) return;
  // 暴力破解保護：每位學生獨立計次
  const lockKey='pin_'+(APP.currentUser&&APP.currentUser.sid?APP.currentUser.sid:'guest');
  const locked=isLocked(lockKey);
  if(locked){
    msg.style.color='var(--red)';
    msg.textContent='PIN 嘗試次數過多，請等待 '+locked+' 秒';
    return;
  }
  const matched=await passwordMatches(pin, APP.teacherPIN);
  if(matched){
    clearFails(lockKey);
    APP.teacherUnlocked=true;
    APP._skipPinReset=true;
    msg.style.color='var(--green)';msg.textContent='解鎖成功！';
    if(pinInput) pinInput.value='';
    unlockTeacherFieldsInDOM();
  } else {
    recordFail(lockKey);
    msg.style.color='var(--red)';msg.textContent='PIN碼錯誤';
    if(pinInput) pinInput.value='';
  }
}

/* ── 自動為每張 card 套上學生藍／老師紅／混合色 ── */
/* 規則：
   1) card 內含 .t-badge 但沒有任何學生欄位（s_sign/s_fb/s_comment/s_feeling/s_improve/s_good/s-badge） → t-card（淡紅）
   2) card 內有學生欄位（s_sign/s_name/s_comment/s_feeling…）但沒有 .t-badge 也沒有老師欄位（t_*） → s-card（淡藍）
   3) card 內同時包含學生與老師欄位 → m-card（混合，不染整張，由內部子區塊處理）
   4) 純資訊類 card（基本資料、病人資料、診斷、呼吸計畫…）視同學生卡（學生填寫）→ s-card
*/
function applyCardColors(){
  var mc=document.getElementById('main-content');
  if(!mc) return;
  // 老師欄位 key 前綴清單
  var T_KEYS=['t_sign','t_sign2','t_fb','t_good','t_improve','t_comment','t_title','t_note','t_date',
    'director_fb','peer_good','peer_suggest','peer_sign','host_sign','host_date','host_note',
    'result','score','score_grade','epa_level','follow_date',
    'q_basic','q_self','q_progress','q_detail','q_t_sign','q_feeling','q_t_fb','q_all_sign',
    'bonus','s1','s2a','s2b','s2c','s2d','s2e','s2f','s2g','s2h'];
  // 學生欄位 key 清單（僅學生會填的）
  var S_KEYS=['s_sign','s_sign_date','s_fb','s_comment','s_feeling','s_improve','s_good','s_name',
    's_date','school','intern_cat','bed','pt_name','gender','birth_date','diagnosis','rt_ind',
    'vent_type','medical_focus','rt_plan','goal','motivation','strategy','difficulty','criteria',
    'timeline','env_review','teacher_review','self_review'];
  
  function hasTeacherContent(card){
    if(card.querySelector('.t-badge')) return true;
    var ts=card.querySelectorAll('[data-key]');
    for(var i=0;i<ts.length;i++){
      var k=ts[i].getAttribute('data-key')||'';
      // 明確老師 key
      if(T_KEYS.indexOf(k)>=0) return true;
      // 老師評分欄位（f02/f05/f06/f07/f13/f14/f15）但 f02 是學生自評...實際看 data-teacher
      if(ts[i].getAttribute('data-teacher')==='1') return true;
      // 老師簽名相關
      if(/^t_/.test(k) && k!=='team_good' && k!=='team_suggest' && k!=='team_sign' && k!=='team_title' && k!=='team_type_1' && k!=='team_care_1') return true;
    }
    // 老師按鈕
    if(card.querySelector('button[data-teacher="1"]')) return true;
    // EPA 信賴等級（老師評）
    if(card.querySelector('.epa-level')) return true;
    return false;
  }
  function hasStudentContent(card){
    if(card.querySelector('.s-badge')) return true;
    var sl=card.querySelectorAll('[data-key]');
    for(var i=0;i<sl.length;i++){
      var k=sl[i].getAttribute('data-key')||'';
      if(S_KEYS.indexOf(k)>=0) return true;
      // 學生評分欄位
      if(sl[i].getAttribute('data-teacher')==='0') return true;
      // F01 學前自評
      if(/^f01_(pre|post)_/.test(k)) return true;
    }
    // 學生按鈕
    if(card.querySelector('button[data-teacher="0"]')) return true;
    return false;
  }
  
  mc.querySelectorAll('.card').forEach(function(card){
    // 移除前次套色
    card.classList.remove('s-card','t-card','m-card');
    var hasT=hasTeacherContent(card);
    var hasS=hasStudentContent(card);
    if(hasT && hasS){
      card.classList.add('m-card');
    } else if(hasT){
      card.classList.add('t-card');
    } else if(hasS){
      card.classList.add('s-card');
    } else {
      // 沒有 data-key 也沒有 badge 的 card：視 card-head-title 文字判斷
      var title=card.querySelector('.card-head-title');
      var t=title?title.textContent:'';
      if(/老師|教師|指導者|主持人|評分|查核|評核/.test(t) && !/學生|自評/.test(t)){
        card.classList.add('t-card');
      } else if(/學生|自評|心得|計畫|診斷|資料|建議/.test(t)){
        card.classList.add('s-card');
      }
      // 完全中性的不染色
    }
  });
}

/* ── 鎖定老師欄位（儲存後呼叫）── */
function lockTeacherFields(){
  var mc=document.getElementById('main-content');
  if(!mc)return;

  // 【直接鎖定】已知老師欄位 key
  var directLockKeys=['t_sign','t_sign_date','t_sign2','t_sign2_date','t_fb','t_good','t_improve','t_comment',
    't_title','t_note','t_date','director_fb','peer_good','peer_suggest','peer_sign','host_sign',
    'host_sign_date','host_date','host_note','result','score','score_grade','epa_level','follow_date',
    'q_basic','q_self','q_progress','q_detail','q_t_sign','q_feeling','q_t_fb','q_all_sign',
    'bonus','s1','s2a','s2b','s2c','s2d','s2e','s2f','s2g','s2h'];
  directLockKeys.forEach(function(k){
    mc.querySelectorAll('[data-key="'+k+'"]').forEach(function(el){
      if(el.hasAttribute('readonly'))return;
      el.disabled=true;
      el.style.background='var(--cream)';
      el.style.color='var(--ink3)';
      el.style.cursor='not-allowed';
    });
  });

  // 鎖定 data-teacher="1" 的所有欄位（含 EPA checkbox、臨床情境、F10 老師查核 radio 等）
  mc.querySelectorAll('input[data-teacher="1"],textarea[data-teacher="1"],select[data-teacher="1"]').forEach(function(el){
    el.disabled=true;
    if(el.type!=='radio'&&el.type!=='checkbox'){
      el.style.opacity='0.6';
      el.style.cursor='not-allowed';
      el.style.background='var(--cream)';
    }
    var parent=el.closest('label');
    if(parent) parent.style.opacity='0.6';
  });

  // 鎖定所有老師評分按鈕：r-btn、d-btn、F01A/F01B 的 inline-style 按鈕（凡有 data-teacher="1" 的 button 一律鎖定）
  mc.querySelectorAll('button[data-teacher="1"],button.d-btn').forEach(function(btn){
    btn.disabled=true;
    btn.style.opacity='0.35';
    btn.style.cursor='not-allowed';
    btn.style.pointerEvents='none';
  });

  // 鎖定 EPA 信賴等級
  mc.querySelectorAll('.epa-level').forEach(function(el){
    el.style.pointerEvents='none';
    el.style.opacity='0.7';
    el.style.cursor='not-allowed';
    el.setAttribute('data-locked','1');
  });

  // 鎖定 DOPS radio（合格/不合格）
  mc.querySelectorAll('input[type="radio"][name$="_result"]').forEach(function(el){
    el.disabled=true;
  });

  // 顯示 lock-bar
  var lb=mc.querySelector('.lock-bar');
