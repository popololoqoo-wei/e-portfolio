<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>臺中榮總 — 實習學習護照 e-Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F9F6F0; --paper:#FDFBF7; --ink:#1A1612; --ink2:#3D3530; --ink3:#7A706A;
  --gold:#B8860B; --gold2:#D4A017; --red:#8B2020; --green:#2D5A27; --blue:#1A3A5C;
  --border:#D4C9BB; --border2:#EAE2D8; --shadow:rgba(26,22,18,.08);
  --ff-serif:'Noto Serif TC',serif; --ff-sans:'Noto Sans TC',sans-serif;
  --r:6px; --r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ff-sans);background:var(--cream);color:var(--ink);min-height:100vh;font-size:14px;}

/* ─── WATERMARK TEXTURE ─── */
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(180,160,130,.06) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(180,160,130,.06) 40px);pointer-events:none;z-index:0;}

/* ─── SCREENS ─── */
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}

/* ─── LOGIN ─── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);box-shadow:0 4px 24px var(--shadow),0 0 0 1px rgba(180,160,130,.2);width:100%;max-width:460px;overflow:hidden;}
.login-header{background:var(--ink);padding:2rem;text-align:center;position:relative;}
.login-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));}
.login-header .hosp{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:8px;font-family:var(--ff-sans);}
.login-header .title{font-family:var(--ff-serif);font-size:20px;color:#fff;font-weight:600;line-height:1.4;}
.login-header .sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:6px;letter-spacing:.5px;}
.login-body{padding:2rem;}
.role-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.5rem;}
.role-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink3);background:var(--cream);transition:all .2s;border:none;border-right:1px solid var(--border);}
.role-tab:last-child{border-right:none;}
.role-tab.active{background:var(--ink);color:#fff;}
.fg{margin-bottom:1.1rem;}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.fg input,.fg select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:#fff;color:var(--ink);font-size:13px;font-family:var(--ff-sans);outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--ink);}
.login-err{font-size:12px;color:var(--red);margin-top:6px;display:none;}
.btn-primary{width:100%;padding:11px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff-sans);letter-spacing:.5px;transition:opacity .2s;margin-top:.25rem;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{width:100%;padding:10px;background:transparent;color:var(--ink3);border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;font-family:var(--ff-sans);margin-top:8px;transition:all .2s;}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink);}
.divider{display:flex;align-items:center;gap:10px;margin:1rem 0;}
.divider-line{flex:1;height:1px;background:var(--border2);}
.divider-text{font-size:11px;color:var(--ink3);}
.strength-bar{height:3px;border-radius:3px;background:var(--border2);margin-top:5px;overflow:hidden;}
.strength-fill{height:100%;border-radius:3px;transition:width .3s,background .3s;width:0;}

/* ─── MAIN APP ─── */
#app-screen{min-height:100vh;}
.topbar{background:var(--ink);color:#fff;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-family:var(--ff-serif);font-size:15px;font-weight:600;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.user-badge{font-size:11px;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:999px;color:rgba(255,255,255,.8);}
.role-chip{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:600;}
.chip-s{background:rgba(45,90,39,.8);color:#A8E6A0;}
.chip-t{background:rgba(139,32,32,.7);color:#F5C5C5;}
.chip-a{background:rgba(184,134,11,.7);color:#FFF0A0;}
.logout-btn{padding:5px 12px;background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:var(--r);color:rgba(255,255,255,.65);font-size:11px;cursor:pointer;transition:all .2s;}
.logout-btn:hover{background:rgba(255,255,255,.1);}

/* ─── BODY LAYOUT ─── */
.app-body{display:flex;min-height:calc(100vh - 54px);}
.sidebar{width:230px;background:var(--paper);border-right:1px solid var(--border);padding:1.25rem 0;flex-shrink:0;}
.sidebar-section{padding:0 1rem .5rem;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;margin-top:1rem;}
.sidebar-item{padding:8px 1.25rem;font-size:12px;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;border-left:2px solid transparent;}
.sidebar-item:hover{background:var(--cream);color:var(--ink);}
.sidebar-item.active{background:var(--cream);border-left-color:var(--gold);color:var(--ink);font-weight:500;}
.sidebar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-done{background:var(--green);}
.dot-wait{background:var(--gold);}
.dot-new{background:var(--border);}
.main-content{flex:1;overflow-y:auto;}

/* ─── FORM LIST (dashboard) ─── */
.form-list-view{padding:1.5rem;}
.section-header{display:flex;align-items:baseline;gap:10px;margin:1.5rem 0 .8rem;padding-bottom:6px;border-bottom:1px solid var(--border);}
.section-header:first-child{margin-top:0;}
.section-header h2{font-family:var(--ff-serif);font-size:16px;font-weight:600;color:var(--ink);}
.section-header span{font-size:11px;color:var(--ink3);}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}
.form-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);padding:1rem 1.1rem;cursor:pointer;transition:all .2s;position:relative;}
.form-card:hover{border-color:var(--gold);box-shadow:0 2px 12px var(--shadow);}
.form-card-num{font-size:10px;color:var(--ink3);margin-bottom:3px;font-weight:600;letter-spacing:.5px;}
.form-card-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.4;}
.form-card-sub{font-size:11px;color:var(--ink3);margin-top:4px;}
.form-card-meta{margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tag{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:500;}
.tag-both{background:#EEF3E8;color:var(--green);border:1px solid #C8DFC0;}
.tag-student{background:#E8F0EE;color:var(--blue);border:1px solid #BFD4D0;}
.tag-teacher{background:#F5EBE8;color:var(--red);border:1px solid #E0C8C0;}
.form-card-status{font-size:10px;color:var(--ink3);}

/* ─── FORM DETAIL ─── */
.form-detail-view{padding:1.5rem;max-width:860px;}
.form-detail-header{background:var(--ink);color:#fff;border-radius:var(--r2);padding:1.25rem 1.5rem;margin-bottom:1.25rem;position:relative;overflow:hidden;}
.form-detail-header::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));}
.form-detail-header h1{font-family:var(--ff-serif);font-size:17px;font-weight:600;}
.form-detail-header .fh-meta{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;}

/* ─── LOCK BAR ─── */
.lock-bar{background:#FFF8E8;border:1px solid #E8D080;border-radius:var(--r);padding:10px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:#7A6020;}
.lock-bar input{padding:5px 9px;border:1px solid #D4B840;border-radius:var(--r);font-size:12px;background:#fff;width:90px;color:var(--ink);}
.lock-bar .unlock-btn{padding:5px 12px;background:#7A6020;color:#fff;border:none;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;}

/* ─── CARDS ─── */
.card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:1rem;overflow:hidden;}
.card-head{background:var(--cream);border-bottom:1px solid var(--border2);padding:9px 1.1rem;display:flex;align-items:center;gap:8px;}
.card-head-title{font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.2px;}
.card-body{padding:1.1rem;}

/* ─── FIELDS ─── */
.field{margin-bottom:.9rem;}
.field:last-child{margin-bottom:0;}
.field>label{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:5px;letter-spacing:.3px;}
.field input[type=text],.field input[type=number],.field input[type=date],.field textarea,.field select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);background:#fff;color:var(--ink);font-size:13px;font-family:var(--ff-sans);outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold);}
.field input:disabled,.field textarea:disabled,.field select:disabled{background:var(--cream);color:var(--ink3);cursor:not-allowed;}
.field textarea{resize:vertical;min-height:68px;}
.t-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:999px;background:#F5EBE8;color:var(--red);border:1px solid #E8C8C0;margin-left:4px;font-weight:600;}
.s-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:999px;background:#E8F0EE;color:var(--blue);border:1px solid #C0D4D0;margin-left:4px;font-weight:600;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:560px){.g2,.g3{grid-template-columns:1fr;}}

/* ─── RATING ─── */
.rating-table{width:100%;border-collapse:collapse;font-size:12px;}
.rating-table th,.rating-table td{padding:6px 7px;border:1px solid var(--border2);vertical-align:middle;}
.rating-table th{background:var(--cream);font-size:10px;font-weight:600;color:var(--ink3);text-align:center;}
.rating-table td.row-label{font-size:12px;color:var(--ink);text-align:left;}
.r-btn{width:28px;height:28px;border-radius:4px;border:1px solid var(--border);background:#fff;font-size:10px;cursor:pointer;color:var(--ink3);transition:all .12s;}
.r-btn.sel-s{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}
.r-btn.sel-t{background:var(--red);border-color:var(--red);color:#fff;font-weight:600;}
.r-btn.sel-a{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600;}
.r-btn:disabled{cursor:not-allowed;opacity:.3;}

/* ─── DOPS TABLE ─── */
.dops-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.dops-tbl th{background:var(--ink);color:#fff;padding:5px 4px;text-align:center;font-size:10px;}
.dops-tbl td{padding:5px 4px;border:1px solid var(--border2);vertical-align:middle;}
.dops-tbl .item-cell{font-size:11px;color:var(--ink);padding-right:8px;}
.d-btn{width:22px;height:22px;border-radius:3px;border:1px solid var(--border);background:#fff;font-size:9px;cursor:pointer;color:var(--ink3);}
.d-btn.sel{background:var(--red);border-color:var(--red);color:#fff;}
.d-btn:disabled{cursor:not-allowed;opacity:.3;}

/* ─── EPA levels ─── */
.epa-level{display:flex;align-items:flex-start;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:6px;transition:all .2s;}
.epa-level.sel{border-color:var(--red);background:#FDF5F5;}
.epa-level:hover:not(.sel){border-color:var(--border);background:var(--cream);}
.epa-lv-num{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.epa-lv-desc{font-size:12px;color:var(--ink2);}

/* ─── CHECK / RADIO ─── */
.check-group{display:flex;flex-wrap:wrap;gap:8px;}
.check-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink2);}
.check-item input{accent-color:var(--gold);}

/* ─── FORM FOOTER ─── */
.form-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:1rem 0 .5rem;flex-wrap:wrap;}
.form-footer-right{display:flex;gap:8px;align-items:center;}
.saved-msg{font-size:11px;color:var(--green);font-weight:500;display:none;}
.btn-save{padding:9px 22px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-save:hover{opacity:.85;}
.btn-pdf{padding:9px 18px;background:var(--red);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;display:none;transition:opacity .2s;}
.btn-pdf:hover{opacity:.85;}
.btn-back{padding:9px 16px;background:transparent;color:var(--ink3);border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;}

/* ─── HISTORY LOG ─── */
.history-log{margin-top:1rem;}
.history-title{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.history-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);margin-bottom:5px;background:#fff;font-size:11px;}
.history-time{color:var(--ink3);font-family:monospace;}
.history-who{padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600;}
.hw-s{background:#E8F0EE;color:var(--blue);}
.hw-t{background:#F5EBE8;color:var(--red);}
.hw-a{background:#FFF8E0;color:var(--gold);}

/* ─── ADMIN PANEL ─── */
.admin-section{padding:1.5rem;}
.admin-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:1rem;overflow:hidden;}
.admin-card-head{background:var(--ink);color:#fff;padding:10px 1.25rem;font-family:var(--ff-serif);font-size:14px;font-weight:600;}
.admin-card-body{padding:1.25rem;}
.admin-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.admin-row input{flex:1;min-width:120px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:#fff;color:var(--ink);}
.admin-row select{flex:1;min-width:120px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:#fff;color:var(--ink);}
.btn-add{padding:7px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;}
.btn-del{padding:5px 10px;background:var(--red);color:#fff;border:none;border-radius:var(--r);font-size:11px;cursor:pointer;}
.btn-update{padding:7px 14px;background:var(--gold);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;}
.accounts-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.accounts-table th{background:var(--cream);padding:6px 8px;text-align:left;border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--ink3);}
.accounts-table td{padding:6px 8px;border:1px solid var(--border2);color:var(--ink);}
.gs-status{font-size:12px;padding:6px 10px;border-radius:var(--r);margin-top:6px;}
.gs-ok{background:#EEF5E8;color:var(--green);border:1px solid #C8E0C0;}
.gs-err{background:#F5EAEA;color:var(--red);border:1px solid #E0C0C0;}
.gs-info{background:#F0F4F8;color:var(--blue);border:1px solid #C0D0E0;}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:12px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

/* ─── PDF ─── */
@media print{
  .topbar,.sidebar,.form-footer,.lock-bar,.history-log,.btn-back,.btn-save,.btn-pdf,.toast{display:none !important;}
  .app-body{display:block;}
  .form-detail-view{padding:.5rem;}
  .main-content{overflow:visible;}
}
</style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="login-header">
      <div class="hosp">TAICHUNG VETERANS GENERAL HOSPITAL</div>
      <div class="title">胸腔部呼吸治療科<br>實習學習護照 e-Portfolio</div>
      <div class="sub">重症呼吸照護 UGY 實習系統</div>
    </div>
    <div class="login-body">
      <div class="role-tabs">
        <div class="role-tab active" id="tab-s" onclick="setLoginRole('student')">實習學生</div>
        <div class="role-tab" id="tab-t" onclick="setLoginRole('teacher')">臨床老師</div>
        <div class="role-tab" id="tab-a" onclick="setLoginRole('admin')">管理員</div>
      </div>

      <!-- STUDENT -->
      <div id="panel-student">
        <div id="student-login-panel">
          <div class="fg"><label>學號</label><input id="s-sid" placeholder="請輸入學號"></div>
          <div class="fg"><label>密碼</label><input id="s-pwd" type="password" placeholder="預設密碼：123"></div>
          <button class="btn-primary" onclick="doLogin('student')">登入</button>
          <div class="login-err" id="s-err">學號或密碼錯誤</div>
          <div class="divider"><div class="divider-line"></div><div class="divider-text">首次登入</div><div class="divider-line"></div></div>
          <button class="btn-ghost" onclick="showPanel('student-reg-panel')">建立帳號</button>
        </div>
        <div id="student-reg-panel" style="display:none;">
          <div class="fg"><label>學號</label><input id="r-sid" placeholder="請輸入學號"></div>
          <div class="fg"><label>姓名</label><input id="r-name" placeholder="請輸入姓名"></div>
          <div class="fg"><label>實習學校</label><input id="r-school" placeholder="例：長庚科技大學"></div>
          <div class="fg"><label>設定密碼（至少6碼）</label><input id="r-pwd" type="password" oninput="checkPwdStrength(this.value)"><div class="strength-bar"><div class="strength-fill" id="r-strength"></div></div></div>
          <div class="fg"><label>確認密碼</label><input id="r-pwd2" type="password"></div>
          <button class="btn-primary" onclick="doRegister()">建立帳號並登入</button>
          <div class="login-err" id="r-err">請確認所有欄位</div>
          <button class="btn-ghost" onclick="showPanel('student-login-panel')">← 返回登入</button>
        </div>
        <div id="student-change-panel" style="display:none;">
          <div style="font-size:13px;font-weight:600;margin-bottom:1rem;">修改密碼</div>
          <div class="fg"><label>舊密碼</label><input id="cp-old" type="password"></div>
          <div class="fg"><label>新密碼</label><input id="cp-new" type="password"></div>
          <div class="fg"><label>確認新密碼</label><input id="cp-new2" type="password"></div>
          <button class="btn-primary" onclick="changeStudentPwd()">儲存新密碼</button>
          <div class="login-err" id="cp-err">密碼修改失敗</div>
          <button class="btn-ghost" onclick="showPanel('student-login-panel')">← 返回</button>
        </div>
      </div>

      <!-- TEACHER -->
      <div id="panel-teacher" style="display:none;">
        <div class="fg"><label>教師卡號</label><input id="t-card" placeholder="請輸入卡號"></div>
        <div class="fg"><label>密碼</label><input id="t-pwd" type="password" placeholder="預設：000"></div>
        <button class="btn-primary" onclick="doLogin('teacher')">登入</button>
        <div class="login-err" id="t-err">卡號或密碼錯誤</div>
      </div>

      <!-- ADMIN -->
      <div id="panel-admin" style="display:none;">
        <div class="fg"><label>管理員帳號</label><input id="a-id" placeholder="popololoqoo@gmail.com"></div>

function loadGoogleIdentity() {
  return new Promise((resolve) => {

    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = resolve;
    document.head.appendChild(s);
  });
}

async function initGoogleAuth() {
  if (GOOGLE_CLIENT_ID === 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com') {
    updateGsStatus('warn', '⚠ 請在程式碼中填入 Google Client ID 後才能使用 Sheets 同步');
    return;
  }
  await loadGoogleIdentity();
  GS.tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPES,
    callback: (resp) => {
      if (resp.error) { updateGsStatus('err', '授權失敗：' + resp.error); return; }
      GS.accessToken = resp.access_token;
      GS.isReady = true;
      updateGsStatus('ok', '✓ 已連接 Google Sheets（' + ADMIN_EMAIL + '）');
      toast('Google Sheets 已授權，儲存時將自動同步');

/* ═══════════ SAVE ═══════════ */
function saveForm(id){
  // Collect all inputs
  if(!APP.formData[id])APP.formData[id]={};
  document.querySelectorAll('[data-fid="'+id+'"][data-key]').forEach(el=>{
    if(!el.disabled){
      APP.formData[id][el.dataset.key]=el.value;
    }
  });
  // Record history
  if(!APP.historyLog[id])APP.historyLog[id]=[];
  const roleLabel={student:'學生',teacher:'臨床老師',admin:'管理員'}[APP.currentRole];
  APP.historyLog[id].unshift({ts:new Date().toISOString(),role:APP.currentRole,roleLabel,name:APP.currentUser.name});

/* ═══════════ GOOGLE SHEETS UPLOAD ═══════════ */
async function uploadToSheets(id) {
  const d = APP.formData[id] || {};
  const f = findForm(id);
  const u = APP.currentUser;
  const now = new Date();
  const ts = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const roleLabel = {student:'學生', teacher:'臨床老師', admin:'管理員'}[APP.currentRole] || '';

  if (!GS.isReady || !GS.accessToken) {
    updateGsStatus('warn', '⚠ Google Sheets 尚未授權，請至管理員面板完成授權後再儲存');
    return;
  }

  // Build row: [時間戳記, 表單名稱, 使用者, 角色, ...所有欄位值]
  const row = [ts, f.name, u.name, roleLabel];
  // Add all key:value pairs as separate columns
  const keys = Object.keys(d);
  keys.forEach(k => row.push(d[k] ?? ''));

  // Determine sheet tab name (one tab per form)
  const sheetName = (f.num + '_' + f.name).slice(0, 31).replace(/[\\\/\?\*\[\]]/g, '_');

  try {
    // 1. Try to get sheet metadata to check if tab exists
    const metaResp = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}`,
      { headers: { Authorization: 'Bearer ' + GS.accessToken } }
    );
    const meta = await metaResp.json();
    const sheetExists = meta.sheets?.some(s => s.properties.title === sheetName);

    // 2. Create sheet tab if it doesn't exist
    if (!sheetExists) {
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}:batchUpdate`, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + GS.accessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ requests: [{ addSheet: { properties: { title: sheetName } } }] })
      });
      // Write header row
      const headers = ['時間戳記', '表單名稱', '填寫者', '角色', ...keys];
      await appendRow(sheetName, headers);

      // Special: for F03 satisfaction, also write an averages header row
      if (id === 'F03') {
        await appendRow(sheetName, ['--- 平均分數 ---']);
      }
    }

    // 3. Append data row
    await appendRow(sheetName, row);

    // 4. Special handling: F03 satisfaction — recalculate averages
    if (id === 'F03') {
      await updateSatisfactionAverages(sheetName, d);
    }

    updateGsStatus('ok', `✓ 已同步至 Google Sheets（${ts}）`);
    toast('✓ 已上傳至 Google Sheets');
  } catch (err) {
    console.error('Sheets upload error:', err);
    updateGsStatus('err', '上傳失敗：' + (err.message || '請確認授權是否仍有效'));
    toast('Google Sheets 上傳失敗', false);
  }
}

async function appendRow(sheetName, values) {
  const body = { values: [values.map(v => String(v ?? ''))] };
  const resp = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(sheetName)}!A1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
    { method: 'POST', headers: { Authorization: 'Bearer ' + GS.accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
  );
  return resp.json();
}

async function updateSatisfactionAverages(sheetName, latestData) {
  // Read all rows to compute per-question averages across all students
  try {
    const resp = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(sheetName)}`,
      { headers: { Authorization: 'Bearer ' + GS.accessToken } }
    );
    const data = await resp.json();
    const rows = data.values || [];
    if (rows.length < 2) return;

    const headers = rows[0];
    // Find question columns (f03t_0 … f03c_2)
    const qPrefixes = ['f03t_', 'f03c_'];
    const qCols = headers.reduce((acc, h, i) => {
      if (qPrefixes.some(p => h.startsWith?.(p) || String(h).startsWith(p))) acc.push({ idx: i, key: h });
      return acc;
    }, []);

    if (qCols.length === 0) return;

    // Compute averages from data rows (skip header & any avg rows)
    const dataRows = rows.slice(1).filter(r => r[0] && !String(r[0]).startsWith('---'));
    const avgs = qCols.map(({ idx }) => {
      const vals = dataRows.map(r => parseFloat(r[idx])).filter(v => !isNaN(v) && v > 0);
      return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '—';
    });

    // Find or create the averages row (marked with '--- 平均分數 ---' in col A)
    const avgRowIdx = rows.findIndex(r => String(r[0]).startsWith('---'));
    const avgRowValues = ['--- 平均分數 ---', '', '', '', ...Array(headers.length - 4).fill('')];
    qCols.forEach(({ idx }, i) => { avgRowValues[idx] = avgs[i]; });

    if (avgRowIdx >= 0) {
      // Update existing avg row
      const rowNum = avgRowIdx + 1; // 1-indexed
      await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(sheetName)}!A${rowNum}:update?valueInputOption=USER_ENTERED`,
        { method: 'PUT', headers: { Authorization: 'Bearer ' + GS.accessToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ values: [avgRowValues.map(v => String(v))] }) }
      );
    } else {
      await appendRow(sheetName, avgRowValues);
    }
  } catch (e) { console.warn('Average update failed:', e); }
}

function buildDOPS(f,d,canT){
  const data=DOPS_DATA[f.id];if(!data)return buildGeneric(f,d,canT);
  let h=basicInfoCard(f.id,d,'');
  let itemIdx=0;
  data.groups.forEach(g=>{
    h+=`<div class="card"><div class="card-head"><div class="card-head-title">${g.hd}<span class="t-badge">老師評分 1-9 / NA</span></div></div><div class="card-body" style="overflow-x:auto;">
      <table class="dops-tbl"><thead><tr><th style="text-align:left;min-width:160px;">評核內容</th>
        ${[1,2,3,4,5,6,7,8,9,'NA'].map(v=>`<th>${v}</th>`).join('')}
      </tr></thead><tbody>`;
    g.items.forEach(item=>{
      const key=`${f.id}_i${++itemIdx}`;
      h+=`<tr><td class="item-cell">${itemIdx}. ${item}</td>`;
      [...[1,2,3,4,5,6,7,8,9],'NA'].forEach(v=>{
        const sel=(d[key]==v||d[key]===v)?'sel':'';
        h+=`<td style="text-align:center;"><button class="d-btn ${sel}" ${!canT?'disabled':''} data-fid="${f.id}" data-key="${key}" data-rval="${v}" onclick="setDOPS('${f.id}','${key}',${JSON.stringify(v)},this)">${d[key]==v||d[key]===v?'●':''}</button></td>`;
      });
      h+=`</tr>`;
    });
    h+=`</tbody></table></div></div>`;
  });
  h+=`<div class="card"><div class="card-head"><div class="card-head-title">評量結果<span class="t-badge">老師</span></div></div><div class="card-body">
    <div class="field"><label>評量結果</label><div class="check-group">${['合格','不合格'].map(v=>`<label class="check-item"><input type="radio" name="${f.id}_result" ${d['result']===v?'checked':''} ${!canT?'disabled':''} onchange="APP.formData['${f.id}']=APP.formData['${f.id}']||{};APP.formData['${f.id}']['result']='${v}'" style="accent-color:var(--gold);"> ${v}</label>`).join('')}</div></div>
    <div class="field"><label>評分分數（0-100）<span class="t-badge">老師</span></label>${fi(f.id,'score','number',!canT)}</div>
    <div class="field"><label>學生自覺技術複雜度</label><div class="check-group">${['低','中','高'].map(v=>`<label class="check-item"><input type="radio" name="${f.id}_cx" ${d['complexity']===v?'checked':''} onchange="APP.formData['${f.id}']=APP.formData['${f.id}']||{};APP.formData['${f.id}']['complexity']='${v}'" style="accent-color:var(--gold);"> ${v}</label>`).join('')}</div></div>
    <div class="field"><label>學生對此技術操作的心得感受</label>${ta(f.id,'s_feeling',3,false)}</div>
    <div class="field"><label>老師回饋<span class="t-badge">老師</span></label>${ta(f.id,'t_fb',3,!canT)}</div>
    ${signRow(f.id,'s_sign','t_sign',canT)}
  </div></div>`;
  return h;
}
function setDOPS(fid,key,val,btn){
  if(!APP.formData[fid])APP.formData[fid]={};
  APP.formData[fid][key]=val;
  const row=btn.closest('tr');
  row.querySelectorAll('.d-btn').forEach(b=>{
    const v=b.dataset.rval;
    const match=(v==val||v===String(val));
    b.classList.toggle('sel',match);
    b.textContent=match?'●':'';
  });
}

const EPA_NAMES={E01:'(6) 侵襲性呼吸器初始設定及照護',E02:'(8) 使用呼吸器病人之緊急處置',E03:'(10) 侵襲性呼吸器病人之脫離照護'};
function buildEPA(f,d,canT){
  const lvls=[['1','僅觀察，不得獨立操作'],['2','需主動協助，可在直接監督下操作'],['3','需被動協助，可在間接監督下操作'],['4','可獨立操作，只需遠端監督'],['5','可指導他人操作']];

  return h;

/* ─── F15 課程評值 ─── */
function buildF15(f,d,canT){
  const atts=['能確立個人學習目標','能主動參與所有教學活動、尋求學習機會','能遵守臨床實習規則','能適切表達意見、提出問題或尋求協助','能誠懇接受指導者之教導及建議','負責盡職'];
  const skills=['能利用適當工具執行病人評估及確立病人問題','能依病人問題擬定適當治療計劃選擇適當治療項目並評值','能擬定適當治療項目','能正確獨立執行各項治療技術','能評值治療結果作後續之建議','能正確執行呼吸監護紀錄','能正確操作及運用實習單位相關設備','能正確設定與調整呼吸器並評估病人反應','具備病人照護基本知識與技能','具備邏輯思考能力，能統整專業知識'];
  const comms=['能尊重與溝通實習單位其他醫療人員','能運用適當溝通技巧，與病人及家屬溝通','在提供治療時顧及病人安全舒適及隱私','能維持適當的專業角色'];
  const mkSection=(title,items,prefix)=>{
    let s=`<div class="card"><div class="card-head"><div class="card-head-title">${title}<span class="t-badge">老師評分</span></div></div><div class="card-body" style="overflow-x:auto;"><table class="rating-table">
      <tr><th style="text-align:left;">評值項目（每項5分）</th><th>優(5)</th><th>良(4)</th><th>普(3)</th><th>差(2)</th><th>劣(1)</th></tr>`;
    items.forEach((item,i)=>{
      const key=`${prefix}_${i}`;
      s+=`<tr><td class="row-label">${i+1}. ${item}</td>`;
      [5,4,3,2,1].forEach(v=>s+=`<td style="text-align:center;">${rBtnTable(f.id,key,v,'t',!canT)}</td>`);
      s+=`</tr>`;
    });
    s+=`</table></div></div>`;
    return s;
  };
  let h=basicInfoCard(f.id,d,'');
  h+=mkSection('一、學習態度（30%）',atts,'f15_att');
  h+=mkSection('二、專業知識及技能（50%）',skills,'f15_skl');
  h+=mkSection('三、溝通、協調與專業態度（20%）',comms,'f15_com');
  h+=`<div class="card"><div class="card-head"><div class="card-head-title">加分項目<span class="t-badge">老師</span></div></div><div class="card-body">
    <div class="field"><label>臨床專業能力可獨立負責一般治療師1/2以上工作量（加分項目）</label>
      <div class="check-group">${['是（+5分）','否（+0分）'].map(v=>`<label class="check-item"><input type="radio" name="f15_bonus" ${d['bonus']===v?'checked':''} ${!canT?'disabled':''} onchange="APP.formData['${f.id}']=APP.formData['${f.id}']||{};APP.formData['${f.id}']['bonus']='${v}'" style="accent-color:var(--gold);"> ${v}</label>`).join('')}</div>
    </div>
  </div></div>`;
  h+=`<div class="card"><div class="card-head"><div class="card-head-title">請假紀錄與回饋</div></div><div class="card-body">
    <div class="g3">
      <div class="field"><label>公假（天）</label>${fi(f.id,'leave_pub','number',false)}</div>
      <div class="field"><label>病假（天）</label>${fi(f.id,'leave_sick','number',false)}</div>
      <div class="field"><label>事假（天）</label>${fi(f.id,'leave_priv','number',false)}</div>
    </div>
    <div class="g2">
      <div class="field"><label>遲到（次）</label>${fi(f.id,'late_cnt','number',false)}</div>
    </div>
    <div class="field"><label>學生自我評語和建議</label>${ta(f.id,'s_comment',3,false)}</div>
    <div class="field"><label>師生檢討與回饋<span class="t-badge">老師</span></label>${ta(f.id,'t_fb',4,!canT)}</div>
    ${signRow(f.id,'s_sign','t_sign',canT)}
  </div></div>`;
  return h;
}

function updatePIN(){const v=document.getElementById('pin-display').value.trim();if(v){APP.teacherPIN=v;toast('PIN碼已更新');}}
function updateAdminPwd(){
  const p=document.getElementById('new-admin-pwd').value;

function addStudent(){
  const sid=document.getElementById('ns-sid').value.trim();

function connectGoogleSheets(){
  if (GOOGLE_CLIENT_ID === 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com') {
    updateGsStatus('warn', '⚠ 請先在程式碼中填入您的 Google OAuth Client ID');
    alert('尚未設定 Google Client ID。\n\n請照以下步驟：\n1. 前往 console.cloud.google.com\n2. 建立專案 → 啟用 Sheets API\n3. 建立 OAuth 憑證（網頁應用程式）→ 取得 Client ID\n4. 將 Client ID 貼入程式碼 GOOGLE_CLIENT_ID 變數\n5. 在「已授權的 JavaScript 來源」加入此頁面的網址');
    return;
  }
  updateGsStatus('info', '正在開啟 Google 授權…');
  if (!GS.tokenClient) {
    initGoogleAuth().then(() => { if (GS.tokenClient) GS.tokenClient.requestAccessToken(); });
  } else {
    GS.tokenClient.requestAccessToken();
  }
}
</script>
