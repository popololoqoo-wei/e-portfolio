<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>臺中榮總 — 實習學習護照 e-Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F9F6F0; --paper:#FDFBF7; --ink:#1A1612; --ink2:#3D3530; --ink3:#7A706A;
  --gold:#B8860B; --gold2:#D4A017; --red:#8B2020; --green:#2D5A27; --blue:#1A3A5C;
  --border:#D4C9BB; --border2:#EAE2D8; --shadow:rgba(26,22,18,.08);
  --ff-serif:'Noto Serif TC',serif; --ff-sans:'Noto Sans TC',sans-serif;
  --r:6px; --r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ff-sans);background:var(--cream);color:var(--ink);min-height:100vh;font-size:14px;}

/* ─── WATERMARK TEXTURE ─── */
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(180,160,130,.06) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(180,160,130,.06) 40px);pointer-events:none;z-index:0;}

/* ─── SCREENS ─── */
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}

/* ─── LOGIN ─── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);box-shadow:0 4px 24px var(--shadow),0 0 0 1px rgba(180,160,130,.2);width:100%;max-width:460px;overflow:hidden;}
.login-header{background:var(--ink);padding:2rem;text-align:center;position:relative;}
.login-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));}
.login-header .hosp{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:8px;font-family:var(--ff-sans);}
.login-header .title{font-family:var(--ff-serif);font-size:20px;color:#fff;font-weight:600;line-height:1.4;}
.login-header .sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:6px;letter-spacing:.5px;}
.login-body{padding:2rem;}
.role-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1.5rem;}
.role-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink3);background:var(--cream);transition:all .2s;border:none;border-right:1px solid var(--border);}
.role-tab:last-child{border-right:none;}
.role-tab.active{background:var(--ink);color:#fff;}
.fg{margin-bottom:1.1rem;}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase;}
.fg input,.fg select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:#fff;color:var(--ink);font-size:13px;font-family:var(--ff-sans);outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--ink);}
.login-err{font-size:12px;color:var(--red);margin-top:6px;display:none;}
.btn-primary{width:100%;padding:11px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--ff-sans);letter-spacing:.5px;transition:opacity .2s;margin-top:.25rem;}
.btn-primary:hover{opacity:.85;}
.btn-ghost{width:100%;padding:10px;background:transparent;color:var(--ink3);border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;font-family:var(--ff-sans);margin-top:8px;transition:all .2s;}
.btn-ghost:hover{border-color:var(--ink);color:var(--ink);}
.divider{display:flex;align-items:center;gap:10px;margin:1rem 0;}
.divider-line{flex:1;height:1px;background:var(--border2);}
.divider-text{font-size:11px;color:var(--ink3);}
.strength-bar{height:3px;border-radius:3px;background:var(--border2);margin-top:5px;overflow:hidden;}
.strength-fill{height:100%;border-radius:3px;transition:width .3s,background .3s;width:0;}

/* ─── MAIN APP ─── */
#app-screen{min-height:100vh;}
.topbar{background:var(--ink);color:#fff;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{font-family:var(--ff-serif);font-size:15px;font-weight:600;}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.user-badge{font-size:11px;background:rgba(255,255,255,.12);padding:4px 10px;border-radius:999px;color:rgba(255,255,255,.8);}
.role-chip{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:600;}
.chip-s{background:rgba(45,90,39,.8);color:#A8E6A0;}
.chip-t{background:rgba(139,32,32,.7);color:#F5C5C5;}
.chip-a{background:rgba(184,134,11,.7);color:#FFF0A0;}
.logout-btn{padding:5px 12px;background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:var(--r);color:rgba(255,255,255,.65);font-size:11px;cursor:pointer;transition:all .2s;}
.logout-btn:hover{background:rgba(255,255,255,.1);}

/* ─── BODY LAYOUT ─── */
.app-body{display:flex;min-height:calc(100vh - 54px);}
.sidebar{width:200px;background:var(--paper);border-right:1px solid var(--border);padding:1.25rem 0;flex-shrink:0;}
@media(max-width:768px){
  .app-body{flex-direction:column;}
  .sidebar{display:none !important;}
  .main-content{width:100% !important;min-height:calc(100vh - 54px);}
  .form-detail-view{padding:.6rem;}
  .form-list-view{padding:.75rem;}
  .g2,.g3{grid-template-columns:1fr !important;}
  .card-body{padding:.75rem;}
  .form-grid{grid-template-columns:1fr !important;}
  .mobile-nav{display:flex !important;}
  .admin-section{padding:.75rem;}
  .admin-row{flex-wrap:wrap;}
  .rating-table th,.rating-table td{padding:4px 3px;font-size:10px;}
  .r-btn{width:22px;height:22px;font-size:9px;}
}
.mobile-nav{display:none;background:var(--paper);border-bottom:1px solid var(--border);padding:8px 12px;gap:6px;overflow-x:auto;align-items:center;position:sticky;top:54px;z-index:40;}
.mobile-nav-btn{padding:6px 12px;border:1px solid var(--border);border-radius:999px;font-size:11px;white-space:nowrap;cursor:pointer;color:var(--ink2);background:var(--cream);flex-shrink:0;transition:all .15s;}
.mobile-nav-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.mobile-menu-select{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:var(--paper);color:var(--ink);max-width:100%;}
.sidebar-section{padding:0 1rem .5rem;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;margin-top:1rem;}
.sidebar-item{padding:8px 1.25rem;font-size:12px;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s;border-left:2px solid transparent;}
.sidebar-item:hover{background:var(--cream);color:var(--ink);}
.sidebar-item.active{background:var(--cream);border-left-color:var(--gold);color:var(--ink);font-weight:500;}
.sidebar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dot-done{background:var(--green);}
.dot-wait{background:var(--gold);}
.dot-partial{background:#5A8AAA;}
.dot-new{background:var(--border);}
.main-content{flex:1;overflow-y:auto;}

/* ─── FORM LIST (dashboard) ─── */
.form-list-view{padding:1.5rem;}
.section-header{display:flex;align-items:baseline;gap:10px;margin:1.5rem 0 .8rem;padding-bottom:6px;border-bottom:1px solid var(--border);}
.section-header:first-child{margin-top:0;}
.section-header h2{font-family:var(--ff-serif);font-size:16px;font-weight:600;color:var(--ink);}
.section-header span{font-size:11px;color:var(--ink3);}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;}
.form-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);padding:1rem 1.1rem;cursor:pointer;transition:all .2s;position:relative;}
.form-card:hover{border-color:var(--gold);box-shadow:0 2px 12px var(--shadow);}
.form-card-num{font-size:10px;color:var(--ink3);margin-bottom:3px;font-weight:600;letter-spacing:.5px;}
.form-card-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.4;}
.form-card-sub{font-size:11px;color:var(--ink3);margin-top:4px;}
.form-card-meta{margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.tag{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:500;}
.tag-both{background:#EEF3E8;color:var(--green);border:1px solid #C8DFC0;}
.tag-student{background:#E8F0EE;color:var(--blue);border:1px solid #BFD4D0;}
.tag-teacher{background:#F5EBE8;color:var(--red);border:1px solid #E0C8C0;}
.form-card-status{font-size:10px;color:var(--ink3);}

/* ─── FORM DETAIL ─── */
.form-detail-view{padding:1.5rem;max-width:860px;}
.form-detail-header{background:var(--ink);color:#fff;border-radius:var(--r2);padding:1.25rem 1.5rem;margin-bottom:1.25rem;position:relative;overflow:hidden;}
.form-detail-header::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));}
.form-detail-header h1{font-family:var(--ff-serif);font-size:17px;font-weight:600;}
.form-detail-header .fh-meta{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px;}

/* ─── LOCK BAR ─── */
.lock-bar{background:#FFF8E8;border:1px solid #E8D080;border-radius:var(--r);padding:10px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:#7A6020;}
.lock-bar input{padding:5px 9px;border:1px solid #D4B840;border-radius:var(--r);font-size:12px;background:#fff;width:90px;color:var(--ink);}
.lock-bar .unlock-btn{padding:5px 12px;background:#7A6020;color:#fff;border:none;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;}

/* ─── CARDS ─── */
.card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:1rem;overflow:hidden;}
.card-head{background:var(--cream);border-bottom:1px solid var(--border2);padding:9px 1.1rem;display:flex;align-items:center;gap:8px;}
.card-head-title{font-size:12px;font-weight:700;color:var(--ink);letter-spacing:.2px;}
.card-body{padding:1.1rem;}

/* ─── FIELDS ─── */
.field{margin-bottom:.9rem;}
.field:last-child{margin-bottom:0;}
.field>label{display:block;font-size:11px;font-weight:600;color:var(--ink3);margin-bottom:5px;letter-spacing:.3px;}
.field input[type=text],.field input[type=number],.field input[type=date],.field textarea,.field select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);background:#fff;color:var(--ink);font-size:13px;font-family:var(--ff-sans);outline:none;transition:border-color .2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold);}
.field input:disabled,.field textarea:disabled,.field select:disabled{background:var(--cream);color:var(--ink3);cursor:not-allowed;}
.field textarea{resize:vertical;min-height:68px;}
.t-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:999px;background:#F5EBE8;color:var(--red);border:1px solid #E8C8C0;margin-left:4px;font-weight:600;}
.s-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:999px;background:#E8F0EE;color:var(--blue);border:1px solid #C0D4D0;margin-left:4px;font-weight:600;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:560px){.g2,.g3{grid-template-columns:1fr;}}

/* ─── RATING ─── */
.rating-table{width:100%;border-collapse:collapse;font-size:12px;}
.rating-table th,.rating-table td{padding:6px 7px;border:1px solid var(--border2);vertical-align:middle;}
.rating-table th{background:var(--cream);font-size:10px;font-weight:600;color:var(--ink3);text-align:center;}
.rating-table td.row-label{font-size:12px;color:var(--ink);text-align:left;}
.r-btn{width:28px;height:28px;border-radius:4px;border:1px solid var(--border);background:#fff;font-size:10px;cursor:pointer;color:var(--ink3);transition:all .12s;}
.r-btn.sel-s{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}
.r-btn.sel-t{background:var(--red);border-color:var(--red);color:#fff;font-weight:600;}
.r-btn.sel-a{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600;}
.r-btn:disabled{cursor:not-allowed;opacity:.3;pointer-events:none;}
.r-btn:not(:disabled){cursor:pointer;}

/* ─── DOPS TABLE ─── */
.dops-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.dops-tbl th{background:var(--ink);color:#fff;padding:5px 4px;text-align:center;font-size:10px;}
.dops-tbl td{padding:5px 4px;border:1px solid var(--border2);vertical-align:middle;}
.dops-tbl .item-cell{font-size:11px;color:var(--ink);padding-right:8px;}
.d-btn{width:22px;height:22px;border-radius:3px;border:1px solid var(--border);background:#fff;font-size:9px;cursor:pointer;color:var(--ink3);}
.d-btn.sel{background:var(--red);border-color:var(--red);color:#fff;}
.d-btn:disabled{cursor:not-allowed;opacity:.3;}

/* ─── EPA levels ─── */
.epa-level{display:flex;align-items:flex-start;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:6px;transition:all .2s;}
.epa-level.sel{border-color:var(--red);background:#FDF5F5;}
.epa-level:hover:not(.sel){border-color:var(--border);background:var(--cream);}
.epa-lv-num{width:28px;height:28px;border-radius:50%;background:var(--ink);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.epa-lv-desc{font-size:12px;color:var(--ink2);}

/* ─── CHECK / RADIO ─── */
.check-group{display:flex;flex-wrap:wrap;gap:8px;}
.check-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink2);}
.check-item input{accent-color:var(--gold);}

/* ─── FORM FOOTER ─── */
.form-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:1rem 0 .5rem;flex-wrap:wrap;}
.form-footer-right{display:flex;gap:8px;align-items:center;}
.saved-msg{font-size:11px;color:var(--green);font-weight:500;display:none;}
.btn-save{padding:9px 22px;background:var(--ink);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;}
.btn-save:hover{opacity:.85;}
.btn-pdf{padding:9px 18px;background:var(--red);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;display:none;transition:opacity .2s;}
.btn-pdf:hover{opacity:.85;}
.btn-back{padding:9px 16px;background:transparent;color:var(--ink3);border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;}

/* ─── HISTORY LOG ─── */
.history-log{margin-top:1rem;}
.history-title{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.history-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);margin-bottom:5px;background:#fff;font-size:11px;}
.history-time{color:var(--ink3);font-family:monospace;}
.history-who{padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600;}
.hw-s{background:#E8F0EE;color:var(--blue);}
.hw-t{background:#F5EBE8;color:var(--red);}
.hw-a{background:#FFF8E0;color:var(--gold);}

/* ─── ADMIN PANEL ─── */
.admin-section{padding:1.5rem;}
.admin-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:1rem;overflow:hidden;}
.admin-card-head{background:var(--ink);color:#fff;padding:10px 1.25rem;font-family:var(--ff-serif);font-size:14px;font-weight:600;}
.admin-card-body{padding:1.25rem;}
.admin-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.admin-row input{flex:1;min-width:120px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:#fff;color:var(--ink);}
.admin-row select{flex:1;min-width:120px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;background:#fff;color:var(--ink);}
.btn-add{padding:7px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;}
.btn-del{padding:5px 10px;background:var(--red);color:#fff;border:none;border-radius:var(--r);font-size:11px;cursor:pointer;}
.btn-update{padding:7px 14px;background:var(--gold);color:#fff;border:none;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;}
.accounts-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.accounts-table th{background:var(--cream);padding:6px 8px;text-align:left;border:1px solid var(--border2);font-size:11px;font-weight:700;color:var(--ink3);}
.accounts-table td{padding:6px 8px;border:1px solid var(--border2);color:var(--ink);}
.gs-status{font-size:12px;padding:6px 10px;border-radius:var(--r);margin-top:6px;}
.gs-ok{background:#EEF5E8;color:var(--green);border:1px solid #C8E0C0;}
.gs-err{background:#F5EAEA;color:var(--red);border:1px solid #E0C0C0;}
.gs-info{background:#F0F4F8;color:var(--blue);border:1px solid #C0D0E0;}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:#fff;padding:10px 18px;border-radius:var(--r);font-size:12px;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

/* ─── PDF ─── */
@media print{
  .topbar,.sidebar,.form-footer,.lock-bar,.history-log,.btn-back,.btn-save,.btn-pdf,.toast{display:none !important;}
  .app-body{display:block;}
  .form-detail-view{padding:.5rem;}
  .main-content{overflow:visible;}
}
</style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <div class="login-header">
      <div class="hosp">TAICHUNG VETERANS GENERAL HOSPITAL</div>
      <div class="title">胸腔部呼吸治療科<br>實習學習護照 e-Portfolio</div>
      <div class="sub">重症呼吸照護 UGY 實習系統</div>
    </div>
    <div class="login-body">
      <div class="role-tabs">
        <div class="role-tab active" id="tab-s" onclick="setLoginRole('student')">實習學生</div>
        <div class="role-tab" id="tab-t" onclick="setLoginRole('teacher')">臨床老師</div>
        <div class="role-tab" id="tab-a" onclick="setLoginRole('admin')">管理員</div>
      </div>

      <!-- STUDENT -->
      <div id="panel-student">
        <div id="student-login-panel">
          <div class="fg"><label>學號</label><input id="s-sid" placeholder="請輸入學號"></div>
          <div class="fg"><label>密碼</label><input id="s-pwd" type="password" placeholder="預設密碼：123"></div>
          <button class="btn-primary" onclick="doLogin('student')">登入</button>
          <div class="login-err" id="s-err">學號或密碼錯誤</div>
          <div class="divider"><div class="divider-line"></div><div class="divider-text">首次登入</div><div class="divider-line"></div></div>
          <button class="btn-ghost" onclick="showPanel('student-reg-panel')">建立帳號</button>
        </div>
        <div id="student-reg-panel" style="display:none;">
          <div class="fg"><label>學號</label><input id="r-sid" placeholder="請輸入學號"></div>
          <div class="fg"><label>姓名</label><input id="r-name" placeholder="請輸入姓名"></div>
          <div class="fg"><label>實習學校</label><input id="r-school" placeholder="例：長庚科技大學"></div>
          <div class="fg"><label>設定密碼（至少6碼）</label><input id="r-pwd" type="password" oninput="checkPwdStrength(this.value)"><div class="strength-bar"><div class="strength-fill" id="r-strength"></div></div></div>
          <div class="fg"><label>確認密碼</label><input id="r-pwd2" type="password"></div>
          <button class="btn-primary" onclick="doRegister()">建立帳號並登入</button>
          <div class="login-err" id="r-err">請確認所有欄位</div>

function loadGoogleIdentity() {
  return new Promise((resolve) => {
    if (window.google && window.google.accounts) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = resolve;
    document.head.appendChild(s);
  });
}

async function initGoogleAuth() {
  if (GOOGLE_CLIENT_ID === 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com') {
    updateGsStatus('warn', '⚠ 請在程式碼中填入 Google Client ID 後才能使用 Sheets 同步');
    return;
  }
  await loadGoogleIdentity();
  GS.tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPES,
    callback: (resp) => {
      if (resp.error) { updateGsStatus('err', '授權失敗：' + resp.error); return; }
      GS.accessToken = resp.access_token;
      GS.isReady = true;
      updateGsStatus('ok', '✓ 已連接 Google Sheets（' + ADMIN_EMAIL + '）');
      toast('Google Sheets 已授權，正在載入設定…');

    return;

  updateGsStatus('info', '正在開啟 Google 授權…');
  if (!GS.tokenClient) { initGoogleAuth().then(() => { if(GS.tokenClient) GS.tokenClient.requestAccessToken(); }); }

}

function checkPwdStrength(pw){
  let s=0;if(pw.length>=6)s++;if(pw.length>=8)s++;if(/[A-Z]/.test(pw))s++;if(/\d/.test(pw))s++;
  const bar=document.getElementById('r-strength');if(!bar)return;
  const pct=[0,25,50,75,100][s]||0;
  const color=['#8B2020','#D4A017','#D4A017','#2D5A27','#1A5C3A'][s]||'#ccc';
  bar.style.width=pct+'%';bar.style.background=color;
}

function doLogin(role){
  if(role==='student'){
    const sid=document.getElementById('s-sid').value.trim();
    const pwd=document.getElementById('s-pwd').value;
    const acc=APP.students[sid];
    if(!acc||acc.pwd!==pwd){document.getElementById('s-err').style.display='block';return;}
    if(!checkStudentExpiry(sid)){
      const errEl=document.getElementById('s-err');
      errEl.textContent='帳號或密碼已失效，請聯繫管理員';
      errEl.style.display='block';return;
    }
    document.getElementById('s-err').style.display='none';
    APP.currentRole='student';APP.currentUser={sid,name:acc.name,school:acc.school};
    enterApp();
  } else if(role==='teacher'){
    const card=document.getElementById('t-card').value.trim();
    const pwd=document.getElementById('t-pwd').value;
    const acc=APP.teachers[card];
    if(!acc||acc.pwd!==pwd){document.getElementById('t-err').style.display='block';return;}
    document.getElementById('t-err').style.display='none';
    APP.currentRole='teacher';APP.currentUser={card,name:acc.name};
    APP.teacherUnlocked=true;
    enterApp();
  } else {
    const id=document.getElementById('a-id').value.trim();
    const pwd=document.getElementById('a-pwd').value;
    if(id!==ADMIN_EMAIL||pwd!==APP.adminPwd){document.getElementById('a-err').style.display='block';return;}
    document.getElementById('a-err').style.display='none';
    APP.currentRole='admin';APP.currentUser={name:'管理員',email:ADMIN_EMAIL};
    APP.teacherUnlocked=true;
    enterApp();
  }
}
function doRegister(){
  const sid=document.getElementById('r-sid').value.trim();
  const name=document.getElementById('r-name').value.trim();
  const school=document.getElementById('r-school').value.trim();
  const pwd=document.getElementById('r-pwd').value;
  const pwd2=document.getElementById('r-pwd2').value;
  const err=document.getElementById('r-err');
  if(!sid||!name||!school||!pwd){err.textContent='請填寫所有欄位';err.style.display='block';return;}
  if(pwd.length<6){err.textContent='密碼至少6個字元';err.style.display='block';return;}
  if(pwd!==pwd2){err.textContent='兩次密碼不一致';err.style.display='block';return;}
  err.style.display='none';
  APP.students[sid]={name,school,pwd};
  APP.currentRole='student';APP.currentUser={sid,name,school};
  enterApp();
}
function changeStudentPwd(){
  const old=document.getElementById('cp-old').value;
  const nw=document.getElementById('cp-new').value;
  const nw2=document.getElementById('cp-new2').value;
  const err=document.getElementById('cp-err');
  const u=APP.currentUser;
  if(!u||APP.students[u.sid]?.pwd!==old){err.textContent='舊密碼錯誤';err.style.display='block';return;}
  if(nw.length<6){err.textContent='新密碼至少6碼';err.style.display='block';return;}
  if(nw!==nw2){err.textContent='新密碼不一致';err.style.display='block';return;}
  APP.students[u.sid].pwd=nw;
  err.style.display='none';
  toast('密碼已更新');
  showPanel('student-login-panel');
}
function doLogout(){
  APP.currentRole=null;APP.currentUser=null;APP.teacherUnlocked=false;APP.currentFormId=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app-screen').style.display='none';

  document.getElementById('app-screen').classList.remove('active');
}
function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  const u=APP.currentUser;
  const roleLabel={student:'學生',teacher:'臨床老師',admin:'管理員'}[APP.currentRole];
  const roleClass={student:'chip-s',teacher:'chip-t',admin:'chip-a'}[APP.currentRole];
  document.getElementById('topbar-user').textContent=u.name;
  const rc=document.getElementById('topbar-role');
  rc.textContent=roleLabel;rc.className='role-chip '+roleClass;
  const homeBtn=document.getElementById('btn-home');
  if(homeBtn) homeBtn.style.display=(APP.currentRole==='teacher'||APP.currentRole==='admin')?'inline-block':'none';
  // 登入時載入所有草稿資料到 APP.formData
  try{
    var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    Object.keys(drafts).forEach(function(fkey){
      if(!APP.formData[fkey])APP.formData[fkey]={};
      Object.assign(APP.formData[fkey],drafts[fkey]);
    });
  }catch(e){}
  renderSidebar();
  if(APP.currentRole==='admin'){renderAdmin();}
  else if(APP.currentRole==='teacher'){renderTeacherHome();}
  else{renderFormList(); setTimeout(showUnfilledNotification, 800);}
}

function findForm(id){return FORMS.find(f=>f.id===id);}
function getFormKey(id){
  // 每位學生有獨立的表單資料
  if(APP.currentRole==='student' && APP.currentUser){
    return id+'_'+APP.currentUser.sid;

}

/* 各表單學生必填欄位定義 */
const REQUIRED_STUDENT_FIELDS = {
  F01A: Array.from({length:28},function(_,i){return 'f01_pre_'+i;}),
  F01B: ['s_name','s_date'],
  F02: ['s_name','s_date'].concat(Array.from({length:10},function(_,i){return 'f02_'+i;})),
  F03: ['topic','speaker','s_sign'],
  F04: ['diagnosis','medical_focus','rt_plan','s_date'],
  F05: ['teacher_name'].concat(Array.from({length:10},function(_,i){return 'f05_'+i;})),
  F06M: ['s_name','case_dx','s_feeling'],
  F06S: ['s_name','case_dx','s_feeling'],
  F07M: ['s_name','s_fb'],
  F07S: ['s_name','s_fb'],
  F08: ['s_name','discuss_生','discuss_心'],
  F09: ['s_name','c1','c2','s_feeling'],
  F10: ['s_q2','s_q3','s_q4','s_q5','s_q6'],
  F11: ['s_name','goal','motivation','strategy'],
  F12: ['s_name','env_review','teacher_review','self_review'],
  F13: ['s_name','note'],
  F14: ['s_name','case_title'],
  D01: ['s_name','s_date','complexity','s_feeling'],
  D02: ['s_name','s_date','complexity','s_feeling'],
  D03: ['s_name','s_date','complexity','s_feeling'],
  D04: ['s_name','s_date','complexity','s_feeling'],
  E01: ['s_name','s_date','s_note'],
  E02: ['s_name','s_date','s_note'],
  E03: ['s_name','s_date','s_note'],
  F15: ['s_name','s_comment'],
};

const TEACHER_FIELDS_KEY = ['t_fb','t_sign','t_comment','t_good','t_improve','epa_level','result','score','director_fb'];

function hasValue(v){ return v!==undefined&&v!==''&&v!==false&&v!==null; }

function getStatus(id){
  const formKey=getFormKey(id);
  const d=APP.formData[formKey]||{};
  const sLogs=(APP.historyLog[formKey+'_s']||[]);
  const tLogs=(APP.historyLog[formKey+'_t']||[]);
  // 合併 history（向下相容舊格式）
  const logs=APP.historyLog[formKey]||[];
  const hasStudentSaved = sLogs.length>0 || logs.some(function(l){return l.role==='student';});
  const hasTeacherSaved = tLogs.length>0 || logs.some(function(l){return l.role==='teacher'||l.role==='admin';});

  // 完全沒資料 = 未填寫
  const hasAnyData=Object.keys(d).some(function(k){return hasValue(d[k]);});
  if(!hasAnyData) return 'new';

  // 判斷學生必填欄位
  const req=REQUIRED_STUDENT_FIELDS[id]||[];
  const studentFieldsFilled = req.length===0 || req.every(function(k){return hasValue(d[k]);});

  // 判斷老師欄位是否有資料
  const hasTeacherData = TEACHER_FIELDS_KEY.some(function(k){return hasValue(d[k]);}) ||
    Object.keys(d).some(function(k){return /^f(05|06|07|15)_/.test(k)&&hasValue(d[k]);});

  const f=findForm(id);
  const needsTeacher=f&&f.roles==='both';

  // ── 已完成：學生+老師都儲存過，且老師有填資料 ──
  if(needsTeacher && hasStudentSaved && hasTeacherSaved && hasTeacherData && studentFieldsFilled) return 'done';

  // ── 待老師評分：學生必填全填且已儲存，老師尚未填 ──
  if(needsTeacher && hasStudentSaved && studentFieldsFilled && !hasTeacherData) return 'wait';

  // ── 不需要老師的表單：學生儲存就算完成 ──
  if(!needsTeacher && hasStudentSaved && studentFieldsFilled) return 'done';

  // ── 進行中：有任何資料（不管是否儲存過）但未達完成條件 ──
  return 'partial';
}

function getStatusSummary(){
  const statuses=FORMS.map(f=>getStatus(f.id));
  return{
    done:statuses.filter(s=>s==='done').length,
    wait:statuses.filter(s=>s==='wait').length,
    partial:statuses.filter(s=>s==='partial').length,
    newF:statuses.filter(s=>s==='new').length,
    total:FORMS.length
  };
}

function getUnfilledForms(){
  return FORMS.filter(f=>['new','partial'].includes(getStatus(f.id)));
}

  const key = formId+'_'+sid;

  const allT = f.tFields ? f.tFields.every(k=>d[k]&&String(d[k]).trim()) : true;
  if(Object.keys(d).length>0 && !allT) return 'wait';
  return 'done';
}

async function openForm(id){

     !APP.currentFormId.startsWith('__')){

  const canS=APP.currentRole==='student';
  const d=APP.formData[formKey]||{};

  // 老師端：顯示學生選擇器
  let studentBanner='';
  if(APP.currentRole==='teacher'||APP.currentRole==='admin'){
    // 計算每位學生此表單的評核狀態
    const stuRows=Object.entries(APP.students).map(([sid,acc])=>{
      const fkey=id+'_'+sid;

      const hasTeacherData=ff&&ff.tFields&&ff.tFields.length>0?ff.tFields.some(k=>fd[k]&&String(fd[k]).trim()):false;
      let status='unevaluated';
      if(hasStudentData&&hasTeacherData) status='done';
      else if(hasStudentData) status='student_only';
      else if(hasTeacherData) status='teacher_only';
      return {sid,acc,status};
    });

    const stuOpts=stuRows.map(({sid,acc,status})=>{
      const mark=status==='done'?'✅ ':status==='student_only'?'📝 ':status==='teacher_only'?'✏️ ':'⭕ ';
      const label=status==='done'?'（已完成）':status==='student_only'?'（待老師評）':status==='teacher_only'?'（待學生填）':'（未填寫）';
      return `<option value="${sid}" ${APP.currentStudentId===sid?'selected':''}>${mark}${acc.name} ${label}</option>`;
    }).join('');

    const curStu=APP.currentStudentId?APP.students[APP.currentStudentId]:null;

    const doneCount=stuRows.filter(r=>r.status==='done').length;

    const noneCount=stuRows.filter(r=>r.status==='unevaluated').length;

    // 學生狀態卡片列表

      const isActive=APP.currentStudentId===sid;
      const bg=isActive?'background:var(--ink);color:#fff;':'background:#fff;color:var(--ink);';

function inlineUnlock(){
  const pin=document.getElementById('inline-pin').value;

  if(pin===APP.teacherPIN){

/* ═══════════ SAVE ═══════════ */
function saveForm(id){
  const formKey = getFormKey(id);
  // Collect all inputs (only editable fields for current role)
  if(!APP.formData[formKey])APP.formData[formKey]={};
  // Collect text inputs, textareas, selects
  document.querySelectorAll('[data-fid="'+id+'"][data-key]').forEach(el=>{
    if(!el.disabled){
      APP.formData[formKey][el.dataset.key] = el.type==='checkbox' ? el.checked : el.value;
    }
  });
  // Also collect ALL data stored via setRating/setDOPS/setEPA clicks (already in APP.formData[formKey])
  // These are stored directly, no need to re-collect from DOM
  // But ensure formKey data is synced
  if(APP.formData[formKey] && Object.keys(APP.formData[formKey]).length===0 && APP.formData[id]){
    // migrate old data if exists
    APP.formData[formKey]=Object.assign({},APP.formData[id]);
  }

  // Record history (shared log)
  if(!APP.historyLog[formKey])APP.historyLog[formKey]=[];
  const roleLabel={student:'學生',teacher:'臨床老師',admin:'管理員'}[APP.currentRole];
  const now = new Date();
  const ts = now.toISOString();
  const logEntry={ts,role:APP.currentRole,roleLabel,name:APP.currentUser.name};
  APP.historyLog[formKey].unshift(logEntry);
  // Also track in role-specific log for status detection
  const roleLogKey=formKey+'_'+(APP.currentRole==='admin'?'t':APP.currentRole);
  if(!APP.historyLog[roleLogKey])APP.historyLog[roleLogKey]=[];
  APP.historyLog[roleLogKey].unshift(logEntry);

  // Save to shared storage (GAS)
  saveFormToSheets(formKey);

  // Show saved
  const msg=document.getElementById('saved-msg');
  if(msg){msg.style.display='inline';setTimeout(()=>msg.style.display='none',2500);}
  const pdfBtn=document.getElementById('btn-pdf');
  if(pdfBtn)pdfBtn.style.display='inline-block';

  // Update history display
  const histWrap=document.getElementById('history-wrap');
  if(histWrap)histWrap.innerHTML=buildHistoryItems(formKey);

  // Also upload summary to sheets tab
  uploadToSheets(id);
  // 清除草稿（已正式儲存）
  clearDraft(formKey);
  toast('表單已儲存 ✓');
  renderSidebar(); // update status dots
}

/* ── 將表單資料存到 GAS（共享給所有人） ── */
async function saveFormToSheets(id){
  const payload = {
    action: 'saveForm',
    formId: id,
    data: JSON.stringify(APP.formData[id]||{}),
    history: JSON.stringify(APP.historyLog[id]||[]),
    studentId: APP.currentRole==='student' ? APP.currentUser.sid : (APP.currentRole==='teacher'?APP.currentUser.card:'admin')
  };
  const configStr = JSON.stringify(payload);
  // Use iframe form submit
  try{
    const iframeId='_gas_form_'+Date.now();
    const iframe=document.createElement('iframe');
    iframe.name=iframeId;iframe.id=iframeId;iframe.style.display='none';
    document.body.appendChild(iframe);
    const form=document.createElement('form');
    form.method='POST';form.action=GAS_URL;form.target=iframeId;form.style.display='none';
    Object.entries(payload).forEach(([k,v])=>{
      const inp=document.createElement('input');
      inp.type='hidden';inp.name=k;inp.value=v;
      form.appendChild(inp);
    });
    document.body.appendChild(form);
    form.submit();
    setTimeout(()=>{
      try{document.body.removeChild(form);document.body.removeChild(iframe);}catch(e){}
    },3000);
  }catch(e){console.warn('saveFormToSheets error:',e);}
}

/* ── 從 GAS 讀取表單資料（載入時呼叫） ── */
async function loadFormFromSheets(id){
  try{
    const url=GAS_URL+'?action=loadForm&formId='+encodeURIComponent(id)+'&t='+Date.now();
    const resp=await fetch(url,{cache:'no-cache'});
    if(!resp.ok)return;
    const data=await resp.json();
    if(data.formData){
      // Merge: don't overwrite current role's fields
      if(!APP.formData[id])APP.formData[id]={};
      const loaded=JSON.parse(data.formData);
      // Merge all fields (both student and teacher)
      APP.formData[id]=Object.assign({},loaded,APP.formData[id]);
      // Actually for shared viewing, just use the loaded data entirely
      APP.formData[id]=loaded;
    }
    if(data.history){
      APP.historyLog[id]=JSON.parse(data.history);
    }
  }catch(e){console.warn('loadFormFromSheets:',e);}
}

/* ═══════════ HISTORY ═══════════ */
function buildHistoryLog(id){
  const logs=APP.historyLog[id]||[];
  if(logs.length===0)return'';
  const formKey2=getFormKey(id);
  return`<div class="history-log">
    <div class="history-title">歷次修改紀錄</div>
    <div id="history-wrap">${buildHistoryItems(formKey2)}</div>
  </div>`;
}
function buildHistoryItems(id){
  const logs=APP.historyLog[id]||[];
  if(logs.length===0)return'';
  return logs.map((l,i)=>{
    const dt=new Date(l.ts);
    const ts=`${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}:${String(dt.getSeconds()).padStart(2,'0')}`;
    const wClass={student:'hw-s',teacher:'hw-t',admin:'hw-a'}[l.role]||'hw-s';
    return`<div class="history-item"><span style="font-size:11px;color:var(--ink3);">#${logs.length-i}</span><span class="history-time">${ts}</span><span class="history-who ${wClass}">${l.roleLabel}：${l.name}</span></div>`;
  }).join('');
}

/* ═══════════ GOOGLE SHEETS UPLOAD ═══════════ */
async function uploadToSheets(id) {
  const d = APP.formData[id] || {};
  const f = findForm(id);
  const u = APP.currentUser;
  const now = new Date();
  const ts = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const roleLabel = {student:'學生', teacher:'臨床老師', admin:'管理員'}[APP.currentRole] || '';

  if (!GS.isReady || !GS.accessToken) {
    updateGsStatus('warn', '⚠ Google Sheets 尚未授權，請至管理員面板完成授權後再儲存');
    return;
  }

  // Build row: [時間戳記, 表單名稱, 使用者, 角色, ...所有欄位值]
  const row = [ts, f.name, u.name, roleLabel];
  // Add all key:value pairs as separate columns
  const keys = Object.keys(d);
  keys.forEach(k => row.push(d[k] ?? ''));

  // Determine sheet tab name (one tab per form)
  const sheetName = (f.num + '_' + f.name).slice(0, 31).replace(/[\\\/\?\*\[\]]/g, '_');

  try {
    // 1. Try to get sheet metadata to check if tab exists
    const metaResp = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}`,
      { headers: { Authorization: 'Bearer ' + GS.accessToken } }
    );
    const meta = await metaResp.json();
    const sheetExists = meta.sheets?.some(s => s.properties.title === sheetName);

    // 2. Create sheet tab if it doesn't exist
    if (!sheetExists) {
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}:batchUpdate`, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + GS.accessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ requests: [{ addSheet: { properties: { title: sheetName } } }] })
      });
      // Write header row
      const headers = ['時間戳記', '表單名稱', '填寫者', '角色', ...keys];
      await appendRow(sheetName, headers);

      // Special: for F03 satisfaction, also write an averages header row
      if (id === 'F03') {
        await appendRow(sheetName, ['--- 平均分數 ---']);
      }
    }

    // 3. Append data row
    await appendRow(sheetName, row);

    // 4. Special handling: F03 satisfaction — recalculate averages
    if (id === 'F03') {
      await updateSatisfactionAverages(sheetName, d);
    }

    updateGsStatus('ok', `✓ 已同步至 Google Sheets（${ts}）`);
    toast('✓ 已上傳至 Google Sheets');
  } catch (err) {
    console.error('Sheets upload error:', err);
    updateGsStatus('err', '上傳失敗：' + (err.message || '請確認授權是否仍有效'));
    toast('Google Sheets 上傳失敗', false);
  }
}

async function appendRow(sheetName, values) {
  const body = { values: [values.map(v => String(v ?? ''))] };
  const resp = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(sheetName)}!A1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
    { method: 'POST', headers: { Authorization: 'Bearer ' + GS.accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
  );
  return resp.json();
}

async function updateSatisfactionAverages(sheetName, latestData) {
  // Read all rows to compute per-question averages across all students
  try {
    const resp = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(sheetName)}`,
      { headers: { Authorization: 'Bearer ' + GS.accessToken } }
    );
    const data = await resp.json();
    const rows = data.values || [];
    if (rows.length < 2) return;

    const headers = rows[0];
    // Find question columns (f03t_0 … f03c_2)
    const qPrefixes = ['f03t_', 'f03c_'];
    const qCols = headers.reduce((acc, h, i) => {
      if (qPrefixes.some(p => h.startsWith?.(p) || String(h).startsWith(p))) acc.push({ idx: i, key: h });
      return acc;
    }, []);

    if (qCols.length === 0) return;

    // Compute averages from data rows (skip header & any avg rows)
    const dataRows = rows.slice(1).filter(r => r[0] && !String(r[0]).startsWith('---'));
    const avgs = qCols.map(({ idx }) => {
      const vals = dataRows.map(r => parseFloat(r[idx])).filter(v => !isNaN(v) && v > 0);
      return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '—';
    });

    // Find or create the averages row (marked with '--- 平均分數 ---' in col A)
    const avgRowIdx = rows.findIndex(r => String(r[0]).startsWith('---'));
    const avgRowValues = ['--- 平均分數 ---', '', '', '', ...Array(headers.length - 4).fill('')];
    qCols.forEach(({ idx }, i) => { avgRowValues[idx] = avgs[i]; });

    if (avgRowIdx >= 0) {
      // Update existing avg row
      const rowNum = avgRowIdx + 1; // 1-indexed
      await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(sheetName)}!A${rowNum}:update?valueInputOption=USER_ENTERED`,
        { method: 'PUT', headers: { Authorization: 'Bearer ' + GS.accessToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ values: [avgRowValues.map(v => String(v))] }) }
      );
    } else {
      await appendRow(sheetName, avgRowValues);
    }
  } catch (e) { console.warn('Average update failed:', e); }
}

/* Rating helpers */
function rBtn(fid,key,v,role,disabled){
  const cur=(APP.formData[fid]||{})[key];
  const selC=(cur==v||cur===v)?(role==='t'?'sel-t':role==='a'?'sel-a':'sel-s'):'';
  const dis=disabled?'disabled':'';
  const vStr=JSON.stringify(v);
  return`<button class="r-btn ${selC}" ${dis} onclick="setRating('${fid}','${key}',${vStr},'${role}',this)">${v}</button>`;
}
function setRating(fid,key,val,role,btn){
  if(!APP.formData[fid])APP.formData[fid]={};
  APP.formData[fid][key]=val;
  // Update all buttons with same data-rkey in the whole form (not just table)
  const container=btn.closest('.card-body')||btn.closest('.form-detail-view')||document;
  container.querySelectorAll(`[data-rkey="${key}"]`).forEach(b=>{
    b.classList.remove('sel-s','sel-t','sel-a');
    if(b.dataset.rval==val||b.dataset.rval===String(val))b.classList.add(role==='t'?'sel-t':role==='a'?'sel-a':'sel-s');
  });
  // Also try whole document
  document.querySelectorAll(`[data-rkey="${key}"][data-fid="${fid}"]`).forEach(b=>{
    b.classList.remove('sel-s','sel-t','sel-a');
    if(b.dataset.rval==val||b.dataset.rval===String(val))b.classList.add(role==='t'?'sel-t':role==='a'?'sel-a':'sel-s');
  });
}
function rBtnTable(fid,key,v,role,disabled){
  const cur=(APP.formData[fid]||{})[key];
  const selC=(cur==v||cur===String(v))?(role==='t'?'sel-t':role==='a'?'sel-a':'sel-s'):'';

function setDOPS(fid,key,val,btn){
  if(!APP.formData[fid])APP.formData[fid]={};

  const row=btn.closest('tr');
  row.querySelectorAll('.d-btn').forEach(b=>{

    const match=(v==val||v===String(val));
    b.classList.toggle('sel',match);
    b.textContent=match?'●':'';
  });
}

/* ═══════════ CONFIG SAVE/LOAD ═══════════ */
const CONFIG_SHEET='_系統設定';

async function saveConfigToSheets(){
  const config={students:APP.students,teachers:APP.teachers,adminPwd:APP.adminPwd,teacherPIN:APP.teacherPIN,courseTopics:APP.courseTopics,courseSpeakers:APP.courseSpeakers};
  const configStr = JSON.stringify(config);
  localStorage.setItem('app_config', configStr);

  try {
    // 每次建立全新的 iframe，避免重複使用問題
    const iframeId = '_gas_iframe_' + Date.now();
    const iframe = document.createElement('iframe');
    iframe.name = iframeId;
    iframe.id = iframeId;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = GAS_URL;
    form.target = iframeId;
    form.style.display = 'none';

    const inputConfig = document.createElement('input');
    inputConfig.type = 'hidden';
    inputConfig.name = 'config';
    inputConfig.value = configStr;
    form.appendChild(inputConfig);

    const inputAction = document.createElement('input');
    inputAction.type = 'hidden';
    inputAction.name = 'action';
    inputAction.value = 'saveConfig';
    form.appendChild(inputAction);

    document.body.appendChild(form);
    form.submit();

    // 等待完成後清理
    await new Promise(resolve => setTimeout(resolve, 3000));
    document.body.removeChild(form);
    document.body.removeChild(iframe);

    toast('設定已儲存並同步至所有裝置 ✓');
  } catch(e) {
    console.warn('GAS save error:', e);
    toast('已儲存至本機');
  }
}

async function loadConfigFromSheets(){
  const local=localStorage.getItem('app_config');
  if(local){try{applyConfig(JSON.parse(local));}catch(e){}}
  // 用 GAS 讀取（不需要 OAuth）
  try{
    const resp=await fetch(GAS_URL+'?t='+Date.now(),{cache:'no-cache'});
    const data=await resp.json();
    const val=data.config;
    if(val){
      applyConfig(JSON.parse(val));
      localStorage.setItem('app_config',val);
      toast('設定已從 Google Sheets 載入 ✓');
      if(APP.currentRole==='admin')renderAdmin();
    }
  }catch(e){console.warn('Config load:',e);}
}

function applyConfig(cfg){
  // 合併帳號（不覆蓋預設值，只新增）
  if(cfg.students) Object.assign(APP.students, cfg.students);
  if(cfg.teachers) Object.assign(APP.teachers, cfg.teachers);
  if(cfg.adminPwd) APP.adminPwd=cfg.adminPwd;
  if(cfg.teacherPIN) APP.teacherPIN=cfg.teacherPIN;
  if(cfg.courseTopics?.length>0) APP.courseTopics=cfg.courseTopics;
  if(cfg.courseSpeakers?.length>0) APP.courseSpeakers=cfg.courseSpeakers;
}

  tbl.innerHTML=`<tr><th>卡號</th><th>姓名</th><th>密碼</th><th>操作</th></tr>`+
    Object.entries(APP.teachers).map(([card,acc])=>
      `<tr><td>${card}</td><td id="tname_${card}">${acc.name}</td><td>${acc.pwd}</td><td style="display:flex;gap:4px;flex-wrap:wrap;">
        <button class="btn-update" style="padding:3px 8px;font-size:11px;" onclick="editTeacher('${card}')">修改</button>
        <button class="btn-del" onclick="delTeacher('${card}')">刪除</button>
      </td></tr>`
    ).join('');
}

function updateTeacherPwd(card){

  const p=inp.value.trim();if(!p)return;
  APP.teachers[card].pwd=p;refreshTeacherTable();saveConfigToSheets();

function delSpeaker(i){APP.courseSpeakers.splice(i,1);refreshSpeakerList();saveConfigToSheets();}

function connectGoogleSheets(){
  if (GOOGLE_CLIENT_ID === 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com') {
    updateGsStatus('warn', '⚠ 請先在程式碼中填入您的 Google OAuth Client ID');
    alert('尚未設定 Google Client ID。\n\n請照以下步驟：\n1. 前往 console.cloud.google.com\n2. 建立專案 → 啟用 Sheets API\n3. 建立 OAuth 憑證（網頁應用程式）→ 取得 Client ID\n4. 將 Client ID 貼入程式碼 GOOGLE_CLIENT_ID 變數\n5. 在「已授權的 JavaScript 來源」加入此頁面的網址');
    return;
  }
  updateGsStatus('info', '正在開啟 Google 授權…');
  if (!GS.tokenClient) {
    initGoogleAuth().then(() => { if (GS.tokenClient) GS.tokenClient.requestAccessToken(); });
  } else {
    GS.tokenClient.requestAccessToken();
  }
}

/* ── 帳號期限管理 ── */
function updateStudentExpiry(sid, date) {
  if (APP.students[sid]) {
    APP.students[sid].expiry = date;
    saveConfigToSheets();
    toast('帳號期限已更新');
  }
}

/* ── 學生帳號修改 ── */
function editStudent(sid) {
  const acc = APP.students[sid];
  if (!acc) return;
  const newName = prompt('修改姓名（目前：' + acc.name + '）', acc.name);
  if (newName === null) return;
  const newSchool = prompt('修改學校（目前：' + (acc.school||'') + '）', acc.school||'');
  if (newSchool === null) return;
  const newPwd = prompt('修改密碼（目前：' + acc.pwd + '，留空不更改）', '');
  APP.students[sid].name = newName || acc.name;
  APP.students[sid].school = newSchool || acc.school;
  if (newPwd && newPwd.trim()) APP.students[sid].pwd = newPwd.trim();
  refreshStudentTable();
  saveConfigToSheets();
  toast('學生資料已更新');
}

/* ── 老師帳號修改 ── */
function editTeacher(card) {
  const acc = APP.teachers[card];
  if (!acc) return;
  const newName = prompt('修改姓名（目前：' + acc.name + '）', acc.name);
  if (newName === null) return;
  const newPwd = prompt('修改密碼（目前：' + acc.pwd + '，留空不更改）', '');
  APP.teachers[card].name = newName || acc.name;
  if (newPwd && newPwd.trim()) APP.teachers[card].pwd = newPwd.trim();
  refreshTeacherTable();
  saveConfigToSheets();
  toast('老師資料已更新');
}

/* ── 帳號期限檢查 ── */
function checkStudentExpiry(sid) {
  const acc = APP.students[sid];
  if (!acc || !acc.expiry) return true; // 無期限設定，可登入
  return new Date(acc.expiry) >= new Date();
}

function renderStatusSection(filterStatus){
  APP.currentFormId='__status_'+filterStatus;
  renderSidebar();
  const mc=document.getElementById('main-content');
  const labelMap={done:'✅ 已完成',wait:'⏳ 待老師評分',partial:'📝 進行中',new:'⭕ 未填寫'};
  const colorMap={done:'var(--green)',wait:'var(--gold)',partial:'#5A8AAA',new:'var(--red)'};
  const filtered=FORMS.filter(function(f){return getStatus(f.id)===filterStatus;});
  let html='<div class="form-list-view">';
  html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;">
    <button onclick="renderFormList()" style="padding:6px 14px;background:none;border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--ink3);">← 返回總覽</button>
    <div style="font-family:var(--ff-serif);font-size:18px;font-weight:600;">${labelMap[filterStatus]}</div>
    <span style="background:${colorMap[filterStatus]};color:#fff;padding:2px 10px;border-radius:999px;font-size:13px;font-weight:600;">${filtered.length} 份</span>
  </div>`;
  if(filtered.length===0){
    html+=`<div style="text-align:center;padding:3rem;color:var(--ink3);">此分類目前沒有表單</div>`;
  } else {
    html+='<div class="form-grid">';
    filtered.forEach(function(f){
      const st=getStatus(f.id);
      const dotC=st==='done'?'dot-done':st==='wait'?'dot-wait':st==='partial'?'dot-partial':'dot-new';
      const stLabel=st==='done'?'✅ 已完成':st==='wait'?'⏳ 待老師評分':st==='partial'?'📝 進行中':'⭕ 未填寫';
      const stColor=st==='done'?'var(--green)':st==='wait'?'var(--gold)':st==='partial'?'#5A8AAA':'var(--ink3)';
      html+=`<div class="form-card" onclick="openForm('${f.id}')">
        <div class="form-card-num">${f.num}</div>
        <div class="form-card-name">${f.name}</div>
        <div class="form-card-sub">${f.sub}</div>
        <div class="form-card-meta"><span style="font-size:11px;color:${stColor};font-weight:500;">${stLabel}</span></div>
      </div>`;
    });
    html+='</div>';
  }
  html+='</div>';
  mc.innerHTML=html;
}
</script>

<script>
/* ── 自動暫存草稿 ── */
function autoSaveDraft(id){
  const formKey=getFormKey(id);
  if(!APP.formData[formKey])APP.formData[formKey]={};
  // 收集頁面上所有 input/textarea/select（用 formKey 或 id 都找）
  document.querySelectorAll('[data-fid][data-key]').forEach(function(el){
    if(!el.disabled){
      var fid=el.getAttribute('data-fid');
      // 接受 fid === id 或 fid === formKey
      if(fid===id||fid===formKey){
        APP.formData[formKey][el.dataset.key]=el.type==='checkbox'?el.checked:el.value;
      }
    }
  });
  // formData[formKey] 已包含 f01Click 存入的評分資料
  // 存到 localStorage
  try{
    var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    var data=APP.formData[formKey];
    if(data&&Object.keys(data).some(function(k){
      var v=data[k]; return v!==''&&v!==false&&v!==null&&v!==undefined;
    })){
      drafts[formKey]=JSON.parse(JSON.stringify(data)); // deep copy
      localStorage.setItem('form_drafts',JSON.stringify(drafts));
    }
  }catch(e){console.warn('autoSaveDraft error:',e);}
}

function loadDraft(formKey){
  try{
    var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    if(drafts[formKey]&&Object.keys(drafts[formKey]).length>0){
      if(!APP.formData[formKey])APP.formData[formKey]={};
      // 草稿蓋過目前記憶體資料（因為記憶體可能是空的）
      var draft=drafts[formKey];
      Object.keys(draft).forEach(function(k){
        if(draft[k]!==''&&draft[k]!==null&&draft[k]!==undefined){
          APP.formData[formKey][k]=draft[k];
        }
      });
      return true;
    }
  }catch(e){console.warn('loadDraft error:',e);}
  return false;
}

function clearDraft(formKey){
  try{
    var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    delete drafts[formKey];
    localStorage.setItem('form_drafts',JSON.stringify(drafts));
  }catch(e){}
}

/* F01 專用點擊處理 */
function f01Click(btn){
  if(btn.disabled)return;
  var fid=btn.getAttribute('data-fid');
  var key=btn.getAttribute('data-rkey');
  var v=btn.getAttribute('data-rval');
  if(!fid||!key||!v)return;
  if(!APP.formData[fid])APP.formData[fid]={};
  APP.formData[fid][key]=v;
  // 立即存到 localStorage（防止切換表單時遺失）
  try{
    var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    if(!drafts[fid])drafts[fid]={};
    drafts[fid][key]=v;
    localStorage.setItem('form_drafts',JSON.stringify(drafts));
  }catch(e){}
  // Update button styles
  var row=btn.parentNode;
  if(row){
    row.querySelectorAll('button[data-rkey="'+key+'"]').forEach(function(b){
      var isSel=b.getAttribute('data-rval')===v;
      var isTeacher=b.getAttribute('data-teacher')==='1';
      b.style.background=isSel?(isTeacher?'#8B2020':'#1A3A5C'):'#ffffff';
      b.style.color=isSel?'#ffffff':'#7A706A';
      b.style.fontWeight=isSel?'700':'400';
    });
  }
}
</script>
