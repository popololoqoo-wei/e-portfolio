/* ═══════════ SAVE ═══════════ */
function saveForm(id){
  // ★ 取消 pending 的自動儲存計時器（避免重複儲存）
  if(typeof _autoSaveTimers !== 'undefined' && _autoSaveTimers[id]){
    clearTimeout(_autoSaveTimers[id]);
    delete _autoSaveTimers[id];
  }
  // 【安全】登入身分驗證：必須有有效的 currentRole
  if(!APP.currentRole){
    toast('⚠ 請先登入');
    return;
  }
  // 【安全】學生只能儲存自己的表單
  if(APP.currentRole==='student'){
    if(!APP.currentUser||!APP.currentUser.sid){
      toast('⚠ 帳號狀態異常，請重新登入');
      return;
    }
    // 確保即將寫入的 formKey 含學生本人的學號
    const expectedKey = id+'_'+APP.currentUser.sid;
    const actualKey = getFormKey(id);
    if(actualKey !== expectedKey){
      toast('⚠ 身分驗證失敗，無法儲存他人表單');
      console.warn('saveForm blocked: expected', expectedKey, 'got', actualKey);
      return;
    }
  }
  // 【安全】老師需要選定學生
  if(APP.currentRole==='teacher' && !APP.currentStudentId){
    toast('⚠ 請先選擇要評核的學生');
    return;
  }
  const formKey = getFormKey(id);
  // Collect all inputs (only editable fields for current role)
  if(!APP.formData[formKey])APP.formData[formKey]={};
  // 合併所有 key 的資料到 formKey
  if(id!==formKey && APP.formData[id]){
    Object.assign(APP.formData[formKey], APP.formData[id]);
  }
  // 也從草稿合併
  try{
    var saveDrafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    [id,formKey].forEach(function(k){
      if(saveDrafts[k]){
        Object.keys(saveDrafts[k]).forEach(function(dk){
          var dv=saveDrafts[k][dk];
          if(dv!==''&&dv!==null&&dv!==undefined)APP.formData[formKey][dk]=dv;
        });
      }
    });
  }catch(e){}
  // 收集所有可見欄位（用 id 或 formKey 都接受）
  document.querySelectorAll('[data-fid][data-key]').forEach(function(el){
    if(!el.disabled){
      var elFid=el.getAttribute('data-fid');
      if(elFid===id||elFid===formKey){
        var key=el.dataset.key||'';
        if(key.endsWith('_start')||key.endsWith('_end')) return; // 由下面統一處理
        // ★ Radio button 特殊處理：只有 checked 的 radio 才採用其值；
        //   未 checked 的 radio 一律跳過，避免 '是'/'否' 被覆寫成 'on' 或被相鄰選項覆蓋
        if(el.type==='radio'){
          if(el.checked){
            var rv=el.getAttribute('value');
            // 若未設定 value 屬性，從 onchange handler 字串裡取（如 saveDraftField('fid','key','是') 抓出最後一個參數）
            if(rv===null||rv===''||rv==='on'){
              var oc=el.getAttribute('onchange')||'';
              var m=oc.match(/['"]([^'"]+)['"]\s*\)\s*$/);
              if(m) rv=m[1];
            }
            if(rv!==null&&rv!==''&&rv!=='on') APP.formData[formKey][key]=rv;
          }
          return; // 不論 checked 與否，radio 一律不執行下面的通用流程
        }
        var v=el.type==='checkbox'?el.checked:el.value;
        if(v!==''&&v!==null) APP.formData[formKey][key]=v;
      }
    }
  });
  // 明確收集日期區間欄位（drs_*_s / drs_*_e）
  document.querySelectorAll('input[id^="drs_"]').forEach(function(el){
    var elId=el.id; // e.g. drs_F04M_P145023_s_date_s
    var suffix=elId.slice(-1); // 's' or 'e'
    if(suffix!=='s') return;
    var eEl=document.getElementById(elId.slice(0,-1)+'e');
    var s=el.value, e=eEl?eEl.value:'';
    if(!s&&!e) return;
    var r=(s?s.replace(/-/g,'/'):'')+(s&&e?' - ':s||e?' - ':'')+(e?e.replace(/-/g,'/'):'');
    var elFid=el.getAttribute('data-fid');
    var dataKey=el.getAttribute('data-key'); // e.g. s_date_start
    if(!elFid||!dataKey) return;
    var baseKey=dataKey.replace('_start','');
    if(elFid===id||elFid===formKey){
      APP.formData[formKey][baseKey]=r;
    }
  });
  // 同時儲存到 localStorage 草稿
  try{
    var draftSave=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    draftSave[formKey]=Object.assign({},APP.formData[formKey]);
    localStorage.setItem('form_drafts',JSON.stringify(draftSave));
  }catch(e){}
  // Also collect ALL data stored via setRating/setDOPS/setEPA clicks (already in APP.formData[formKey])
  // These are stored directly, no need to re-collect from DOM
  // But ensure formKey data is synced
  // 合併 id key 和 formKey 的資料（解決 f01Click 存到 id 而不是 formKey 的問題）
  if(APP.formData[id] && Object.keys(APP.formData[id]).length>0){
    if(!APP.formData[formKey])APP.formData[formKey]={};
    Object.assign(APP.formData[formKey], APP.formData[id]);
  }

  // Record history - 判斷實際儲存角色
  // 若學生帳號但已解鎖老師欄位（PIN解鎖），儲存兩筆記錄（學生+老師都算完成）
  if(!APP.historyLog[formKey])APP.historyLog[formKey]=[];
  const now = new Date();
  const ts = now.toISOString();
  const effectiveRole = (APP.currentRole==='student' && APP.teacherUnlocked) ? 'both' : APP.currentRole;
  
  if(effectiveRole==='both'){
    // 學生帳號+PIN解鎖：同時記錄學生和老師儲存
    const sEntry={ts,role:'student',roleLabel:'學生',name:APP.currentUser.name};
    const tEntry={ts,role:'teacher',roleLabel:'臨床老師（PIN解鎖）',name:'PIN解鎖'};
    APP.historyLog[formKey].unshift(tEntry);
    APP.historyLog[formKey].unshift(sEntry);
  } else {
    const roleLabel={student:'學生',teacher:'臨床老師',admin:'管理員'}[APP.currentRole];
    const logEntry={ts,role:APP.currentRole,roleLabel,name:APP.currentUser.name};
    APP.historyLog[formKey].unshift(logEntry);
  }

  // Save to shared storage (GAS)
  saveFormToSheets(formKey);

  // 同時把 historyLog 存到 localStorage（確保 getStatus 能讀到）
  try{
    var savedLogs=JSON.parse(localStorage.getItem('history_logs')||'{}');
    savedLogs[formKey]=APP.historyLog[formKey]||[];
    savedLogs[id]=APP.historyLog[formKey]||[];
    localStorage.setItem('history_logs',JSON.stringify(savedLogs));
  }catch(e){}

  // Show saved
  const msg=document.getElementById('saved-msg');
  if(msg){msg.style.display='inline';setTimeout(()=>msg.style.display='none',2500);}

  // Update history display
  const histWrap=document.getElementById('history-wrap');
  if(histWrap)histWrap.innerHTML=buildHistoryItems(formKey);

  // PDF 按鈕：儲存後更新狀態但不自動下載
  const pdfBtn=document.getElementById('btn-pdf');
  if(pdfBtn&&canDownloadPDF(id)){
    pdfBtn.style.display='inline-block';
    pdfBtn.setAttribute('onclick',"checkAndDownloadPDF('"+id+"')");
  }

  // Also upload summary to sheets tab
  uploadToSheets(id);
  // 保留草稿作為備份（不清除，讓使用者隨時可以看到資料）
  // clearDraft(formKey); // 已停用清除草稿
  
  // 儲存後立即鎖回老師欄位（學生帳號一律鎖定，無論有無 PIN）
  if(APP.currentRole==='student'){
    APP.teacherUnlocked=false;
    lockTeacherFields();
    toast('表單已儲存 ✓（老師欄位已重新鎖定）');
  } else {
    toast('表單已儲存 ✓');
  }

  // ★★★ 跨裝置同步：3 秒後從雲端重新拉取，確認資料已同步 ★★★
  setTimeout(async function(){
    try{
      await loadFormFromSheets(id);
      var hw=document.getElementById('history-wrap');
      if(hw && APP.currentFormId===id){
        hw.innerHTML=buildHistoryItems(getFormKey(id));
      }
      renderSidebar();
      updateQuickNav();
    }catch(e){console.warn('儲存後同步確認失敗:',e);}
  }, 3000);

  // 更新進度條
  renderSidebar();
  updateQuickNav();
}

/* ── 將表單資料存到 GAS（共享給所有人） ── */
async function saveFormToSheets(id){
  // id 可能是裸 formId 或 formKey，統一處理
  // saveForm 呼叫時傳的是 formKey（含學號）
  const formKey=id; // saveForm已傳formKey
  const bareId=id.split('_')[0]; // 取裸 formId
  // 合併兩個來源的資料
  const mergedData=Object.assign({},APP.formData[bareId]||{},APP.formData[formKey]||{});
  const mergedLog=(APP.historyLog[formKey]||[]).concat(APP.historyLog[bareId]||[]);
  // 去重複 log
  const logMap={};mergedLog.forEach(function(l){if(!logMap[l.ts])logMap[l.ts]=l;});
  const deduped=Object.values(logMap).sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});

  const payload = {
    action: 'saveForm',
    formId: formKey,
    data: JSON.stringify(mergedData),
    history: JSON.stringify(deduped),
    studentId: APP.currentRole==='student' ? APP.currentUser.sid : (APP.currentRole==='teacher'?APP.currentUser.card:'admin'),
    // 【安全】帶上 WRITE_SECRET 通過 GAS 端身份驗證
    secret: (typeof GAS_WRITE_SECRET!=='undefined' && GAS_WRITE_SECRET) ? GAS_WRITE_SECRET : ''
  };
  const configStr = JSON.stringify(payload);
  // Use iframe form submit
  try{
    const iframeId='_gas_form_'+Date.now();
    const iframe=document.createElement('iframe');
    iframe.name=iframeId;iframe.id=iframeId;iframe.style.display='none';
    document.body.appendChild(iframe);
    const form=document.createElement('form');
    form.method='POST';form.action=GAS_URL;form.target=iframeId;form.style.display='none';
    Object.entries(payload).forEach(([k,v])=>{
      const inp=document.createElement('input');
      inp.type='hidden';inp.name=k;inp.value=v;
      form.appendChild(inp);
    });
    document.body.appendChild(form);
    form.submit();
    setTimeout(()=>{
      try{document.body.removeChild(form);document.body.removeChild(iframe);}catch(e){}
    },3000);
  }catch(e){console.warn('saveFormToSheets error:',e);}
}

/* ── 從 GAS 讀取表單資料（載入時呼叫） ── */
async function loadFormFromSheets(id){
  // 使用 formKey（含學號）確保資料存到正確的 key
  const formKey=getFormKey(id);
  try{
    const controller=new AbortController();
    const tid=setTimeout(function(){controller.abort();},8000); // 增加到8秒
    const url=GAS_URL+'?action=loadForm&formId='+encodeURIComponent(formKey)+'&t='+Date.now();
    const resp=await fetch(url,{cache:'no-cache',signal:controller.signal});
    clearTimeout(tid);
    if(!resp.ok)return;
    const data=await resp.json();
    if(data.formData){
      try{
        const loaded=JSON.parse(data.formData);
        // ★★★ 跨裝置同步：遠端資料完全取代本地（遠端優先） ★★★
        APP.formData[formKey] = loaded;
        APP.formData[id] = Object.assign({}, APP.formData[id]||{}, loaded);
      }catch(e2){console.warn('formData parse:',e2);}
    }
    if(data.history){
      try{
        const remoteLog=JSON.parse(data.history);
        // ★★★ 跨裝置同步：遠端歷史紀錄優先 ★★★
        APP.historyLog[formKey] = remoteLog;
        APP.historyLog[id] = remoteLog;
      }catch(e2){}
    }
  }catch(e){
    console.warn('loadFormFromSheets skipped:',formKey,e.name);
  }
  // 載入完成後重新計算分數（確保資料已就緒）
  var cid=APP.currentFormId;
  if(cid){
    setTimeout(function(){
      if(cid==='F07M'||cid==='F07S') calc360Score(getFormKey(cid));
      if(cid==='F15') calcF15Score(getFormKey(cid));
    },200);
  }
}

/* ── 登入時批次從 GAS 拉取該使用者所有表單（跨裝置同步用）── */
async function loadAllFormsFromSheets(){
  if(!APP.currentUser) return;
  var sid = APP.currentRole==='student' ? APP.currentUser.sid 
          : (APP.currentStudentId || null);
  if(!sid) return;

  var allFormIds = FORMS.map(function(f){ return f.id; });
  var loadPromises = [];

  allFormIds.forEach(function(fid){
    var formKey = fid + '_' + sid;
    loadPromises.push(
      (async function(fk, baseId){
        try{
          var controller = new AbortController();
          var tid = setTimeout(function(){controller.abort();}, 6000);
          var url = GAS_URL + '?action=loadForm&formId=' + encodeURIComponent(fk) + '&t=' + Date.now();
          var resp = await fetch(url, {cache:'no-cache', signal:controller.signal});
          clearTimeout(tid);
          if(!resp.ok) return;
          var data = await resp.json();
          if(data.formData){
            try{
              var loaded = JSON.parse(data.formData);
              APP.formData[fk] = loaded;
              APP.formData[baseId] = Object.assign({}, APP.formData[baseId]||{}, loaded);
            }catch(e){}
          }
          if(data.history){
            try{
              var remoteLog = JSON.parse(data.history);
              APP.historyLog[fk] = remoteLog;
              APP.historyLog[baseId] = remoteLog;
            }catch(e){}
          }
        }catch(e){}
      })(formKey, fid)
    );
  });

  await Promise.all(loadPromises);

  try{
    localStorage.setItem('form_drafts', JSON.stringify(APP.formData));
    localStorage.setItem('history_logs', JSON.stringify(APP.historyLog));
  }catch(e){}
}

/* ═══════════ HISTORY ═══════════ */
function buildHistoryLog(id){
  const logs=APP.historyLog[id]||[];
  if(logs.length===0)return'';
  const formKey2=getFormKey(id);
  return`<div class="history-log">
    <div class="history-title">歷次修改紀錄</div>
    <div id="history-wrap">${buildHistoryItems(formKey2)}</div>
  </div>`;
}
function buildHistoryItems(id){
  const logs=APP.historyLog[id]||[];
  if(logs.length===0)return'';
  return logs.map((l,i)=>{
    const dt=new Date(l.ts);
    const ts=`${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}:${String(dt.getSeconds()).padStart(2,'0')}`;
    const wClass={student:'hw-s',teacher:'hw-t',admin:'hw-a'}[l.role]||'hw-s';
    return`<div class="history-item"><span style="font-size:11px;color:var(--ink3);">#${logs.length-i}</span><span class="history-time">${ts}</span><span class="history-who ${wClass}">${l.roleLabel}：${l.name}</span></div>`;
  }).join('');
}

/* ═══════════ PDF DOWNLOAD ═══════════ */
function canDownloadPDF(id){
  const formKey=getFormKey(id);
  // 同時檢查 formKey 和 id 兩個可能的 key
  const logs=(APP.historyLog[formKey]||[]).concat(APP.historyLog[id]||[]);
  // 合併兩個可能的 formData
  const d=Object.assign({},APP.formData[id]||{},APP.formData[formKey]||{});

  // 條件1：有儲存記錄

      const logs=APP.historyLog[formKey]||[];

/* ── 簽名日期/時間格式化（電子簽章感）──
   原始儲存格式可能為：
   1) "YYYY-MM-DD 2026/5/5 14:32:18"  ← 由 signDateWithTimestamp 產生：日期欄位值 + ' ' + toLocaleString
   2) "YYYY-MM-DD"                    ← 早期資料只有日期
   3) "YYYY/MM/DD" 或其他變體          ← 舊資料殘留
   輸出統一格式：YYYY-MM-DD HH:MM（若有時間）/ YYYY-MM-DD（若無時間）
   "—" 用於空值。
*/
function formatSignTs(v){
  if(v===undefined||v===null) return '—';
  var s=String(v).trim();
  if(!s) return '—';
  // 抓出第一段 YYYY-MM-DD 或 YYYY/MM/DD 作為日期
  var dm=s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  var datePart='';
  if(dm){
    datePart=dm[1]+'-'+String(dm[2]).padStart(2,'0')+'-'+String(dm[3]).padStart(2,'0');
  } else {
    return s; // 無法解析就原樣回傳
  }
  // 抓時間：從整段字串裡找 HH:MM（取第一個出現的）
  var tm=s.match(/(\d{1,2}):(\d{2})/);
  if(tm){
    var hh=String(tm[1]).padStart(2,'0');
    var mm=tm[2];
    // 處理「下午 1:32」這類 12 小時制（toLocaleString 在某些 locale 會出現）
    var ampm=s.match(/(上午|下午|AM|PM|am|pm)/);
    if(ampm){
      var h=parseInt(hh,10);
      var marker=ampm[1];
      if((marker==='下午'||marker==='PM'||marker==='pm') && h<12) h+=12;
      if((marker==='上午'||marker==='AM'||marker==='am') && h===12) h=0;
      hh=String(h).padStart(2,'0');
    }
    return datePart+' '+hh+':'+mm;
  }
  return datePart;
}

/* ═══════════ GOOGLE SHEETS UPLOAD ═══════════ */
async function uploadToSheets(id) {
  const d = APP.formData[id] || {};
  const f = findForm(id);
  const u = APP.currentUser;
  const now = new Date();
  const ts = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const roleLabel = {student:'學生', teacher:'臨床老師', admin:'管理員'}[APP.currentRole] || '';

  if (!GS.isReady || !GS.accessToken) {
    updateGsStatus('warn', '⚠ Google Sheets 尚未授權，請至管理員面板完成授權後再儲存');
    return;
  }

  // Build row: [時間戳記, 表單名稱, 使用者, 角色, ...所有欄位值]
  const row = [ts, f.name, u.name, roleLabel];
  // Add all key:value pairs as separate columns
  const keys = Object.keys(d);
  keys.forEach(k => row.push(d[k] ?? ''));

  // Determine sheet tab name (one tab per form)
  const sheetName = (f.num + '_' + f.name).slice(0, 31).replace(/[\\\/\?\*\[\]]/g, '_');

  try {
    // 1. Try to get sheet metadata to check if tab exists
    const metaResp = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}`,
      { headers: { Authorization: 'Bearer ' + GS.accessToken } }
    );
    const meta = await metaResp.json();
    const sheetExists = meta.sheets?.some(s => s.properties.title === sheetName);

    // 2. Create sheet tab if it doesn't exist
    if (!sheetExists) {
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}:batchUpdate`, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + GS.accessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ requests: [{ addSheet: { properties: { title: sheetName } } }] })
      });
      // Write header row
      const headers = ['時間戳記', '表單名稱', '填寫者', '角色', ...keys];
      await appendRow(sheetName, headers);

      // Special: for F03 satisfaction, also write an averages header row
      // F03 removed
    }

    // 3. Append data row
    await appendRow(sheetName, row);

    // 4. Special handling: F03 satisfaction — recalculate averages
      // F03 removed

    updateGsStatus('ok', `✓ 已同步至 Google Sheets（${ts}）`);
    toast('✓ 已上傳至 Google Sheets');
  } catch (err) {
    console.error('Sheets upload error:', err);
    updateGsStatus('err', '上傳失敗：' + (err.message || '請確認授權是否仍有效'));
    toast('Google Sheets 上傳失敗', false);
  }
}

async function appendRow(sheetName, values) {
  const body = { values: [values.map(v => String(v ?? ''))] };
  const resp = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(sheetName)}!A1:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
    { method: 'POST', headers: { Authorization: 'Bearer ' + GS.accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
  );
  return resp.json();
}

async function updateSatisfactionAverages(sheetName, latestData) {
  // Read all rows to compute per-question averages across all students
  try {
    const resp = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(sheetName)}`,
      { headers: { Authorization: 'Bearer ' + GS.accessToken } }
    );
    const data = await resp.json();
    const rows = data.values || [];
    if (rows.length < 2) return;

    const headers = rows[0];
    // Find question columns (f03t_0 … f03c_2)
    const qPrefixes = ['f03t_', 'f03c_'];
    const qCols = headers.reduce((acc, h, i) => {
      if (qPrefixes.some(p => h.startsWith?.(p) || String(h).startsWith(p))) acc.push({ idx: i, key: h });
      return acc;
    }, []);

    if (qCols.length === 0) return;

    // Compute averages from data rows (skip header & any avg rows)
    const dataRows = rows.slice(1).filter(r => r[0] && !String(r[0]).startsWith('---'));
    const avgs = qCols.map(({ idx }) => {
      const vals = dataRows.map(r => parseFloat(r[idx])).filter(v => !isNaN(v) && v > 0);
      return vals.length ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : '—';
    });

    // Find or create the averages row (marked with '--- 平均分數 ---' in col A)
    const avgRowIdx = rows.findIndex(r => String(r[0]).startsWith('---'));
    const avgRowValues = ['--- 平均分數 ---', '', '', '', ...Array(headers.length - 4).fill('')];
    qCols.forEach(({ idx }, i) => { avgRowValues[idx] = avgs[i]; });

    if (avgRowIdx >= 0) {
      // Update existing avg row
      const rowNum = avgRowIdx + 1; // 1-indexed
      await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_ID}/values/${encodeURIComponent(sheetName)}!A${rowNum}:update?valueInputOption=USER_ENTERED`,
        { method: 'PUT', headers: { Authorization: 'Bearer ' + GS.accessToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ values: [avgRowValues.map(v => String(v))] }) }
      );
    } else {
      await appendRow(sheetName, avgRowValues);
    }
  } catch (e) { console.warn('Average update failed:', e); }
}

function rBtn(fid,key,v,role,disabled){
  const cur=(APP.formData[fid]||{})[key];
  const selC=(cur==v||cur===v)?(role==='t'?'sel-t':role==='a'?'sel-a':'sel-s'):'';
  const dis=disabled?'disabled':'';

  return`<button class="r-btn ${selC}" ${dis} onclick="setRating('${fid}','${key}',${vStr},'${role}',this)">${v}</button>`;
}
function setRating(fid,key,val,role,btn){
  // ★ 統一寫入 canonical formKey，不再雙寫
  var bareId = fid.indexOf('_')>=0 ? fid.split('_')[0] : fid;
  var targetKey = getCanonicalKey(bareId);
  if(!APP.formData[targetKey])APP.formData[targetKey]={};
  APP.formData[targetKey][key]=val;
  // localStorage
  try{
    var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    if(!drafts[targetKey])drafts[targetKey]={};
    drafts[targetKey][key]=val;
    localStorage.setItem('form_drafts',JSON.stringify(drafts));
  }catch(e){}
  // Update button visuals
  document.querySelectorAll('[data-rkey="'+key+'"]').forEach(function(b){
    b.classList.remove('sel-s','sel-t','sel-a');
    if(b.dataset.rval==val||b.dataset.rval===String(val)){
      b.classList.add(role==='t'?'sel-t':role==='a'?'sel-a':'sel-s');
    }
  });
  // ★ 觸發自動儲存
  if(typeof scheduleAutoSave === 'function') scheduleAutoSave(bareId);
}

/* setRating360：360度評估表評分 */
function setRating360(fid,key,val,role,btn){
  setRating(fid,key,val,role,btn);
  // 多次嘗試確保 DOM 和資料都已就緒
  setTimeout(function(){calc360Score(fid);},100);

  setTimeout(function(){calc360Score(fid);},1500);

/* calc360Score：360度評估表分數計算 */
function calc360Score(fid){
  var realFid=APP.currentFormId?getFormKey(APP.currentFormId):fid;
  var d=Object.assign({},APP.formData[fid]||{},APP.formData[realFid]||{});

  // 態度：題 0-7，基本分80，每題(+2/+1/0/-1/-2)
  var attBase=80, attScore=attBase;
  for(var i=0;i<8;i++){
    var v=parseInt(d['f07_'+i]||0)||0;
    attScore+=v;
  }
  // 臨床智能：題 8-13，基本分75，每題(+2/+1/0/-1/-2)
  var clinBase=75, clinScore=clinBase;
  for(var i=8;i<14;i++){
    var v2=parseInt(d['f07_'+i]||0)||0;
    clinScore+=v2;
  }
  // 換算總分（態度佔50%，臨床佔50%）
  var total=Math.round((attScore*0.5)+(clinScore*0.5));

  var attEl=document.getElementById('score-att-'+fid);
  var clinEl=document.getElementById('score-clin-'+fid);
  var totEl=document.getElementById('score-total-'+fid);

  var attOk=attScore>=80, clinOk=clinScore>=75;
  if(attEl) attEl.innerHTML='<span style="font-weight:700;color:'+(attOk?'var(--green)':'var(--red)')+'">'+attScore+'</span><span style="color:var(--ink3);font-size:11px;"> / 100 '+(attOk?'✓':'✗')+'</span>';
  if(clinEl) clinEl.innerHTML='<span style="font-weight:700;color:'+(clinOk?'var(--green)':'var(--red)')+'">'+clinScore+'</span><span style="color:var(--ink3);font-size:11px;"> / 100 '+(clinOk?'✓':'✗')+'</span>';
  if(totEl) totEl.innerHTML='<span style="font-size:18px;font-weight:700;color:'+(total>=70?'var(--green)':'var(--red)')+'">'+total+'</span><span style="color:var(--ink3);font-size:11px;"> 分</span>';
}

/* autoSaveDraft：切換表單時暫存到 localStorage */
function autoSaveDraft(id){
  if(!id)return;
  const formKey=getFormKey(id);
  if(!APP.formData[formKey])APP.formData[formKey]={};
  // 收集頁面上所有有 data-fid/data-key 的元素
  document.querySelectorAll('[data-fid][data-key]').forEach(function(el){
    var fid=el.getAttribute('data-fid');
    var key=el.getAttribute('data-key')||'';
    if(key.endsWith('_start')||key.endsWith('_end'))return;
    if(fid===id||fid===formKey){
      var v=el.type==='checkbox'?el.checked:el.value;
      if(v!==''&&v!==false&&v!==null) APP.formData[formKey][key]=v;
    }
  });
  // 收集日期區間欄位
  document.querySelectorAll('input[id^="drs_"]').forEach(function(el){
    if(el.disabled)return;
    var suffix=el.id.slice(-1);
    if(suffix!=='s')return;
    var eId=el.id.slice(0,-1)+'e';
    var eEl=document.getElementById(eId);
    if(!eEl)return;
    var s=el.value,e=eEl.value;
    if(!s&&!e)return;
    var r=(s?s.replace(/-/g,'/'):'')+(s||e?' - ':'')+(e?e.replace(/-/g,'/'):'');
    var fid=el.getAttribute('data-fid');
    var dataKey=el.getAttribute('data-key');
    if(!fid||!dataKey)return;
    var baseKey=dataKey.replace('_start','');
    if(fid===id||fid===formKey) APP.formData[formKey][baseKey]=r;
  });
  // 存到 localStorage
  try{
    var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    drafts[formKey]=Object.assign(drafts[formKey]||{},APP.formData[formKey]);
    drafts[id]=Object.assign(drafts[id]||{},APP.formData[formKey]);
    localStorage.setItem('form_drafts',JSON.stringify(drafts));
  }catch(e){}
}

/* loadDraft：從 localStorage 讀取草稿 */
function loadDraft(formKey){
  try{
    var drafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    if(drafts[formKey]){
      if(!APP.formData[formKey])APP.formData[formKey]={};
      Object.assign(APP.formData[formKey],drafts[formKey]);
    }
  }catch(e){}
}

function saveDraftField(fid, key, val){
  // 安全：限制長度
  val = clipInput(val, MAX_FIELD_LENGTH);
  // ★ 統一寫入：永遠寫到 canonical formKey，避免裸 id 與 formKey 兩邊不一致
  var bareId = fid.indexOf('_')>=0 ? fid.split('_')[0] : fid;
  var canonical = getCanonicalKey(bareId);
  // 若 fid 本身已經是 formKey（含底線+學號），直接用 fid；否則用 canonical
  var targetKey = fid;
  if(fid.indexOf('_')<0){
    // fid 是裸 id（例如 'F01B'）→ 改寫到 canonical formKey
    targetKey = canonical;
  }
  if(!APP.formData[targetKey]) APP.formData[targetKey] = {};
  APP.formData[targetKey][key] = val;
  // 立即存 localStorage（同樣只寫 targetKey）
  try{
    var drafts = JSON.parse(localStorage.getItem('form_drafts')||'{}');
    if(!drafts[targetKey]) drafts[targetKey] = {};
    drafts[targetKey][key] = val;
    localStorage.setItem('form_drafts', JSON.stringify(drafts));
  }catch(e){}
  // ★ 觸發自動儲存
  if(typeof scheduleAutoSave === 'function') scheduleAutoSave(bareId);
}

/* ─── 共用：評分欄位輸入驗證（超出最高分時跳警示並夾鉗到 0~max） ───
   - 在 onchange 時呼叫，會檢查值並彈出 toast 提醒
   - 自動把欄位值修正為「0 ≤ v ≤ max」
   - 同時做防抖：同一個欄位連續錯誤輸入只跳一次警示
*/
window.__scoreWarnTimer = window.__scoreWarnTimer || {};
function validateScoreInput(input, fid, key, max, label, calcFn){
  if(!input) return;
  var rawVal = String(input.value||'').trim();
  // 允許空值（未填）
  if(rawVal===''){
    input.value = '';
    saveDraftField(fid, key, '');
    if(typeof calcFn==='function') try{ calcFn(fid); }catch(e){}
    return;
  }
  var v = parseInt(rawVal, 10);
  // 非數字 → 清掉
  if(isNaN(v)){
    input.value = '';
    saveDraftField(fid, key, '');
    if(typeof calcFn==='function') try{ calcFn(fid); }catch(e){}
    return;
  }
  var origV = v;
  var clamped = false;
  // 上限：超過最高分
  if(v > max){
    v = max;
    clamped = true;
  }
  // 下限：負數
  if(v < 0){
    v = 0;
    clamped = true;
  }
  // 視覺反饋 + toast 警示
  if(clamped && v !== origV){
    // 紅色閃一下提示
    var origBg = input.style.background;
    var origBorder = input.style.border;
    input.style.background = '#FEE2E2';
    input.style.border = '2px solid #EF4444';
    setTimeout(function(){
      input.style.background = origBg;
      input.style.border = origBorder;
    }, 1200);
    // 防抖：同一個欄位 800ms 內只跳一次
    var warnKey = fid + '|' + key;
    if(window.__scoreWarnTimer[warnKey]) clearTimeout(window.__scoreWarnTimer[warnKey]);
    window.__scoreWarnTimer[warnKey] = setTimeout(function(){
      delete window.__scoreWarnTimer[warnKey];
    }, 800);
    if(origV > max){
      toast('⚠ '+(label||'此項')+' 最高分為 '+max+' 分，已自動修正為 '+max, false);
    } else if(origV < 0){
      toast('⚠ '+(label||'此項')+' 不可低於 0 分，已自動修正為 0', false);
    }
  }
  input.value = v;
  saveDraftField(fid, key, v);
  if(typeof calcFn==='function') try{ calcFn(fid); }catch(e){}
}

function calcF13Score(fid){
  var realFid=APP.currentFormId?getFormKey(APP.currentFormId):fid;
  var d=Object.assign({},APP.formData[fid]||{},APP.formData[realFid]||{});
  var keys=['s1','s2a','s2b','s2c','s2d','s2e','s2f','s2g','s2h'];
  var total=keys.reduce(function(s,k){return s+(parseInt(d[k])||0);},0);
  var el=document.getElementById('f13_total_'+fid);
  if(el){
    el.innerHTML='<span style="font-size:36px;font-weight:700;color:'+(total>=60?'var(--green)':'var(--red)')+'">'+total+'</span><span style="font-size:14px;color:var(--ink3);"> / 100</span>';
  }
}

  h+='<table class="rating-table"><tr><th style="text-align:left;width:18%;">評分項目</th><th style="text-align:left;">報告評分內容</th><th style="width:12%;">配分</th><th style="width:18%;">評分</th></tr>';

  // 計算每個分類連續出現的項目數，用來合併分類儲存格
  var catSpans={};
  items.forEach(function(it){ catSpans[it.cat]=(catSpans[it.cat]||0)+1; });
  var catRendered={};

  items.forEach(function(item,i){
    var key='f14_sc_'+i;
    var cur=parseInt(d[key]||0)||0;
    // 用通用驗證函式：超分時跳警示 toast、視覺紅色閃一下、自動夾鉗到 0~max
    var labelEsc = String(item.label).replace(/'/g,"\\'");
    var oc="validateScoreInput(this,'"+fid+"','"+key+"',"+item.max+",'"+labelEsc+"',calcF14Score)";
    h+='<tr>';
    // 分類欄：每個分類只在第一行顯示，rowspan 跨越同分類的所有項目
    if(!catRendered[item.cat]){
      h+='<td class="row-label" rowspan="'+catSpans[item.cat]+'" style="vertical-align:middle;text-align:center;font-weight:600;background:#FAFBFF;">'+item.cat+'</td>';
      catRendered[item.cat]=true;
    }
    h+='<td class="row-label" style="text-align:left;">'+item.label+'</td>';
    h+='<td style="text-align:center;color:var(--ink3);font-size:11px;">'+item.max+'</td>';
    h+='<td style="text-align:center;"><input type="number" min="0" max="'+item.max+'" value="'+cur+'" '+(canT?'':'disabled')+' data-fid="'+fid+'" data-key="'+key+'" data-teacher="1" oninput="'+oc+'" onchange="'+oc+'" style="width:70px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;text-align:center;background:'+(canT?'#fff':'var(--cream)')+';">分</td>';
    h+='</tr>';
  });
  h+='</table></div></div>';

  // 分數顯示卡（在評分表下方）
  h+='<div class="card" style="background:linear-gradient(135deg,#EBF5FB,#E8F8F5);">';
  h+='<div class="card-body" style="text-align:center;padding:16px;">';
  h+='<div style="font-size:13px;color:var(--ink3);margin-bottom:4px;">報告總分</div>';
  h+='<div id="f14_total_'+fid+'" style="margin:4px 0;"><span style="font-size:36px;font-weight:700;">0</span><span style="font-size:14px;color:var(--ink3);"> / '+totalMax+'</span></div>';
  h+='</div></div>';
  h+='<div class="card"><div class="card-head"><div class="card-head-title">學生填寫</div></div><div class="card-body">';
  h+='<div class="field"><label>學生回饋</label>'+ta(fid,'s_fb',3,false)+'</div>';
  h+=studentSignRow(fid,'s_sign');
  h+='</div></div>';
  h+='<div class="card"><div class="card-head"><div class="card-head-title">評語與回饋<span class="t-badge">老師</span></div></div><div class="card-body">';
  h+='<div class="field"><label>老師回饋</label>'+ta(fid,'t_fb',3,!canT)+'</div>';
  h+=teacherSignRow(fid,'t_sign',canT);
  h+='</div></div>';

  setTimeout(function(){calcF14Score(fid);},50);
  return h;
}

function calcF14Score(fid){
  var realFid=APP.currentFormId?getFormKey(APP.currentFormId):fid;
  var d=Object.assign({},APP.formData[fid]||{},APP.formData[realFid]||{});
  var total=0;
  // 配分（與 buildF14 / PDF 三方一致）
  var items=[5,5,10,5, 10,10,10,10,15,10, 5, 5];
  var totalMax=items.reduce(function(a,b){return a+b;},0);
  items.forEach(function(max,i){
    var v=parseInt(d['f14_sc_'+i]||0)||0;
    if(v>max)v=max;
    if(v<0)v=0;
    total+=v;
  });
  var el=document.getElementById('f14_total_'+fid);
  if(el){
    el.innerHTML='<span style="font-size:36px;font-weight:700;color:'+(total>=60?'var(--green)':'var(--red)')+'">'+total+'</span><span style="font-size:14px;color:var(--ink3);"> / '+totalMax+'</span>';
  }
}

function calcF15Score(fid){
  var realFid=APP.currentFormId?getFormKey(APP.currentFormId):fid;
  var d=Object.assign({},APP.formData[fid]||{},APP.formData[realFid]||{});
  var attSum=0,sklSum=0,comSum=0,bonus=0;
  for(var i=0;i<6;i++){var v=parseInt(d['f15_att_'+i]||0);attSum+=isNaN(v)?0:v;}
  for(var i=0;i<10;i++){var v2=parseInt(d['f15_skl_'+i]||0);sklSum+=isNaN(v2)?0:v2;}
  for(var i=0;i<4;i++){var v3=parseInt(d['f15_com_'+i]||0);comSum+=isNaN(v3)?0:v3;}
  if((d['bonus']||'').indexOf('+5')>=0) bonus=5;
  var total=attSum+sklSum+comSum+bonus;
  var ok=total>=60;

  // 用 f15_disp_* ID（避免與 mkSection header span 衝突）
  var attEl=document.getElementById('f15_disp_att_'+fid);
  var sklEl=document.getElementById('f15_disp_skl_'+fid);
  var comEl=document.getElementById('f15_disp_com_'+fid);
  var bonEl=document.getElementById('f15_disp_bon_'+fid);
  var totEl=document.getElementById('f15_disp_tot_'+fid);

  if(attEl) attEl.innerHTML='<span style="font-weight:700;color:var(--blue)">'+attSum+'</span><span style="color:var(--ink3);font-size:11px;"> / 30</span>';
  if(sklEl) sklEl.innerHTML='<span style="font-weight:700;color:var(--blue)">'+sklSum+'</span><span style="color:var(--ink3);font-size:11px;"> / 50</span>';
  if(comEl) comEl.innerHTML='<span style="font-weight:700;color:var(--blue)">'+comSum+'</span><span style="color:var(--ink3);font-size:11px;"> / 20</span>';
  if(bonEl) bonEl.innerHTML='<span style="font-weight:700;color:var(--green)">'+(bonus>0?'+'+bonus:'0')+'</span>';
  if(totEl) totEl.innerHTML='<span style="font-size:18px;font-weight:700;color:'+(ok?'var(--green)':'var(--red)')+'">'+total+'</span><span style="color:var(--ink3);font-size:11px;"> / 105 '+(ok?'✓ 及格':'✗ 未及格')+'</span>';
}

// 學習風格中文名稱與描述（依使用者提供的圖片）
const F16_STYLES = {
  VS: { zh:'視覺型',  desc:'善於用圖像顏色學習，擅長從講義、教具與實作項目中學習。' },

  LG: { zh:'邏輯型',  desc:'善用腦力邏輯及數學、善於組合資訊、了解事情前後解決問題。' }
};
// 雷達圖顯示順序（與圖片中的軸位置一致：上→右上→右下→下→左下→左上→左）
const F16_AXIS_ORDER = ['VS','SC','PS','AL','VB','SL','LG'];

// 計算各風格分數（每個 style 對應 10 題，每題最高 2 分 → 最高 20 分）
function calcF16Scores(d){
  var scores = {VS:0, SC:0, PS:0, AL:0, VB:0, SL:0, LG:0};
  for(var i=0; i<F16_QUESTIONS.length; i++){
    var key = 'f16_q_'+(i+1);
    var v = parseInt(d[key]);
    if(isNaN(v) || v<0 || v>2) continue;
    var style = F16_QUESTIONS[i][1];
    if(scores[style]!==undefined) scores[style] += v;
  }
  return scores;
}

// 找出主要學習風格（最高分；若多項並列回傳所有）
function getF16TopStyles(scores){
  var max = 0;
  Object.keys(scores).forEach(function(k){ if(scores[k]>max) max=scores[k]; });
  if(max===0) return [];
  var top = [];
  Object.keys(scores).forEach(function(k){ if(scores[k]===max) top.push(k); });
  return top;
}

// 產生雷達圖 SVG（七邊形雷達；可同時用於網頁與 PDF）
// scores: {VS,SC,PS,AL,VB,SL,LG}; size: 圖示寬高（px）
function buildF16RadarSVG(scores, size){
  size = size || 480;
  var cx = size/2, cy = size/2;
  var maxR = size * 0.36;  // 雷達半徑
  var maxScore = 20;
  var n = F16_AXIS_ORDER.length; // 7 軸
  // 軸的角度（從上方開始，順時針）
  function angleFor(i){ return -Math.PI/2 + i * (2*Math.PI/n); }
  function pt(i, r){
    var a = angleFor(i);
    return [cx + r*Math.cos(a), cy + r*Math.sin(a)];
  }
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+size+' '+size+'" width="'+size+'" height="'+size+'" style="display:block;margin:0 auto;font-family:sans-serif;">';
  // 背景
  svg += '<rect width="'+size+'" height="'+size+'" fill="#FFFFFF"/>';
  // 同心七邊形（4 層，分別代表 5、10、15、20 分）
  for(var lvl=1; lvl<=4; lvl++){
    var r = maxR * lvl / 4;
    var poly = '';
    for(var i=0; i<n; i++){
      var p = pt(i, r);
      poly += (i===0?'M':'L') + p[0].toFixed(2) + ',' + p[1].toFixed(2) + ' ';
    }
    poly += 'Z';
    svg += '<path d="'+poly+'" fill="none" stroke="'+(lvl===4?'#888':'#CCC')+'" stroke-width="'+(lvl===4?'1.5':'1')+'"/>';
    // 在最上方軸上標記分數刻度（5/10/15/20）
    var labelY = cy - r;
    svg += '<text x="'+(cx+4)+'" y="'+(labelY+4)+'" font-size="11" fill="#666">'+(lvl*5)+'</text>';
  }
  // 7 條軸線
  for(var i=0; i<n; i++){
    var p = pt(i, maxR);
    svg += '<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(2)+'" y2="'+p[1].toFixed(2)+'" stroke="#BBB" stroke-width="1"/>';
  }
  // 軸標籤（中文）
  for(var i=0; i<n; i++){
    var styleCode = F16_AXIS_ORDER[i];
    var label = F16_STYLES[styleCode].zh;
    var p = pt(i, maxR + 28);
    var anchor = 'middle';
    if(p[0] > cx + 5) anchor = 'start';
    else if(p[0] < cx - 5) anchor = 'end';
    svg += '<text x="'+p[0].toFixed(2)+'" y="'+(p[1]+5).toFixed(2)+'" text-anchor="'+anchor+'" font-size="14" font-weight="700" fill="#1A3A5C">'+label+'</text>';
  }
  // 資料多邊形
  var dataPoly = '';
  var dataPts = [];
  for(var i=0; i<n; i++){
    var sc = scores[F16_AXIS_ORDER[i]] || 0;
    var ratio = Math.min(sc/maxScore, 1);
    var p = pt(i, maxR * ratio);
    dataPts.push(p);
    dataPoly += (i===0?'M':'L') + p[0].toFixed(2) + ',' + p[1].toFixed(2) + ' ';
  }
  dataPoly += 'Z';
  svg += '<path d="'+dataPoly+'" fill="rgba(192,57,43,0.25)" stroke="#C0392B" stroke-width="2.5"/>';
  // 資料點
  for(var i=0; i<n; i++){
    svg += '<circle cx="'+dataPts[i][0].toFixed(2)+'" cy="'+dataPts[i][1].toFixed(2)+'" r="4" fill="#C0392B"/>';
  }
  svg += '</svg>';
  return svg;
}

// 重新計算並更新網頁版的雷達圖與分數顯示
function calcF16AndRender(fid){
  var realFid = APP.currentFormId ? getFormKey(APP.currentFormId) : fid;
  var d = Object.assign({}, APP.formData[fid]||{}, APP.formData[realFid]||{});

  // 更新分數顯示
  var sumEl = document.getElementById('f16_scores_'+fid);
  if(sumEl){
    var rows = '';
    F16_AXIS_ORDER.forEach(function(code){
      var sc = scores[code];
      var pct = (sc/20*100).toFixed(0);
      var isTop = top.indexOf(code)>=0 && sc>0;
      var bg = isTop ? '#FEF3C7' : '#FAFBFF';
      var color = isTop ? '#C0392B' : '#1A5276';
      var weight = isTop ? '700' : '500';
      rows += '<tr style="background:'+bg+';">';
      rows += '<td style="padding:5px 10px;border:1px solid #DDD;font-size:12px;color:'+color+';font-weight:'+weight+';">'+F16_STYLES[code].zh+(isTop?' ★':'')+'</td>';
      rows += '<td style="padding:5px 10px;border:1px solid #DDD;text-align:center;font-size:13px;font-weight:700;color:'+color+';">'+sc+' / 20</td>';
      rows += '<td style="padding:5px 10px;border:1px solid #DDD;font-size:11px;color:#555;">';
      rows += '<div style="background:#E5E7EB;border-radius:3px;height:8px;overflow:hidden;">';
      rows += '<div style="width:'+pct+'%;height:100%;background:'+(isTop?'#C0392B':'#3B82F6')+';"></div>';
      rows += '</div></td>';
      rows += '</tr>';
    });
    sumEl.innerHTML = rows;
  }
  // 更新雷達圖
  var svgEl = document.getElementById('f16_radar_'+fid);
  if(svgEl) svgEl.innerHTML = buildF16RadarSVG(scores, 420);
  // 更新主要風格文字
  var topEl = document.getElementById('f16_top_'+fid);
  if(topEl){
    if(top.length===0){
      topEl.innerHTML = '<span style="color:var(--ink3);">尚未完成評估</span>';
    } else {
      var topNames = top.map(function(c){ return '<strong style="color:#C0392B;">'+F16_STYLES[c].zh+'</strong>'; }).join('、');
      var topDescs = top.map(function(c){ return '<div style="margin-top:6px;padding:8px 12px;background:#FFF5F5;border-left:3px solid #C0392B;border-radius:4px;font-size:12px;color:#555;line-height:1.7;"><strong style="color:#C0392B;">'+F16_STYLES[c].zh+'：</strong>'+F16_STYLES[c].desc+'</div>'; }).join('');
      topEl.innerHTML = '<div style="font-size:14px;margin-bottom:6px;">您的主要學習風格：'+topNames+'</div>'+topDescs;
    }
  }
}

/* ═══════════ 筆試前測 / 筆試後測 共用元件 ═══════════ */

/* 取得學生在某張考卷的目前作答（從 APP.formData[fkey] 讀取 q1~q25） */
function _examGetAnswers(fid){
  var d=APP.formData[fid]||{};
  var ans=[];
  for(var i=0;i<EXAM_QUESTIONS.length;i++){
    ans.push(d['q'+(i+1)]||'');
  }
  return ans;
}

/* ── 取得此份考卷的題目順序（display index → original question index） ──
   - 後測：第一次解鎖後產生隨機順序並儲存於 formData[fid].order（持久化）；
     之後重新整理、跨裝置同步、暫離回來都會用同一份順序，作答進度不會錯位。
   - 前測：依原始題目順序（不洗牌）。
   - 已送出（submitted）：永遠用儲存的順序，避免改題序。
*/
function _examGetOrder(fid, mode){
  var d=APP.formData[fid]||{};
  // 已存在合法順序 → 直接用（可能是陣列或 JSON 字串，從草稿還原時是字串）
  var existing = d.order;
  if(typeof existing==='string'){
    try{ existing=JSON.parse(existing); }catch(e){ existing=null; }
  }
  if(Array.isArray(existing) && existing.length===EXAM_QUESTIONS.length){
    // 驗證內容是 0~N-1 的排列
    var seen={}, ok=true;
    for(var i=0;i<existing.length;i++){
      var v=existing[i];
      if(typeof v!=='number' || v<0 || v>=EXAM_QUESTIONS.length || seen[v]){ ok=false; break; }
      seen[v]=true;
    }
    if(ok){
      // 把字串型的 order 還原成陣列存回 formData，後續讀取更直接
      APP.formData[fid]=APP.formData[fid]||{};
      APP.formData[fid].order=existing.slice();
      return existing.slice();
    }
  }
  // 沒有順序 → 依模式決定
  var order=[];
  for(var k=0;k<EXAM_QUESTIONS.length;k++) order.push(k);
  if(mode==='post'){
    // Fisher-Yates 洗牌；只在使用者尚未開始作答（沒有 q1…qN）時才洗
    var anyAns=false;
    for(var n=1;n<=EXAM_QUESTIONS.length;n++){
      if(d['q'+n]){ anyAns=true; break; }
    }
    // 已送出時也不能再洗（保持與當初一致）
    if(!anyAns && !d.submitted){
      for(var j=order.length-1;j>0;j--){
        var r=Math.floor(Math.random()*(j+1));
        var tmp=order[j]; order[j]=order[r]; order[r]=tmp;
      }
    }
  }
  // 寫回 formData 並持久化（讓重新進入時順序穩定）
  if(!APP.formData[fid]) APP.formData[fid]={};
  APP.formData[fid].order=order.slice();
  try{ saveDraftField(fid,'order',JSON.stringify(order)); }catch(e){}
  return order;
}

/* 取得「畫面第 N 題」對應的原始題目（含 0-based 原始索引） */
function _examQ(fid, displayIdx, mode){
  var order=_examGetOrder(fid, mode);
  var origIdx=order[displayIdx];
  return { origIdx: origIdx, q: EXAM_QUESTIONS[origIdx] };
}

/* 計算分數：回傳 {score, correctCnt, wrongList:[1-based畫面題號], answered, total}
   註：q1~qN 是依「畫面題號（display index）」儲存；
       校正答案時須透過 order 查回原始 EXAM_QUESTIONS 索引。 */
function _examCalcScore(fid, mode){
  // mode 預設由 formData 推；若無，前測'pre'，後測'post'。呼叫端通常會傳。
  var ans=_examGetAnswers(fid);
  var order=_examGetOrder(fid, mode||'post');
  var correct=0, wrongList=[], answered=0;
  for(var i=0;i<EXAM_QUESTIONS.length;i++){
    var u=(ans[i]||'').toUpperCase();
    var origIdx=order[i];
    var correctAns=EXAM_QUESTIONS[origIdx].answer;
    if(u) answered++;
    if(u===correctAns){
      correct++;
    } else if(u){
      wrongList.push(i+1);
    } else {
      wrongList.push(i+1); // 未作答視為錯誤
    }
  }
  return {
    score: correct*EXAM_PER_QUESTION_SCORE,
    correctCnt: correct,
    wrongList: wrongList,
    answered: answered,
    total: EXAM_QUESTIONS.length
  };
}

/* 點選某題某選項 */
function examPick(fid, qnum, opt){
  var d=APP.formData[fid]||{};
  // 若已送出（submitted）則禁止再修改
  if(d.submitted){ toast('表單已送出，無法再修改答案'); return; }
  saveDraftField(fid, 'q'+qnum, opt);
  // 重繪該題的選項按鈕外觀（避免整張表重繪造成捲動跳位）
  for(var i=0;i<4;i++){
    var L=['A','B','C','D'][i];
    var btn=document.querySelector('button[data-exam-q="'+fid+'-'+qnum+'-'+L+'"]');
    if(btn){
      if(L===opt){
        btn.style.background='#2563EB';
        btn.style.color='#fff';
        btn.style.borderColor='#1E40AF';
      } else {
        btn.style.background='#fff';
        btn.style.color='var(--ink)';
        btn.style.borderColor='var(--border)';
      }
    }
  }
  // 更新進度提示
  var prog=document.getElementById('exam-progress-'+fid);
  if(prog){
    var cnt=0;
    for(var k=1;k<=EXAM_QUESTIONS.length;k++){ if(d['q'+k]) cnt++; }
    prog.textContent='已作答 '+cnt+' / '+EXAM_QUESTIONS.length+' 題';
  }
}

/* 送出筆試（學生按下「送出考卷」） */
async function examSubmit(fid, mode){
  var d=APP.formData[fid]||{};
  if(d.submitted){ toast('此份考卷已送出'); return; }

  // 學生登入時，姓名/學校系統自動帶入；確保 formData 已寫入（保險回填）
  if(APP.currentRole==='student' && APP.currentUser){
    if(!APP.formData[fid]) APP.formData[fid]={};
    if(!APP.formData[fid].s_name && APP.currentUser.name){
      APP.formData[fid].s_name = APP.currentUser.name;
      try{ saveDraftField(fid,'s_name',APP.currentUser.name); }catch(e){}
    }
    if(!APP.formData[fid].school && APP.currentUser.school){
      APP.formData[fid].school = APP.currentUser.school;
      try{ saveDraftField(fid,'school',APP.currentUser.school); }catch(e){}
    }
    // 重新讀取最新值
    d = APP.formData[fid];
  }

  // 必填基本資料檢查
  var missing=[];
  if(!d.s_name) missing.push('學生姓名');
  if(!d.school) missing.push('實習學校');
  if(!d.intern_cat) missing.push('實習類別');
  if(!d.s_date) missing.push('實習日期');
  if(missing.length){
    alert('請先填寫基本資料：'+missing.join('、'));
    return;
  }
  // 計算未作答題數，提醒
  var ans=_examGetAnswers(fid);
  var unanswered=[];
  for(var i=0;i<ans.length;i++){
    if(!ans[i]) unanswered.push(i+1);
  }
  var confirmMsg='送出後將無法再修改答案。';
  if(unanswered.length){
    confirmMsg='您尚有 '+unanswered.length+' 題未作答（第 '+unanswered.join('、')+' 題），這些題目將以「錯誤」計分。\n\n'+confirmMsg;
  }
  confirmMsg+='\n是否確定送出？';
  if(!confirm(confirmMsg)) return;

  // 顯示送出中提示（避免使用者重複按）
  toast('考卷送出中，請稍候…');

  // ★★★ 由 GAS 後端計分 ★★★
  // 將「畫面題號（1~25）對應的學生答案」與「題序」送給後端，
  // 後端比對自己保存的正解，回傳分數、錯題、(後測)正解+解析。
  var order = _examGetOrder(fid, mode);
  var answers = {};
  for(var k=1;k<=EXAM_QUESTIONS.length;k++){
    answers['q'+k] = (d['q'+k]||'').toUpperCase();
  }
  var sid = (APP.currentUser&&APP.currentUser.sid)||'guest';

  try{
    var apiResp = await _examCallApi('examGrade', {
      mode: mode,           // 'pre' | 'post'
      sid: sid,
      fid: fid,
      order: order,         // [0..24] 排列
      answers: answers      // {q1:'A',...}
    });

    if(!apiResp || !apiResp.ok){
      toast('⚠ 計分失敗：'+(apiResp&&apiResp.error?apiResp.error:'伺服器無回應'));
      return;
    }

    // 寫入結果到 formData / 草稿
    var res = apiResp.result || {};
    saveDraftField(fid,'submitted','true');
    saveDraftField(fid,'final_score',String(res.score||0));
    saveDraftField(fid,'final_correct',String(res.correctCnt||0));
    saveDraftField(fid,'final_total',String(res.total||EXAM_QUESTIONS.length));
    saveDraftField(fid,'final_passed',(res.score||0)>=EXAM_PASS_SCORE?'true':'false');
    saveDraftField(fid,'submit_time', new Date().toLocaleString('zh-TW',{hour12:false}));
    // wrongList 用 JSON 字串保存
    saveDraftField(fid,'wrong_list', JSON.stringify(res.wrongList||[]));

    // 後測：把「每題對應的正解+解析」也存起來，之後顯示用
    if(mode==='post' && res.review){
      saveDraftField(fid,'review_data', JSON.stringify(res.review));
    }

    toast('考卷已送出 ✓ 您的分數：'+(res.score||0)+' 分');

    try{
      var rawId = mode==='pre'?'F-PRE':'F-POST';
      saveForm(rawId);
    }catch(e){console.warn('exam saveForm failed:',e);}

    setTimeout(function(){
      var rawId = mode==='pre'?'F-PRE':'F-POST';
      if(typeof openForm==='function') openForm(rawId);
    }, 350);
  }catch(err){
    toast('⚠ 連線後端失敗，無法送出。請檢查網路或洽管理員。');
    console.error('examSubmit failed:', err);
  }
}

/* 取消送出（管理員/老師專用：解除 submitted 狀態，讓學生重作） */
function examReset(fid, mode){
  if(APP.currentRole!=='admin' && APP.currentRole!=='teacher'){
    toast('僅管理員或老師可重置考卷');
    return;
  }
  if(!confirm('確定要重置此份考卷？學生將可重新作答。\n（原始分數紀錄會保留在歷史紀錄中；後測會重新隨機排序題目）')) return;
  // 清除作答與送出標記
  if(!APP.formData[fid]) APP.formData[fid]={};
  APP.formData[fid].submitted='';
  APP.formData[fid].final_score='';
  APP.formData[fid].final_correct='';
  APP.formData[fid].final_total='';
  APP.formData[fid].final_passed='';
  // 清除題序，下次進入會重新洗牌（後測）
  APP.formData[fid].order='';
  for(var i=1;i<=EXAM_QUESTIONS.length;i++){
    APP.formData[fid]['q'+i]='';
  }
  // 同步寫入草稿
  saveDraftField(fid,'submitted','');
  saveDraftField(fid,'final_score','');
  saveDraftField(fid,'order','');
  saveDraftField(fid,'final_correct','');
  for(var j=1;j<=EXAM_QUESTIONS.length;j++){
    saveDraftField(fid,'q'+j,'');
  }
  toast('考卷已重置，可重新作答');
  setTimeout(function(){
    var rawId = mode==='pre'?'F-PRE':'F-POST';
    if(typeof openForm==='function') openForm(rawId);
  }, 200);
}

/* 共用建構：題目作答區（mode = 'pre' | 'post'） */
function _buildExamCommon(f, d, fid, mode){
  var submitted = (d.submitted==='true' || d.submitted===true);
  // ★ 取得題序（後測由後端在解鎖時產生並回傳；前測為原始順序）
  var order = _examGetOrder(fid, mode);

  // 已送出的話，從 formData 讀取「伺服器計分結果」（不再前端計算）
  var res = null;
  var reviewMap = {};   // 後測用：origIdx -> {answer, explanation}
  var wrongSet = {};    // 畫面題號 set
  if(submitted){
    var sc = parseInt(d.final_score||'0',10)||0;
    var cc = parseInt(d.final_correct||'0',10)||0;
    var tt = parseInt(d.final_total||EXAM_QUESTIONS.length,10)||EXAM_QUESTIONS.length;
    var wList = [];
    try{
      var rawW = d.wrong_list;
      if(typeof rawW==='string' && rawW){ wList = JSON.parse(rawW); }
      else if(Array.isArray(rawW)){ wList = rawW; }
    }catch(e){ wList=[]; }
    if(Array.isArray(wList)){ wList.forEach(function(n){ wrongSet[n]=true; }); }
    res = { score: sc, correctCnt: cc, total: tt, wrongList: wList };

    // 後測解析資料
    if(mode==='post'){
      try{
        var rawR = d.review_data;
        var rev = (typeof rawR==='string' && rawR) ? JSON.parse(rawR) : (rawR||null);
        if(rev && typeof rev==='object'){
          // rev 結構: {0: {answer:'A', explanation:'...'}, 1: {...}}（key = origIdx）
          // 或: [{origIdx, answer, explanation}, ...]
          if(Array.isArray(rev)){
            rev.forEach(function(item){
              if(item && typeof item.origIdx==='number'){
                reviewMap[item.origIdx] = { answer: item.answer, explanation: item.explanation||'' };
              }
            });
          } else {
            Object.keys(rev).forEach(function(k){
              reviewMap[parseInt(k,10)] = rev[k];
            });
          }
        }
      }catch(e){}
    }
  }
  var passed = res ? res.score>=EXAM_PASS_SCORE : false;

  // 基本資料區（用既有 helper）
  var h = basicInfoCard(fid, d, '');

  // 結果摘要卡（送出後顯示）
  if(submitted && res){
    var bg = passed ? '#ECFDF5' : '#FEF2F2';
    var bd = passed ? '#10B981' : '#EF4444';
    var ic = passed ? '✅' : '❌';
    var label = passed ? '及格' : '未達及格標準';
    h += '<div class="card" style="border:2px solid '+bd+';">'+
      '<div class="card-head" style="background:'+bd+';color:#fff;"><div class="card-head-title">'+ic+' 作答結果</div></div>'+
      '<div class="card-body" style="background:'+bg+';">'+
      '<div style="display:flex;flex-wrap:wrap;gap:18px;font-size:14px;">'+
      '<div><b>分數：</b><span style="font-size:22px;font-weight:700;color:'+bd+';">'+res.score+'</span> / 100</div>'+
      '<div><b>答對：</b>'+res.correctCnt+' / '+res.total+' 題</div>'+
      '<div><b>狀態：</b><span style="color:'+bd+';font-weight:700;">'+label+'</span>（及格標準 '+EXAM_PASS_SCORE+' 分）</div>'+
      (d.submit_time?'<div><b>送出時間：</b>'+d.submit_time+'</div>':'')+
      '</div>';

    // 前測：只列出錯題題號（不顯示正解）
    if(mode==='pre'){
      if(res.wrongList.length){
        h += '<div style="margin-top:10px;padding:10px 12px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:6px;font-size:13px;color:#7C2D12;">'+
          '<b>📋 答錯（或未作答）的題號：</b>'+
          '<div style="margin-top:6px;font-weight:700;">第 '+res.wrongList.join('、')+' 題</div>'+
          '<div style="margin-top:6px;font-size:11px;color:#9A3412;">※ 前測不揭露正確答案，請自行查閱教材後於後測作答時驗證。</div>'+
          '</div>';
      } else {
        h += '<div style="margin-top:10px;padding:10px 12px;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:6px;font-size:13px;color:#065F46;"><b>👏 全部答對！</b></div>';
      }
    }
    // 後測：顯示完整正解對照（已送出才顯示）
    if(mode==='post'){
      h += '<div style="margin-top:10px;padding:10px 12px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;font-size:13px;color:#1E3A8A;">'+
        '<b>📖 正確答案（後測完成後揭露）</b>'+
        '<div style="margin-top:6px;font-size:12px;color:#1E40AF;">完整作答對照請見下方題目區，正解會以綠色框標示。</div>'+
        '</div>';
    }

    // 重置按鈕（僅管理員/老師可見）
    if(APP.currentRole==='admin' || APP.currentRole==='teacher'){
      h += '<div style="margin-top:12px;text-align:right;">'+
        '<button onclick="examReset(\''+fid+'\',\''+mode+'\')" style="padding:6px 12px;background:#F59E0B;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">🔄 重置考卷（允許重作）</button>'+
        '</div>';
    }
    h += '</div></div>';
  } else {
    // 未送出：顯示作答進度
    var d0=APP.formData[fid]||{};
    var c=0;
    for(var kk=1;kk<=EXAM_QUESTIONS.length;kk++){ if(d0['q'+kk]) c++; }
    h += '<div class="card"><div class="card-head"><div class="card-head-title">作答進度</div></div>'+
      '<div class="card-body" style="font-size:13px;color:var(--ink2);">'+
      '<div id="exam-progress-'+fid+'" style="font-weight:600;color:#1E40AF;">已作答 '+c+' / '+EXAM_QUESTIONS.length+' 題</div>'+
      '<div style="margin-top:6px;font-size:11px;color:var(--ink3);">每題 '+EXAM_PER_QUESTION_SCORE+' 分，共 '+EXAM_QUESTIONS.length+' 題（總分 100 分），及格分數 '+EXAM_PASS_SCORE+' 分。</div>'+
      '<div style="margin-top:4px;font-size:11px;color:var(--ink3);">送出後將自動計分並鎖定，無法再修改答案。</div>'+
      '</div></div>';
  }

  // 題目區
  h += '<div class="card"><div class="card-head"><div class="card-head-title">考題作答（共 '+EXAM_QUESTIONS.length+' 題，每題 '+EXAM_PER_QUESTION_SCORE+' 分）'+
    (mode==='post' ? '<span style="font-size:11px;font-weight:400;color:#fbbf24;margin-left:8px;">📋 題目已隨機排序</span>' : '')+
    '</div></div><div class="card-body">';
  for(var qi=0; qi<EXAM_QUESTIONS.length; qi++){
    var origIdx = order[qi];     // 原始題目索引（題目本身）
    var Q = EXAM_QUESTIONS[origIdx];
    var qnum = qi+1;             // 畫面題號（用於 q1~qN 答案儲存與錯題判定）
    var userAns = (d['q'+qnum]||'').toUpperCase();
    // 已送出時：透過後端回傳的 wrongSet/reviewMap 取得正解狀態
    var serverCorrect = (mode==='post' && reviewMap[origIdx]) ? String(reviewMap[origIdx].answer||'').toUpperCase() : '';
    var isWrong = submitted && (wrongSet[qnum]===true);
    var qBorder = '#E5E7EB';
    var qBg = '#FFFFFF';
    if(submitted){
      if(mode==='post'){
        qBorder = isWrong ? '#FCA5A5' : '#A7F3D0';
        qBg = isWrong ? '#FEF2F2' : '#F0FDF4';
      } else {
        // 前測：只用紅色標出錯題（但不顯示正解）
        if(isWrong){ qBorder = '#FCA5A5'; qBg = '#FEF2F2'; }
      }
    }
    h += '<div style="margin-bottom:14px;padding:12px 14px;border:1px solid '+qBorder+';border-radius:8px;background:'+qBg+';">';
    h += '<div style="font-size:13px;line-height:1.7;color:#111827;margin-bottom:8px;white-space:pre-wrap;"><b style="color:#1E40AF;">第 '+qnum+' 題.</b> '+escapeExamHtml(Q.q)+'</div>';
    h += '<div style="display:flex;flex-direction:column;gap:6px;">';
    var keys=['A','B','C','D'];
    for(var oi=0; oi<keys.length; oi++){
      var L=keys[oi];
      var optText = Q.options[L];
      var selected = (userAns===L);
      // 只有「後測送出後」才知道哪個是正解（從 reviewMap）
      var isCorrectOpt = (mode==='post' && submitted && serverCorrect && L===serverCorrect);

      var btnBg='#fff', btnColor='var(--ink)', btnBorder='var(--border)';
      var marker='';

      if(selected){
        btnBg='#2563EB'; btnColor='#fff'; btnBorder='#1E40AF';
      }
      // 後測送出後：標示正解（綠色框）；同時錯誤選擇用紅色
      if(submitted && mode==='post'){
        if(isCorrectOpt){
          btnBg='#10B981'; btnColor='#fff'; btnBorder='#059669';
          marker=' ✓';
        }
        if(selected && !isCorrectOpt && isWrong){
          btnBg='#EF4444'; btnColor='#fff'; btnBorder='#DC2626';
          marker=' ✗';
        }
      }
      // 前測送出後：選錯的標紅色，但不顯示正解
      if(submitted && mode==='pre'){
        if(selected && isWrong){
          btnBg='#EF4444'; btnColor='#fff'; btnBorder='#DC2626';
          marker=' ✗';
        }
      }

      var disabled = submitted ? 'disabled' : '';
      var cur = 'cursor:'+(submitted?'not-allowed':'pointer')+';';
      h += '<button '+disabled+' data-exam-q="'+fid+'-'+qnum+'-'+L+'" onclick="examPick(\''+fid+'\','+qnum+',\''+L+'\')" '+
        'style="text-align:left;padding:8px 12px;border:1.5px solid '+btnBorder+';border-radius:6px;background:'+btnBg+';color:'+btnColor+';font-size:13px;'+cur+'transition:all .15s;">';
      h += '<b>('+L+')</b> '+escapeExamHtml(optText)+marker;
      h += '</button>';
    }
    h += '</div>';

    // 後測作答後：顯示「您的答案 / 正確答案」摘要 + 解析（資料來自伺服器）
    if(submitted && mode==='post'){
      var rev = reviewMap[origIdx] || null;
      var corrAns = rev ? String(rev.answer||'') : '';
      h += '<div style="margin-top:8px;padding:6px 10px;background:rgba(255,255,255,0.7);border-radius:4px;font-size:11px;color:#374151;">';
      h += '您的答案：<b>'+(userAns||'（未作答）')+'</b>　｜　正確答案：<b style="color:#059669;">'+(corrAns||'—')+'</b>';
      h += '</div>';
      // 正解分析（可摺疊）— 解析也來自伺服器回傳
      var explainText = rev ? String(rev.explanation||'') : '';
      if(explainText){
        var detailId = 'exam-explain-'+fid+'-'+qnum;
        h += '<details style="margin-top:8px;border:1px solid #BFDBFE;border-radius:6px;background:#EFF6FF;" id="'+detailId+'">';
        h += '<summary style="cursor:pointer;padding:8px 12px;font-size:12px;font-weight:700;color:#1E40AF;list-style:none;display:flex;align-items:center;justify-content:space-between;">';
        h += '<span>📖 正解分析（點擊展開／收合）</span>';
        h += '<span style="font-size:10px;color:#64748B;font-weight:400;">出題範疇參考：台灣專技高考呼吸治療師</span>';
        h += '</summary>';
        h += '<div style="padding:12px 14px;border-top:1px solid #BFDBFE;background:#FFFFFF;font-size:12.5px;line-height:1.85;color:#1E293B;white-space:pre-wrap;">';
        h += escapeExamHtml(explainText);
        h += '</div>';
        h += '</details>';
      }
    }
    // 前測作答後：僅標示對／錯（不顯示正解）
    if(submitted && mode==='pre'){
      if(isWrong){
        h += '<div style="margin-top:8px;padding:6px 10px;background:rgba(254,226,226,0.7);border-radius:4px;font-size:11px;color:#991B1B;">您的答案：<b>'+(userAns||'（未作答）')+'</b>　— ❌ 這題答錯了（前測不顯示正解）</div>';
      } else {
        h += '<div style="margin-top:8px;padding:6px 10px;background:rgba(220,252,231,0.7);border-radius:4px;font-size:11px;color:#065F46;">您的答案：<b>'+userAns+'</b>　— ✅ 答對！</div>';
      }
    }

    h += '</div>';
  }
  h += '</div></div>';

  // 送出按鈕（未送出時才顯示）
  if(!submitted){
    h += '<div class="card" style="border:2px dashed #FBBF24;background:#FFFBEB;">'+
      '<div class="card-body" style="text-align:center;">'+
      '<div style="font-size:13px;color:#92400E;margin-bottom:10px;">⚠ 確認所有答案後請按下送出。送出後將自動計分，無法再修改。</div>'+
      '<button onclick="examSubmit(\''+fid+'\',\''+mode+'\')" style="padding:10px 28px;background:linear-gradient(135deg,#DC2626 0%,#B91C1C 100%);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(220,38,38,.3);">📨 送出考卷並計算分數</button>'+
      '</div></div>';
  }

  return h;
}

/* HTML 跳脫（避免題目中含特殊字元造成版面問題） */
function escapeExamHtml(s){
  if(s==null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ─── 筆試前測（送出後僅顯示錯題題號，不揭露正解） ─── */
function buildExamPre(f,d,canT,fkey,canS){
  const fid = fkey || f.id;
  return _buildExamCommon(f, d, fid, 'pre');
}

/* ─── 筆試後測（需 PIN 解鎖才能作答；送出後揭露正解） ─── */
function buildExamPost(f,d,canT,fkey,canS){
  const fid = fkey || f.id;
  // 學生必須先輸入「筆試後測 PIN」才能作答
  // 老師/管理員直接放行
  if(APP.currentRole==='student' && !APP.examUnlocked){
    return _buildExamPostPinGate(fid);
  }
  return _buildExamCommon(f, d, fid, 'post');
}

/* ═══════════════════════════════════════════════════════════════════
   核心課程-課後測驗 共用元件（F-CT01 等）
   ─────────────────────────────────────────────────────────────────
   • 不需 PIN 解鎖、題目順序固定（不洗牌）
   • 每題 10 分、共 10 題、總分 100、及格 60
   • 送出後立即在前端計分並顯示完整正解＋解析（題目皆來自台灣考選部歷屆國考題）
   • 與筆試前/後測的差異：答案存在前端 COURSE_TEST_BANK，不需呼叫後端
   ═══════════════════════════════════════════════════════════════════ */

/* 點選某題某選項（課後測驗版） */
function courseTestPick(fid, qnum, opt){
  var d = APP.formData[fid] || {};
  if(d.submitted==='true' || d.submitted===true){
    toast('表單已送出，無法再修改答案');
    return;
  }
  saveDraftField(fid, 'q'+qnum, opt);
  // 重繪該題的選項按鈕
  for(var i=0; i<4; i++){
    var L = ['A','B','C','D'][i];
    var btn = document.querySelector('button[data-coursetest-q="'+fid+'-'+qnum+'-'+L+'"]');
    if(btn){
      if(L === opt){
        btn.style.background = '#2563EB';
        btn.style.color = '#fff';
        btn.style.borderColor = '#1E40AF';
      } else {
        btn.style.background = '#fff';
        btn.style.color = 'var(--ink)';
        btn.style.borderColor = 'var(--border)';
      }
    }
  }
  // 更新進度提示
  var prog = document.getElementById('course-test-progress-'+fid);
  if(prog){
    var bank = getCourseTestBank(fid);
    if(bank){
      var cnt = 0;
      for(var k=1; k<=bank.questions.length; k++){
        if(d['q'+k]) cnt++;
      }
      prog.textContent = '已作答 ' + cnt + ' / ' + bank.questions.length + ' 題';
    }
  }
}

/* 送出課後測驗（學生按下「送出」）— 前端直接計分，不需後端 */
function courseTestSubmit(fid){
  var d = APP.formData[fid] || {};
  if(d.submitted==='true' || d.submitted===true){
    toast('此份測驗已送出');
    return;
  }
  var bank = getCourseTestBank(fid);
  if(!bank){
    alert('找不到此份課後測驗的題庫');
    return;
  }

  // 學生登入時自動帶入姓名／學校
  if(APP.currentRole==='student' && APP.currentUser){
    if(!APP.formData[fid]) APP.formData[fid] = {};
    if(!APP.formData[fid].s_name && APP.currentUser.name){
      APP.formData[fid].s_name = APP.currentUser.name;
      try{ saveDraftField(fid,'s_name',APP.currentUser.name); }catch(e){}
    }
    if(!APP.formData[fid].school && APP.currentUser.school){
      APP.formData[fid].school = APP.currentUser.school;
      try{ saveDraftField(fid,'school',APP.currentUser.school); }catch(e){}
    }
    d = APP.formData[fid];
  }

  // 必填基本資料檢查
  var missing = [];
  if(!d.s_name) missing.push('學生姓名');
  if(!d.school) missing.push('實習學校');
  if(!d.intern_cat) missing.push('實習類別');
  if(!d.s_date) missing.push('實習日期');
  if(missing.length){
    alert('請先填寫基本資料：' + missing.join('、'));
    return;
  }

  // 統計未作答
  var unanswered = [];
  for(var i=1; i<=bank.questions.length; i++){
    if(!d['q'+i]) unanswered.push(i);
  }
  var confirmMsg = '送出後將無法再修改答案。';
  if(unanswered.length){
    confirmMsg = '您尚有 ' + unanswered.length + ' 題未作答（第 ' + unanswered.join('、') +
                 ' 題），這些題目將以「錯誤」計分。\n\n' + confirmMsg;
  }
  confirmMsg += '\n是否確定送出？';
  if(!confirm(confirmMsg)) return;

  // ★ 前端直接計分（與筆試後測不同——答案直接存於 COURSE_TEST_BANK）
  var res = _courseTestCalcScore(fid);
  if(!res){
    toast('⚠ 計分失敗：找不到題庫');
    return;
  }

  // 寫入結果
  saveDraftField(fid,'submitted','true');
  saveDraftField(fid,'final_score',String(res.score));
  saveDraftField(fid,'final_correct',String(res.correctCnt));
  saveDraftField(fid,'final_total',String(res.total));
  saveDraftField(fid,'final_passed',(res.score>=COURSE_TEST_PASS_SCORE)?'true':'false');
  saveDraftField(fid,'submit_time', new Date().toLocaleString('zh-TW',{hour12:false}));
  saveDraftField(fid,'wrong_list', JSON.stringify(res.wrongList||[]));

  toast('測驗已送出 ✓ 您的分數：' + res.score + ' 分');

  try{
    // 取得裸 id（去掉學號後綴）以呼叫 saveForm
    var bareId = String(fid||'').split('_')[0];
    saveForm(bareId);
  }catch(e){ console.warn('courseTest saveForm failed:', e); }

  setTimeout(function(){
    var bareId2 = String(fid||'').split('_')[0];
    if(typeof openForm==='function') openForm(bareId2);
  }, 350);
}

/* 重置課後測驗（管理員/老師用） */
function courseTestReset(fid){
  if(APP.currentRole!=='admin' && APP.currentRole!=='teacher'){
    toast('僅管理員或老師可重置測驗');
    return;
  }
  if(!confirm('確定要重置此份課後測驗？學生將可重新作答。\n（原始分數紀錄會保留在歷史紀錄中）')) return;
  var bank = getCourseTestBank(fid);
  if(!APP.formData[fid]) APP.formData[fid] = {};
  APP.formData[fid].submitted = '';
  APP.formData[fid].final_score = '';
  APP.formData[fid].final_correct = '';
  APP.formData[fid].final_total = '';
  APP.formData[fid].final_passed = '';
  if(bank){
    for(var i=1; i<=bank.questions.length; i++){
      APP.formData[fid]['q'+i] = '';
    }
  }
  saveDraftField(fid,'submitted','');
  saveDraftField(fid,'final_score','');
  saveDraftField(fid,'final_correct','');
  if(bank){
    for(var j=1; j<=bank.questions.length; j++){
      saveDraftField(fid,'q'+j,'');
    }
  }
  toast('測驗已重置，可重新作答');
  setTimeout(function(){
    var bareId = String(fid||'').split('_')[0];
    if(typeof openForm==='function') openForm(bareId);
  }, 200);
}

/* 課後測驗 builder：題目固定順序、無 PIN、送出後直接揭露正解+解析 */
function buildCourseTest(f, d, canT, fkey, canS){
  var fid = fkey || f.id;
  var bank = getCourseTestBank(fid);
  if(!bank){
    return '<div class="card"><div class="card-body" style="color:#DC2626;">⚠ 找不到此份課後測驗的題庫設定（' + escapeExamHtml(f.id) + '）</div></div>';
  }
  var qs = bank.questions;
  var totalQ = qs.length;
  var perQ = COURSE_TEST_PER_QUESTION_SCORE;
  var passLine = COURSE_TEST_PASS_SCORE;

  var submitted = (d.submitted==='true' || d.submitted===true);

  // 已送出的話，從 formData 讀取送出時保存的計分結果
  var res = null;
  var wrongSet = {};
  if(submitted){
    var sc = parseInt(d.final_score||'0',10) || 0;
    var cc = parseInt(d.final_correct||'0',10) || 0;
    var tt = parseInt(d.final_total||totalQ,10) || totalQ;
    var wList = [];
    try{
      var rawW = d.wrong_list;
      if(typeof rawW==='string' && rawW){ wList = JSON.parse(rawW); }
      else if(Array.isArray(rawW)){ wList = rawW; }
    }catch(e){ wList = []; }
    if(Array.isArray(wList)){
      wList.forEach(function(n){ wrongSet[n] = true; });
    }
    res = { score: sc, correctCnt: cc, total: tt, wrongList: wList };
  }
  var passed = res ? res.score >= passLine : false;

  // ── 基本資料區（沿用筆試的 helper） ──
  var h = basicInfoCard(fid, d, '');

  // ── 課程資訊卡 ──
  h += '<div class="card" style="border:1px solid #6366F1;">' +
       '<div class="card-head" style="background:linear-gradient(135deg,#6366F1 0%,#4F46E5 100%);">' +
       '<div class="card-head-title" style="color:#fff;">📚 ' + escapeExamHtml(bank.title) + '</div></div>' +
       '<div class="card-body" style="background:#EEF2FF;">' +
       '<div style="display:flex;flex-wrap:wrap;gap:14px;font-size:13px;color:#1E1B4B;">' +
       '<div><b>授課講師：</b>' + escapeExamHtml(bank.teacher) + '</div>' +
       '<div><b>課程主題：</b>' + escapeExamHtml(bank.topic) + '</div>' +
       '<div><b>題數：</b>' + totalQ + ' 題</div>' +
       '<div><b>計分：</b>每題 ' + perQ + ' 分（總分 100）</div>' +
       '<div><b>及格：</b>' + passLine + ' 分</div>' +
       '</div></div></div>';

  // ── 結果摘要卡（送出後顯示） ──
  if(submitted && res){
    var bg = passed ? '#ECFDF5' : '#FEF2F2';
    var bd = passed ? '#10B981' : '#EF4444';
    var ic = passed ? '✅' : '❌';
    var label = passed ? '及格' : '未達及格標準';
    h += '<div class="card" style="border:2px solid '+bd+';">'+
      '<div class="card-head" style="background:'+bd+';color:#fff;"><div class="card-head-title">'+ic+' 作答結果</div></div>'+
      '<div class="card-body" style="background:'+bg+';">'+
      '<div style="display:flex;flex-wrap:wrap;gap:18px;font-size:14px;">'+
      '<div><b>分數：</b><span style="font-size:22px;font-weight:700;color:'+bd+';">'+res.score+'</span> / 100</div>'+
      '<div><b>答對：</b>'+res.correctCnt+' / '+res.total+' 題</div>'+
      '<div><b>狀態：</b><span style="color:'+bd+';font-weight:700;">'+label+'</span>（及格標準 '+passLine+' 分）</div>'+
      (d.submit_time?'<div><b>送出時間：</b>'+d.submit_time+'</div>':'')+
      '</div>';
    h += '<div style="margin-top:10px;padding:10px 12px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:6px;font-size:13px;color:#1E3A8A;">'+
         '<b>📖 正確答案與解析（送出後揭露）</b>'+
         '<div style="margin-top:6px;font-size:12px;color:#1E40AF;">完整作答對照請見下方題目區，正解會以綠色框標示，並提供逐題解析。</div>'+
         '</div>';
    // 重置按鈕（管理員/老師可見）
    if(APP.currentRole==='admin' || APP.currentRole==='teacher'){
      h += '<div style="margin-top:12px;text-align:right;">'+
        '<button onclick="courseTestReset(\''+fid+'\')" style="padding:6px 12px;background:#F59E0B;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">🔄 重置測驗（允許重作）</button>'+
        '</div>';
    }
    h += '</div></div>';
  } else {
    // 未送出：顯示作答進度
    var c = 0;
    for(var kk=1; kk<=totalQ; kk++){ if(d['q'+kk]) c++; }
    h += '<div class="card"><div class="card-head"><div class="card-head-title">作答進度</div></div>'+
      '<div class="card-body" style="font-size:13px;color:var(--ink2);">'+
      '<div id="course-test-progress-'+fid+'" style="font-weight:600;color:#1E40AF;">已作答 '+c+' / '+totalQ+' 題</div>'+
      '<div style="margin-top:6px;font-size:11px;color:var(--ink3);">每題 '+perQ+' 分，共 '+totalQ+' 題（總分 100 分），及格分數 '+passLine+' 分。</div>'+
      '<div style="margin-top:4px;font-size:11px;color:var(--ink3);">送出後將自動計分並鎖定，無法再修改答案；同時揭露完整正解與解析。</div>'+
      '</div></div>';
  }

  // ── 題目區（依固定順序） ──
  h += '<div class="card"><div class="card-head"><div class="card-head-title">考題作答（共 '+totalQ+' 題，每題 '+perQ+' 分）</div></div><div class="card-body">';
  for(var qi=0; qi<totalQ; qi++){
    var Q = qs[qi];
    var qnum = qi + 1;
    var userAns = String(d['q'+qnum]||'').toUpperCase();
    var corrAns = String(Q.answer||'').toUpperCase();
    var isWrong = submitted && (wrongSet[qnum]===true);
    var qBorder = '#E5E7EB';
    var qBg = '#FFFFFF';
    if(submitted){
      qBorder = isWrong ? '#FCA5A5' : '#A7F3D0';
      qBg = isWrong ? '#FEF2F2' : '#F0FDF4';
    }
    h += '<div style="margin-bottom:14px;padding:12px 14px;border:1px solid '+qBorder+';border-radius:8px;background:'+qBg+';">';
    h += '<div style="font-size:13px;line-height:1.7;color:#111827;margin-bottom:8px;white-space:pre-wrap;"><b style="color:#1E40AF;">第 '+qnum+' 題.</b> '+escapeExamHtml(Q.q)+'</div>';
    // ── 題目附圖（若該題有 imageKey 對應到 COURSE_TEST_IMG，則顯示） ──
    if(Q.imageKey && typeof COURSE_TEST_IMG!=='undefined' && COURSE_TEST_IMG[Q.imageKey]){
      h += '<div style="margin:6px 0 12px;text-align:center;">'+
           '<img src="'+COURSE_TEST_IMG[Q.imageKey]+'" alt="第 '+qnum+' 題附圖" '+
           'style="max-width:100%;width:auto;max-height:340px;border:1px solid #CBD5E1;border-radius:6px;background:#fff;padding:4px;box-shadow:0 1px 4px rgba(0,0,0,0.06);" />'+
           '<div style="margin-top:4px;font-size:11px;color:var(--ink3);">▲ 第 '+qnum+' 題附圖</div>'+
           '</div>';
    }
    h += '<div style="display:flex;flex-direction:column;gap:6px;">';
    var keys = ['A','B','C','D'];
    for(var oi=0; oi<keys.length; oi++){
      var L = keys[oi];
      var optText = Q.options[L];
      var selected = (userAns === L);
      var isCorrectOpt = (submitted && L === corrAns);

      var btnBg='#fff', btnColor='var(--ink)', btnBorder='var(--border)';
      var marker = '';

      if(selected){
        btnBg = '#2563EB'; btnColor = '#fff'; btnBorder = '#1E40AF';
      }
      // 送出後：標示正解（綠色）；錯誤選擇用紅色
      if(submitted){
        if(isCorrectOpt){
          btnBg = '#10B981'; btnColor = '#fff'; btnBorder = '#059669';
          marker = ' ✓';
        }
        if(selected && !isCorrectOpt && isWrong){
          btnBg = '#EF4444'; btnColor = '#fff'; btnBorder = '#DC2626';
          marker = ' ✗';
        }
      }

      var disabled = submitted ? 'disabled' : '';
      var cur = 'cursor:'+(submitted?'not-allowed':'pointer')+';';
      h += '<button '+disabled+' data-coursetest-q="'+fid+'-'+qnum+'-'+L+'" onclick="courseTestPick(\''+fid+'\','+qnum+',\''+L+'\')" '+
        'style="text-align:left;padding:8px 12px;border:1.5px solid '+btnBorder+';border-radius:6px;background:'+btnBg+';color:'+btnColor+';font-size:13px;'+cur+'transition:all .15s;">';
      h += '<b>('+L+')</b> '+escapeExamHtml(optText)+marker;
      h += '</button>';
    }
    h += '</div>';

    // 送出後：顯示「您的答案 / 正確答案」摘要 + 解析
    if(submitted){
      h += '<div style="margin-top:8px;padding:6px 10px;background:rgba(255,255,255,0.7);border-radius:4px;font-size:11px;color:#374151;">';
      h += '您的答案：<b>'+(userAns||'（未作答）')+'</b>　｜　正確答案：<b style="color:#059669;">'+(corrAns||'—')+'</b>';
      h += '</div>';
      // 正解分析（可摺疊）
      var explainText = String(Q.explanation||'');
      if(explainText){
        h += '<details style="margin-top:8px;border:1px solid #BFDBFE;border-radius:6px;background:#EFF6FF;">';
        h += '<summary style="cursor:pointer;padding:8px 12px;font-size:12px;font-weight:700;color:#1E40AF;list-style:none;display:flex;align-items:center;justify-content:space-between;">';
        h += '<span>📖 正解分析（點擊展開／收合）</span>';
        h += '<span style="font-size:10px;color:#64748B;font-weight:400;">出題範疇參考：台灣考選部歷屆國考題</span>';
        h += '</summary>';
        h += '<div style="padding:12px 14px;border-top:1px solid #BFDBFE;background:#FFFFFF;font-size:12.5px;line-height:1.85;color:#1E293B;white-space:pre-wrap;">';
        h += escapeExamHtml(explainText);
        h += '</div>';
        h += '</details>';
      }
    }

    h += '</div>';
  }
  h += '</div></div>';

  // ── 送出按鈕（未送出時才顯示） ──
  if(!submitted){
    h += '<div class="card" style="border:2px dashed #FBBF24;background:#FFFBEB;">'+
      '<div class="card-body" style="text-align:center;">'+
      '<div style="font-size:13px;color:#92400E;margin-bottom:10px;">⚠ 確認所有答案後請按下送出。送出後將自動計分並揭露正解與解析，無法再修改。</div>'+
      '<button onclick="courseTestSubmit(\''+fid+'\')" style="padding:10px 28px;background:linear-gradient(135deg,#6366F1 0%,#4F46E5 100%);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(99,102,241,.3);">📨 送出測驗並計算分數</button>'+
      '</div></div>';
  }

  return h;
}

/* 解鎖筆試後測（驗證 examPIN，與 teacherPIN 獨立） */
/* ── 後端 API：解鎖、送出考卷皆透過 GAS 驗證
   端點: GAS_URL?action=examUnlock 與 ?action=examGrade
   ─ 為什麼用後端？正解與 PIN 不在前端，學生 F12 也看不到
*/
async function _examCallApi(action, payload){
  if(!GAS_URL || GAS_URL==='YOUR_GAS_URL_HERE'){
    throw new Error('GAS_URL 未設定，無法連線後端');
  }
  // 為避免 CORS preflight，使用 text/plain 把 JSON body 直接送到 GAS。
  // GAS 端透過 e.postData.contents 解析。
  var bodyObj = {
    action: action,
    payload: payload || {},
    t: Date.now()
  };
  var resp;
  try{
    resp = await fetch(GAS_URL, {
      method: 'POST',
      // 用 text/plain（CORS-safelisted，瀏覽器不會發 OPTIONS preflight）
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(bodyObj),
      // GAS 會回應 302 redirect 到 googleusercontent.com 取得真正 JSON，必須跟著轉址
      redirect: 'follow',
      mode: 'cors'
    });
  }catch(netErr){
    // fetch 拋例外通常代表 CORS 被擋或網路斷線
    throw new Error('無法連線後端（'+(netErr.message||netErr)+'）。請確認 GAS 已正確部署為「任何人」可存取，並重新部署新版本。');
  }
  if(!resp.ok){
    throw new Error('伺服器回應錯誤：HTTP '+resp.status+' '+(resp.statusText||''));
  }
  var text = await resp.text();
  if(!text){
    throw new Error('伺服器回應為空，可能 doPost 沒回傳內容。');
  }
  try{
    return JSON.parse(text);
  }catch(e){
    // 後端回傳非 JSON（例如 HTML 錯誤頁）
    throw new Error('伺服器回應格式錯誤（非 JSON）。請確認 GAS 已部署 examRouter，並選擇「新增版本」重新部署。');
  }
}

async function examPostUnlock(){
  var inp = document.getElementById('exam-pin-input');
  var msg = document.getElementById('exam-pin-msg');
  if(!inp || !msg) return;
  // 同步 trim 前後空白，避免使用者誤輸入空白導致比對失敗
  var pin = clipInput((inp.value||'').trim(), 32);
  if(!pin){
    msg.style.color='#DC2626';
    msg.textContent='請輸入 PIN 碼';
    return;
  }
  // 前端鎖（仍保留作為輔助節流；真實驗證在伺服器）
  var lockKey='exampin_'+(APP.currentUser&&APP.currentUser.sid?APP.currentUser.sid:'guest');
  var locked=isLocked(lockKey);
  if(locked){
    msg.style.color='#DC2626';
    msg.textContent='PIN 嘗試次數過多，請等待 '+locked+' 秒後再試';
    return;
  }
  msg.style.color='#1E40AF';
  msg.textContent='驗證中…';
  // 呼叫 GAS 後端驗證 PIN，並請後端回傳「為這位學生產生的隨機題序」
  try{
    var sid = (APP.currentUser&&APP.currentUser.sid)||'guest';
    var fid = getFormKey('F-POST');
    var apiResp = await _examCallApi('examUnlock', { pin: pin, sid: sid, fid: fid });
    if(apiResp && apiResp.ok){
      clearFails(lockKey);
      APP.examUnlocked=true;
      // 把伺服器產生的題序寫入 formData（但若已有合法 order 與作答，保留原 order）
      if(Array.isArray(apiResp.order) && apiResp.order.length){
        if(!APP.formData[fid]) APP.formData[fid]={};
        var existingOrder = APP.formData[fid].order;
        // 已存在合法 order → 保留（避免破壞作答中的對應關係）
        var hasValidOrder = false;
        if(typeof existingOrder==='string' && existingOrder){
          try{ existingOrder = JSON.parse(existingOrder); }catch(e){ existingOrder=null; }
        }
        if(Array.isArray(existingOrder) && existingOrder.length===EXAM_QUESTIONS.length){
          hasValidOrder=true;
        }
        if(!hasValidOrder){
          APP.formData[fid].order = apiResp.order.slice();
          try{ saveDraftField(fid,'order',JSON.stringify(apiResp.order)); }catch(e){}
        }
      }
      msg.style.color='#10B981';
      msg.textContent='✓ 解鎖成功，正在開啟後測...';
      inp.value='';
      setTimeout(function(){ openForm('F-POST'); }, 350);
    } else {
      recordFail(lockKey);
      msg.style.color='#DC2626';
      msg.textContent=(apiResp && apiResp.error) ? apiResp.error : 'PIN 碼錯誤，請洽監考老師。';
      inp.value='';
    }
  }catch(err){
    msg.style.color='#DC2626';
    msg.textContent='⚠ 連線後端失敗：'+(err.message||err)+'。請稍後再試或洽管理員。';
  }
}

document.addEventListener('change', function(e){
  var el=e.target;
  var fid=el.getAttribute&&el.getAttribute('data-fid');
  var key=el.getAttribute&&el.getAttribute('data-key');
  if(!fid||!key)return;
  // 日期區間的 _start/_end 由 updateFn 統一處理，這裡跳過
  if(key.endsWith('_start')||key.endsWith('_end')) return;
  var v=el.type==='checkbox'?el.checked:el.value;
  saveDraftField(fid, key, v);
});

document.addEventListener('input', function(e){
  var el=e.target;
  var fid=el.getAttribute&&el.getAttribute('data-fid');
  var key=el.getAttribute&&el.getAttribute('data-key');
  if(!fid||!key)return;
  if(el.tagName!=='TEXTAREA'&&el.type!=='text'&&el.type!=='number')return;
  // 立即存到記憶體，延遲存 localStorage
  saveDraftField(fid, key, el.value);
});

const CONFIG_SHEET='_系統設定';

async function saveConfigToSheets(){
  const config={students:APP.students,teachers:APP.teachers,adminPwd:APP.adminPwd,teacherPIN:APP.teacherPIN,examPIN:APP.examPIN,courseTopics:APP.courseTopics,courseSpeakers:APP.courseSpeakers,studentOrder:APP.studentOrder||[],teacherOrder:APP.teacherOrder||[]};
  const configStr = JSON.stringify(config);

  // 【安全】只有管理員才把完整 config 存進 localStorage（含所有學生明文密碼）
  // 學生 / 老師登入時，localStorage 不存任何別人的帳號資料
  // 這樣下一位使用同一台電腦的學生無法從 F12 看到別人的密碼
  if(APP.currentRole==='admin'){
    localStorage.setItem('app_config', configStr);
  } else {
    // 學生/老師：localStorage 中清掉舊的 app_config（如果之前管理員登入留下殘餘）
    try{ localStorage.removeItem('app_config'); }catch(e){}
  }

  try {
    // 每次建立全新的 iframe，避免重複使用問題
    const iframeId = '_gas_iframe_' + Date.now();
    const iframe = document.createElement('iframe');
    iframe.name = iframeId;
    iframe.id = iframeId;
    iframe.style.display = 'none';
    document.body.appendChild(iframe);

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = GAS_URL;
    form.target = iframeId;
    form.style.display = 'none';

    const inputConfig = document.createElement('input');
    inputConfig.type = 'hidden';
    inputConfig.name = 'config';
    inputConfig.value = configStr;
    form.appendChild(inputConfig);

    const inputAction = document.createElement('input');
    inputAction.type = 'hidden';
    inputAction.name = 'action';
    inputAction.value = 'saveConfig';
    form.appendChild(inputAction);

    // 【安全】帶上 WRITE_SECRET 通過 GAS 端身份驗證
    if(typeof GAS_WRITE_SECRET!=='undefined' && GAS_WRITE_SECRET){
      const inputSecret = document.createElement('input');
      inputSecret.type = 'hidden';
      inputSecret.name = 'secret';
      inputSecret.value = GAS_WRITE_SECRET;
      form.appendChild(inputSecret);
    }

    document.body.appendChild(form);
    form.submit();

    // 等待完成後清理
    await new Promise(resolve => setTimeout(resolve, 3000));
    document.body.removeChild(form);
    document.body.removeChild(iframe);

    toast('設定已儲存並同步至所有裝置 ✓');
  } catch(e) {
    console.warn('GAS save error:', e);
    toast('已儲存至本機');
  }
}

async function loadConfigFromSheets(){
  const local=localStorage.getItem('app_config');
  if(local){try{applyConfig(JSON.parse(local));}catch(e){}}
  // 用 GAS 讀取（不需要 OAuth）
  try{
    const resp=await fetch(GAS_URL+'?t='+Date.now(),{cache:'no-cache'});
    const data=await resp.json();
    const val=data.config;
    if(val){
      applyConfig(JSON.parse(val));
      localStorage.setItem('app_config',val);
      toast('設定已從 Google Sheets 載入 ✓');
      if(APP.currentRole==='admin')renderAdmin();
    }
  }catch(e){console.warn('Config load:',e);}
}

function applyConfig(cfg){
  // 合併帳號（不覆蓋預設值，只新增）
  if(cfg.students) Object.assign(APP.students, cfg.students);
  if(cfg.teachers) Object.assign(APP.teachers, cfg.teachers);
  if(cfg.adminPwd) APP.adminPwd=cfg.adminPwd;
  if(cfg.teacherPIN) APP.teacherPIN=cfg.teacherPIN;
  if(cfg.examPIN) APP.examPIN=cfg.examPIN;
  if(cfg.courseTopics?.length>0) APP.courseTopics=cfg.courseTopics;
  if(cfg.courseSpeakers?.length>0) APP.courseSpeakers=cfg.courseSpeakers;
  if(cfg.studentOrder && cfg.studentOrder.length>0) APP.studentOrder=cfg.studentOrder;
  if(cfg.teacherOrder && cfg.teacherOrder.length>0) APP.teacherOrder=cfg.teacherOrder;
}
