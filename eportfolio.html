async function updateExamPIN(){
  const newPin=clipInput((document.getElementById('exam-pin-display').value||'').trim(), 32);
  if(!newPin){ toast('請輸入新 PIN 碼', false); return; }
  if(newPin.length<4){ toast('PIN 碼至少 4 碼', false); return; }

  // 【方案 A】同步更新到 GAS 後端
  // 為避免任何人都能改 PIN，要求管理員輸入管理員密碼做身份驗證
  var adminPwd = prompt('⚠ 此 PIN 將即時同步至伺服器（GAS 後端）。\n為避免未授權更動，請輸入「管理員密碼」確認身份：\n\n（這是您在 GAS 後端 setupAdminPassword 設定的密碼，與一般帳號密碼可不同）');
  if(adminPwd===null) return;  // 使用者取消
  adminPwd = (adminPwd||'').trim();
  if(!adminPwd){ toast('未輸入管理員密碼，已取消',false); return; }

  // 在前端先把管理員密碼雜湊化，再送到 GAS（GAS 有相同雜湊存放，不需明文比對）
  toast('PIN 同步中…');
  var adminPwdHash;
  try{
    adminPwdHash = await sha256(adminPwd);
  }catch(e){
    toast('密碼雜湊失敗：'+(e.message||e), false);
    return;
  }

  // 呼叫 GAS examSetPin
  try{
    var apiResp = await _examCallApi('examSetPin', {
      newPin: newPin,
      adminPwdHash: adminPwdHash
    });
    if(!apiResp || !apiResp.ok){
      toast('⚠ 同步失敗：'+((apiResp&&apiResp.error)||'伺服器無回應'), false);
      return;
    }
    // 成功 → 同時更新前端 examPIN（保留向下相容，但實際以伺服器為準）
    APP.examPIN = 'h:' + (await sha256(newPin));
    saveConfigToSheets();
    toast('✓ 筆試後測 PIN 已更新並同步至伺服器');
  }catch(err){
    toast('⚠ 連線後端失敗：'+(err.message||err), false);
    return;
  }

  var ep=document.getElementById('exam-pin-display');
  if(ep){
    ep.type='password';
    ep.value='';
  }
}

/* ── 雲端清除 helper：把 formKey 的雲端資料覆蓋為空，並送出特殊清除指令 ── */
async function clearCloudFormData(formKey){
  if(!GAS_URL || GAS_URL === 'YOUR_GAS_URL_HERE') return false;
  return new Promise(function(resolve){
    try{
      var iframeId = '_clr_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
      var iframe = document.createElement('iframe');
      iframe.name = iframeId; iframe.id = iframeId; iframe.style.display = 'none';
      document.body.appendChild(iframe);
      var form = document.createElement('form');
      form.method = 'POST'; form.action = GAS_URL; form.target = iframeId; form.style.display = 'none';
      var payload = {
        action: 'saveForm',
        formId: formKey,
        data: '{}',           // 空資料覆蓋
        history: '[]',        // 空歷史紀錄覆蓋
        studentId: 'admin_clear',
        // 【安全】帶上 WRITE_SECRET 通過 GAS 端身份驗證
        secret: (typeof GAS_WRITE_SECRET!=='undefined' && GAS_WRITE_SECRET) ? GAS_WRITE_SECRET : ''
      };
      Object.entries(payload).forEach(function(entry){
        var k=entry[0], v=entry[1];
        var inp = document.createElement('input');
        inp.type='hidden'; inp.name=k; inp.value=v;
        form.appendChild(inp);
      });
      document.body.appendChild(form);
      form.submit();
      setTimeout(function(){
        try{ document.body.removeChild(form); document.body.removeChild(iframe); }catch(e){}
        resolve(true);
      }, 1500);
    }catch(e){
      console.warn('clearCloudFormData failed:', e);
      resolve(false);
    }
  });
}

async function clearLocalTestData(){
  if(!confirm('⚠ 確定要清除「所有表單填寫資料」與「歷史紀錄」嗎？\n\n此操作會：\n• ✅ 清除本機（瀏覽器）的所有表單資料\n• ✅ 清除雲端 Google Sheets 對應的所有表單資料\n\n不會清除：\n• ❌ 學生/老師帳號\n• ❌ 密碼、PIN、其他設定\n\n💡 建議先點「備份所有資料」保留一份。')) return;
  if(!confirm('⚠ 二次確認：此動作無法復原，確定執行？\n\n雲端清除可能需要 30 秒以上，過程請勿關閉視窗。')) return;

  // 蒐集所有要清除的 formKey（從本機資料推算）
  var allFormKeys = new Set();
  Object.keys(APP.formData).forEach(function(k){ if(k.indexOf('_')>0) allFormKeys.add(k); });
  Object.keys(APP.historyLog).forEach(function(k){ if(k.indexOf('_')>0) allFormKeys.add(k); });
  try{
    var drafts = JSON.parse(localStorage.getItem('form_drafts')||'{}');
    Object.keys(drafts).forEach(function(k){ if(k.indexOf('_')>0) allFormKeys.add(k); });
    var hLogs = JSON.parse(localStorage.getItem('history_logs')||'{}');
    Object.keys(hLogs).forEach(function(k){ if(k.indexOf('_')>0) allFormKeys.add(k); });
  }catch(e){}

  // 也對所有現存學生 × 所有表單 ID 都做一次（即使本機沒記錄，雲端可能有）
  if(typeof FORMS!=='undefined' && APP.students){
    Object.keys(APP.students).forEach(function(sid){
      FORMS.forEach(function(f){ allFormKeys.add(f.id+'_'+sid); });
    });
  }

  var formKeyList = Array.from(allFormKeys);
  toast('⏳ 正在清除雲端資料...請稍候 (' + formKeyList.length + ' 份)');

  // 清雲端：依序清除（避免太多並行請求被 GAS 限流）
  var cleared = 0;
  for(var i=0; i<formKeyList.length; i++){
    await clearCloudFormData(formKeyList[i]);
    cleared++;
    if(cleared % 5 === 0){
      toast('⏳ 雲端清除進度：'+cleared+' / '+formKeyList.length);
    }
  }

  // 清本機
  APP.formData = {};
  APP.historyLog = {};
  try{
    localStorage.removeItem('form_drafts');
    localStorage.removeItem('history_logs');
  }catch(e){}

  toast('✓ 本機與雲端測試資料已全部清除（共 '+formKeyList.length+' 份）');
  setTimeout(function(){
    if(typeof renderSidebar==='function') renderSidebar();
    if(typeof renderAdmin==='function') renderAdmin();
  }, 500);
}

/* ── 清除指定學生的所有表單資料（本機 + 雲端） ── */
async function clearAllStudentForms(){
  var sid = prompt('請輸入要清除表單資料的學號：\n\n（此操作只清除該學生的表單填寫，不會刪除帳號）');
  if(!sid) return;
  sid = sid.trim();
  if(!APP.students[sid]){
    toast('⚠ 查無此學號');
    return;
  }
  var name = APP.students[sid].name;
  if(!confirm('⚠ 確定要清除學生「'+name+'」（'+sid+'）的所有表單資料嗎？\n\n此操作會清除：\n• ✅ 本機（瀏覽器）的填寫資料與歷史紀錄\n• ✅ 雲端 Google Sheets 對應資料\n\n不會清除：\n• ❌ 該學生的帳號\n\n💡 建議先「備份所有資料」。')) return;
  if(!confirm('⚠ 二次確認：此動作無法復原，確定執行？')) return;

  // 蒐集該學生的所有 formKey（本機 + 預計雲端）
  var formKeys = new Set();
  Object.keys(APP.formData).forEach(function(k){ if(k.endsWith('_'+sid)) formKeys.add(k); });
  Object.keys(APP.historyLog).forEach(function(k){ if(k.endsWith('_'+sid)) formKeys.add(k); });
  try{
    var drafts = JSON.parse(localStorage.getItem('form_drafts')||'{}');
    Object.keys(drafts).forEach(function(k){ if(k.endsWith('_'+sid)) formKeys.add(k); });
    var hLogs = JSON.parse(localStorage.getItem('history_logs')||'{}');
    Object.keys(hLogs).forEach(function(k){ if(k.endsWith('_'+sid)) formKeys.add(k); });
  }catch(e){}
  // 加上所有可能的 formId_sid 組合（雲端可能有但本機沒記錄）
  if(typeof FORMS!=='undefined'){
    FORMS.forEach(function(f){ formKeys.add(f.id+'_'+sid); });
  }

  var formKeyList = Array.from(formKeys);
  toast('⏳ 正在清除 '+esc(name)+' 的雲端資料...');

  for(var i=0; i<formKeyList.length; i++){
    await clearCloudFormData(formKeyList[i]);
    if((i+1) % 5 === 0){
      toast('⏳ 進度：'+(i+1)+' / '+formKeyList.length);
    }
  }

  // 清本機
  formKeyList.forEach(function(k){
    delete APP.formData[k];
    delete APP.historyLog[k];
  });
  try{
    var drafts2 = JSON.parse(localStorage.getItem('form_drafts')||'{}');
    formKeyList.forEach(function(k){ delete drafts2[k]; });
    localStorage.setItem('form_drafts', JSON.stringify(drafts2));
    var hLogs2 = JSON.parse(localStorage.getItem('history_logs')||'{}');
    formKeyList.forEach(function(k){ delete hLogs2[k]; });
    localStorage.setItem('history_logs', JSON.stringify(hLogs2));
  }catch(e){}

  toast('✓ 已清除 '+esc(name)+' 的所有資料（本機+雲端共 '+formKeyList.length+' 份）');
}

    };

/* ═══════════ DRAG & DROP 排序 ═══════════ */
var _dragSrc = null;

function dragStart(e){
  _dragSrc = e.currentTarget;
  e.currentTarget.style.opacity = '0.4';
  e.currentTarget.style.background = '#FFF8E8';
  if(e.dataTransfer){
    e.dataTransfer.effectAllowed = 'move';
    try{ e.dataTransfer.setData('text/plain', e.currentTarget.dataset.idx); }catch(err){}
  }
}

function dragOver(e){
  if(e.preventDefault) e.preventDefault();
  if(e.dataTransfer) e.dataTransfer.dropEffect = 'move';
  // 視覺提示
  var tgt = e.currentTarget;
  if(tgt && tgt !== _dragSrc){
    tgt.style.borderTop = '3px solid var(--gold)';
  }
  return false;
}

function dragLeave(e){
  if(e.currentTarget) e.currentTarget.style.borderTop = '';
}

function dragDrop(e){
  if(e.stopPropagation) e.stopPropagation();
  if(e.preventDefault) e.preventDefault();
  var tgt = e.currentTarget;
  if(!_dragSrc || _dragSrc === tgt) return false;
  var listType = _dragSrc.dataset.list;
  var srcIdx = _dragSrc.dataset.idx;
  var dstIdx = tgt.dataset.idx;
  if(listType === 'topics' || listType === 'speakers'){
    // 數字索引（陣列）
    var arr = (listType==='topics') ? APP.courseTopics : APP.courseSpeakers;
    var sI = parseInt(srcIdx), dI = parseInt(dstIdx);
    var moved = arr.splice(sI, 1)[0];
    arr.splice(dI, 0, moved);
    if(listType==='topics') refreshTopicList(); else refreshSpeakerList();
  } else if(listType === 'students'){
    // 字串 sid（順序陣列）
    if(!APP.studentOrder) getStudentOrder();
    var sIdx = APP.studentOrder.indexOf(srcIdx);
    var dIdx = APP.studentOrder.indexOf(dstIdx);
    if(sIdx >= 0 && dIdx >= 0){
      var s = APP.studentOrder.splice(sIdx, 1)[0];
      APP.studentOrder.splice(dIdx, 0, s);
      refreshStudentTable();
    }
  } else if(listType === 'teachers'){
    if(!APP.teacherOrder) getTeacherOrder();
    var sI2 = APP.teacherOrder.indexOf(srcIdx);
    var dI2 = APP.teacherOrder.indexOf(dstIdx);
    if(sI2 >= 0 && dI2 >= 0){
      var t = APP.teacherOrder.splice(sI2, 1)[0];
      APP.teacherOrder.splice(dI2, 0, t);
      refreshTeacherTable();
    }
  }
  saveConfigToSheets();
  return false;
}

function dragEnd(e){
  if(e.currentTarget){
    e.currentTarget.style.opacity = '';
    e.currentTarget.style.background = '';
  }
  // 清除所有拖曳邊框
  document.querySelectorAll('.drag-row').forEach(function(el){
    el.style.borderTop = '';
  });
  _dragSrc = null;
}

function connectGoogleSheets(){
  if (GOOGLE_CLIENT_ID === 'YOUR_CLIENT_ID_HERE.apps.googleusercontent.com') {
    updateGsStatus('warn', '⚠ 請先在程式碼中填入您的 Google OAuth Client ID');
    alert('尚未設定 Google Client ID。\n\n請照以下步驟：\n1. 前往 console.cloud.google.com\n2. 建立專案 → 啟用 Sheets API\n3. 建立 OAuth 憑證（網頁應用程式）→ 取得 Client ID\n4. 將 Client ID 貼入程式碼 GOOGLE_CLIENT_ID 變數\n5. 在「已授權的 JavaScript 來源」加入此頁面的網址');
    return;
  }
  updateGsStatus('info', '正在開啟 Google 授權…');
  if (!GS.tokenClient) {
    initGoogleAuth().then(() => { if (GS.tokenClient) GS.tokenClient.requestAccessToken(); });
  } else {

}

  var curPwdHint = (typeof acc.pwd==='string' && acc.pwd.indexOf('h:')===0)
    ? '（目前：已雜湊，無法檢視）'
    : '（目前：' + (acc.pwd||'') + '）';
  const newPwd = prompt('修改密碼' + curPwdHint + '\n留空表示不變更；輸入新密碼將以明文儲存。', '');
  const cleanName = clipInput((newName||acc.name).trim(), MAX_NAME_LENGTH);
  const cleanSchool = clipInput((newSchool||acc.school||'').trim(), MAX_NAME_LENGTH);
  const cleanPwd = newPwd && newPwd.trim() ? clipInput(newPwd.trim(), MAX_SHORT_LENGTH) : null;
  // 依管理需求：學生密碼以明文儲存
  const finalPwd = cleanPwd !== null ? cleanPwd : acc.pwd;
  if (trimmedSid && trimmedSid !== sid) {
    APP.students[trimmedSid] = {
      name: cleanName,
      school: cleanSchool,
      pwd: finalPwd,
      expiry: acc.expiry,
      selfRegistered: acc.selfRegistered,
      registeredAt: acc.registeredAt
    };
    delete APP.students[sid];
    if (APP.studentOrder && APP.studentOrder.indexOf(sid) >= 0) {
      APP.studentOrder = APP.studentOrder.map(function(s){ return s === sid ? trimmedSid : s; });
    }
  } else {
    APP.students[sid].name = cleanName;
    APP.students[sid].school = cleanSchool;
    if (cleanPwd !== null) APP.students[sid].pwd = cleanPwd;
  }
  refreshStudentTable();
  saveConfigToSheets();
  toast('✓ 學生資料已更新');
}

/* ── 老師帳號修改 ── */
async function editTeacher(card) {
  const acc = APP.teachers[card];
  if (!acc) return;
  const newCard = prompt('修改卡號（目前：' + card + '）\n⚠ 注意：修改卡號後，老師需用新卡號登入', card);
  if (newCard === null) return;
  const trimmedCard = clipInput(newCard.trim(), MAX_SHORT_LENGTH);
  if (trimmedCard && trimmedCard !== card) {
    if (!trimmedCard) { toast('⚠ 卡號不可為空'); return; }
    if (!/^[A-Za-z0-9_-]+$/.test(trimmedCard)) { toast('⚠ 卡號只能包含英數字底線減號'); return; }
    if (APP.teachers[trimmedCard]) { toast('⚠ 此卡號「' + trimmedCard + '」已被使用'); return; }
  }
  const newName = prompt('修改姓名（目前：' + acc.name + '）', acc.name);
  if (newName === null) return;
  var curTPwdHint = (typeof acc.pwd==='string' && acc.pwd.indexOf('h:')===0)
    ? '（目前：已雜湊，無法檢視）'
    : '（目前：' + (acc.pwd||'') + '）';
  const newPwd = prompt('修改密碼' + curTPwdHint + '\n留空表示不變更；輸入新密碼將以明文儲存。', '');
  const cleanName = clipInput((newName||acc.name).trim(), MAX_NAME_LENGTH);
  const cleanPwd = newPwd && newPwd.trim() ? clipInput(newPwd.trim(), MAX_SHORT_LENGTH) : null;
  const finalTPwd = cleanPwd !== null ? cleanPwd : acc.pwd;
  if (trimmedCard && trimmedCard !== card) {
    APP.teachers[trimmedCard] = { name: cleanName, pwd: finalTPwd };
    delete APP.teachers[card];
    if (APP.teacherOrder && APP.teacherOrder.indexOf(card) >= 0) {
      APP.teacherOrder = APP.teacherOrder.map(function(c){ return c === card ? trimmedCard : c; });
    }
  } else {
    APP.teachers[card].name = cleanName;
    if (cleanPwd !== null) APP.teachers[card].pwd = cleanPwd;
  }
  refreshTeacherTable();
  saveConfigToSheets();
  toast('✓ 老師資料已更新');
}

/* ── 批次下載已完成表單 PDF ── */
function batchDownloadPDF(){
  var doneForms=FORMS.filter(function(f){return getStatus(f.id)==='done';});
  if(doneForms.length===0){toast('目前沒有已完成的表單');return;}

  // 收集所有已完成表單的 HTML
  var allHtml='<!DOCTYPE html><html><head><meta charset="UTF-8">';
  allHtml+='<title>臺中榮總 e-Portfolio 已完成表單</title>';
  allHtml+='<style>';
  allHtml+='@page{size:A4;margin:1.5cm;}';
  allHtml+='body{font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;font-size:10pt;color:#1A1612;margin:0;}';
  allHtml+='table{width:100%;border-collapse:collapse;margin-bottom:10px;}';
  allHtml+='td,th{border:1px solid #DDD;padding:5px 8px;font-size:10pt;}';
  /* ★ 每張表單獨立成頁：列印時強制下一張表單從新一頁開始 */
  allHtml+='.form-page{page-break-after:always;break-after:page;}';
  allHtml+='.form-page:last-child{page-break-after:auto;break-after:auto;}';
  /* 表單內的元素盡量避免被切開（標題與內容、表格列等） */
  allHtml+='.header{page-break-after:avoid;break-after:avoid;}';
  allHtml+='.sec{page-break-after:avoid;break-after:avoid;page-break-inside:avoid;break-inside:avoid;}';
  allHtml+='table{page-break-inside:auto;}';
  allHtml+='tr{page-break-inside:avoid;break-inside:avoid;}';
  allHtml+='.history{page-break-inside:avoid;break-inside:avoid;}';
  /* 螢幕預覽時也用視覺分隔線顯示分頁位置 */
  allHtml+='@media screen{.form-page{border-bottom:3px double #B8860B;margin-bottom:24px;padding-bottom:20px;}.form-page:last-child{border-bottom:none;}}';
  allHtml+='.header{text-align:center;border-bottom:3px solid #B8860B;padding-bottom:10px;margin-bottom:12px;}';
  allHtml+='.hosp{font-size:9pt;color:#666;letter-spacing:1px;}';
  allHtml+='.title{font-size:15pt;font-weight:700;margin:5px 0;}';
  allHtml+='.sub{font-size:9pt;color:#888;}';
  allHtml+='.info-bar{font-size:9pt;color:#555;margin-top:5px;background:#F5F5F0;padding:4px 8px;border-radius:3px;}';
  allHtml+='.sec{background:#1A3A5C;color:#fff;font-weight:700;padding:5px 10px;margin-top:10px;}';
  allHtml+='.t-row td{background:#FFF5F5;}';
  allHtml+='.s-row td{background:#F5F9FF;}';
  allHtml+='.r-sel-s{background:#2471A3!important;color:#fff!important;font-weight:700;}';
  allHtml+='.r-sel-t{background:#C0392B!important;color:#fff!important;font-weight:700;}';
  allHtml+='.history{border-top:2px solid #DDD;margin-top:12px;padding-top:8px;font-size:9pt;color:#666;}';
  allHtml+='.history-row{padding:2px 0;border-bottom:1px dashed #EEE;}';
  allHtml+='</style></head><body>';

  var studentName='',studentId='',studentSchool='';
  if(APP.currentRole==='student'&&APP.currentUser){
    studentName=APP.currentUser.name;
    studentId=APP.currentUser.sid||'';
    studentSchool=APP.currentUser.school||'';
  } else if(APP.currentStudentId){
    var stu=APP.students[APP.currentStudentId];
    if(stu){studentName=stu.name;studentId=APP.currentStudentId;studentSchool=stu.school||'';}
  }

  // 預先讀取所有 localStorage 草稿（批次下載時一次性讀取）
  var allDraftsCache={};
  try{allDraftsCache=JSON.parse(localStorage.getItem('form_drafts')||'{}');}catch(e){}

  doneForms.forEach(function(f,idx){
    var formKey=getFormKey(f.id);
    // 合併草稿 + APP.formData（確保 intern_cat、s_sign_date 等欄位不遺漏）
    var dDraft=Object.assign({},allDraftsCache[f.id]||{},allDraftsCache[formKey]||{});
    var d=Object.assign({},dDraft,APP.formData[f.id]||{},APP.formData[formKey]||{});
    var logs=(APP.historyLog[formKey]||[]).concat(APP.historyLog[f.id]||[]);
    // 去重 logs
    var logSeen={};
    var uniqueLogs=logs.filter(function(l){if(logSeen[l.ts])return false;logSeen[l.ts]=true;return true;});
    uniqueLogs.sort(function(a,b){return new Date(b.ts)-new Date(a.ts);});

    var sName=studentName||d['s_name']||'';
    var sSchool=studentSchool||d['school']||'';
    var lastSave=uniqueLogs.length>0?new Date(uniqueLogs[0].ts).toLocaleString('zh-TW'):'';

    // 頁首（每張表單都包在 form-page 內，列印時強制下一張表單從新頁開始）
    allHtml+='<div class="form-page">';
    allHtml+='<div class="header">';
    allHtml+='<div class="hosp">臺中榮民總醫院 胸腔部 呼吸治療科</div>';
    allHtml+='<div class="title">'+f.name+'</div>';
    allHtml+='<div class="sub">'+f.sub+'</div>';
    allHtml+='<div class="info-bar">';
    if(sName) allHtml+='學生：<b>'+sName+'</b>　';
    if(studentId) allHtml+='學號：'+studentId+'　';
    if(sSchool) allHtml+='學校：'+sSchool+'　';
    if(lastSave) allHtml+='最後儲存：'+lastSave;
    allHtml+='</div></div>';

    // 表單內容生成
    function val(key){var v=d[key];return(v!==undefined&&v!==null&&v!==''&&v!==false)?String(v):'';}
    function chk(key,options){
      // 點選型欄位：用 ✅ 顯示已選項目
      var v=val(key);
      if(!v) return '';
      return options.map(function(o){return(o===v?'✅ ':'☐ ')+o;}).join('　');
    }
    function row(label,v,isT){
      if(!v&&v!==0) return '';
      return '<tr class="'+(isT?'t-row':'s-row')+'"><td style="width:35%;font-weight:600;vertical-align:top;">'+label+'</td><td style="white-space:pre-wrap;">'+v+'</td></tr>';
    }
    function sec(title){return '<tr><td colspan="2" class="sec">'+title+'</td></tr>';}

    // 各表單特定欄位（已包含基本資料）
    var noOuterBasic=['F01A','F01B','F02','F04M','F04S','F05','F06M','F06S','F07M','F07S','F08','F09','F10A','F10B','F11','F12','F13','F14','D01','D02','D03','D04','E01','E02','E03','F15'];
    // F09：buildPDFContent 內已自帶完整版型（含 section-head/table/簽名），
    //     批次下載不再額外包 <table> 殼，也不重複附加簽名區，避免：
    //     (1) 巢狀 <table> 導致瀏覽器重排版面
    //     (2) 簽名重複出現兩次
    var skipOuterTable=['F09'];
    var skipExtraSignBlock=['F09'];
    if(skipOuterTable.indexOf(f.id)<0){
      allHtml+='<table>';
      if(noOuterBasic.indexOf(f.id)<0){
        allHtml+=sec('基本資料');
        allHtml+=row('學生姓名',val('s_name'),false);
        allHtml+=row('實習學校',val('school'),false);
        allHtml+=row('實習日期',val('s_date'),false);
        allHtml+=row('實習類別',val('intern_cat'),false);
      }
      allHtml+=buildPDFContent(f.id,f,d,val,row,sec,sName,sSchool,chk);
      allHtml+='</table>';
    } else {
      // F09：直接輸出 buildPDFContent 內容，不另加殼
      allHtml+=buildPDFContent(f.id,f,d,val,row,sec,sName,sSchool,chk);
    }

    // 簽名區（F09 已在 buildPDFContent 內處理完，不再重複）
    if(skipExtraSignBlock.indexOf(f.id)<0){
      allHtml+='<table><tr class="sec"><td colspan="4" class="sec">簽名區</td></tr>';
      allHtml+='<tr>';
      allHtml+='<td style="width:25%;font-weight:600;">學生簽名</td><td>'+(val('s_sign')||'—')+'</td>';
      allHtml+='<td style="width:25%;font-weight:600;">學生簽名日期</td><td>'+formatSignTs(val('s_sign_date'))+'</td>';
      allHtml+='</tr><tr class="t-row">';
      allHtml+='<td style="font-weight:600;">老師/指導老師簽名</td><td>'+(val('t_sign')||'—')+'</td>';
      allHtml+='<td style="font-weight:600;">老師簽名日期</td><td>'+formatSignTs(val('t_sign_date'))+'</td>';
      allHtml+='</tr></table>';
    }

    // 填寫歷史紀錄
    if(uniqueLogs.length>0){
      allHtml+='<div class="history">';
      allHtml+='<b>填寫歷史紀錄</b>（共'+uniqueLogs.length+'筆）<br>';
      uniqueLogs.forEach(function(l,i){
        var ts=new Date(l.ts).toLocaleString('zh-TW');
        allHtml+='<div class="history-row">#'+(uniqueLogs.length-i)+'&nbsp;&nbsp;'+ts+'&nbsp;&nbsp;'+l.roleLabel+'：'+l.name+'</div>';
      });
      allHtml+='</div>';
    }
    allHtml+='</div>'; // end form-page div
  });

  allHtml+='</body></html>';

  // ★ 改為「一鍵列印另存 PDF」流程
  // 一鍵下載檔名格式：實習學校-實習類別-學生姓名-學號-(全評核XX份表單)
  // 實習類別從任一張完成的表單抓取（同個學生通常為同一類別）
  var _batchInternCat='';
  for(var _bi=0; _bi<doneForms.length; _bi++){
    var _bk=getFormKey(doneForms[_bi].id);
    var _bd=Object.assign({},allDraftsCache[doneForms[_bi].id]||{},allDraftsCache[_bk]||{},APP.formData[doneForms[_bi].id]||{},APP.formData[_bk]||{});
    if(_bd.intern_cat){ _batchInternCat=_bd.intern_cat; break; }
  }
  var _batchParts=[];
  if(studentSchool)   _batchParts.push(studentSchool);
  if(_batchInternCat) _batchParts.push(_batchInternCat);
  if(studentName)     _batchParts.push(studentName);
  if(studentId)       _batchParts.push(studentId);
  _batchParts.push('(全評核'+doneForms.length+'份表單)');
  var batchFileName=_batchParts.join('-').replace(/[/\\:*?"<>|]/g,'_');
  var batchWin = window.open('', '_blank');
  if(!batchWin){
    toast('⚠ 瀏覽器阻擋了彈出視窗，請允許彈出後再試');
    return;
  }
  var batchAutoPrint = '<scr'+'ipt>window.addEventListener("load",function(){'+
    'setTimeout(function(){'+
      'document.title='+JSON.stringify(batchFileName)+';'+
      'window.print();'+
    '},500);'+
  '});</scr'+'ipt>';
  allHtml = allHtml.replace('</body>', batchAutoPrint+'</body>');
  batchWin.document.open();
  batchWin.document.write(allHtml);
  batchWin.document.close();
  toast('✓ 列印對話框即將開啟，請選擇「另存為 PDF」');
}

function renderStatusSection(filterStatus){
  APP.currentFormId='__status_'+filterStatus;
  renderSidebar();
  const mc=document.getElementById('main-content');
  const labelMap={done:'✅ 已完成',draft:'✏️ 草稿中（未完成）',new:'⭕ 未填寫'};
  const colorMap={done:'var(--green)',draft:'#0EA5E9',new:'var(--red)'};
  const filtered=FORMS.filter(function(f){return getStatus(f.id)===filterStatus;});
  let html='<div class="form-list-view">';
  var batchBtn=filterStatus==='done'
    ?`<button onclick="batchDownloadPDF()" style="padding:6px 16px;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:12px;cursor:pointer;font-weight:600;">⬇ 下載此分類所有 PDF</button>`
    :'';
  html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;">
    <button onclick="renderFormList()" style="padding:6px 14px;background:none;border:1px solid var(--border);border-radius:var(--r);font-size:12px;cursor:pointer;color:var(--ink3);">← 返回總覽</button>
    <div style="font-family:var(--ff-serif);font-size:18px;font-weight:600;">${labelMap[filterStatus]}</div>
    <span style="background:${colorMap[filterStatus]};color:#fff;padding:2px 10px;border-radius:999px;font-size:13px;font-weight:600;">${filtered.length} 份</span>
    ${batchBtn}
  </div>`;
  if(filtered.length===0){
    html+=`<div style="text-align:center;padding:3rem;color:var(--ink3);">此分類目前沒有表單</div>`;
  } else {
    html+='<div class="form-grid">';
    filtered.forEach(function(f){
      const st=getStatus(f.id);
      const dotC=st==='done'?'dot-done':st==='draft'?'dot-draft':'dot-new';
      const stLabel=st==='done'?'✅ 已完成':st==='draft'?'✏️ 草稿中（未完成）':'⭕ 未填寫';
      const stColor=st==='done'?'var(--green)':st==='draft'?'#0EA5E9':'var(--ink3)';
      const dlBtn=st==='done'
        ?`<button onclick="event.stopPropagation();checkAndDownloadPDF('${f.id}')" style="margin-top:8px;width:100%;padding:6px 0;background:var(--green);color:#fff;border:none;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;letter-spacing:.3px;" onmouseover="this.style.opacity='.8'" onmouseout="this.style.opacity='1'">⬇ 下載 PDF</button>`
        :'';
      html+=`<div class="form-card" onclick="openForm('${f.id}')" style="display:flex;flex-direction:column;">
        <div class="form-card-name" style="margin-top:4px;">${f.name}</div>
        <div class="form-card-sub">${f.sub}</div>
        <div class="form-card-meta" style="flex:1;"><span style="font-size:11px;color:${stColor};font-weight:500;">${stLabel}</span></div>
        ${dlBtn}
      </div>`;
    });
    html+='</div>';
  }
  html+='</div>';
  mc.innerHTML=html;
  // 點擊頂端狀態時，頁面永遠從最上方開始顯示
  try{ window.scrollTo({top:0, behavior:'auto'}); }catch(e){ window.scrollTo(0,0); }
}

window.debugStatus=function(id){
  if(!isDevMode()){ console.log('debug disabled'); return; }
  var formKey=getFormKey(id);
  var dById=APP.formData[id]||{};
  var dByKey=APP.formData[formKey]||{};
  var dFromDraft={};
  try{
    var allDrafts=JSON.parse(localStorage.getItem('form_drafts')||'{}');
    Object.keys(allDrafts).forEach(function(k){
      if(k===id||k===formKey||k.startsWith(id+'_')) Object.assign(dFromDraft,allDrafts[k]);
    });
  }catch(e){}
  var d=Object.assign({},dFromDraft,dById,dByKey);

  var allLogs=[];var logSeen={};
  [formKey,id].forEach(function(k){(APP.historyLog[k]||[]).forEach(function(l){if(!logSeen[l.ts]){logSeen[l.ts]=true;allLogs.push(l);}});});
  try{var sl=JSON.parse(localStorage.getItem('history_logs')||'{}');[formKey,id].forEach(function(k){(sl[k]||[]).forEach(function(l){if(!logSeen[l.ts]){logSeen[l.ts]=true;allLogs.push(l);}});});}catch(e){}

  var req=(REQUIRED_STUDENT_FIELDS[id]||[]).slice();
  var f=findForm(id);
  if(f&&f.roles==='both'&&req.indexOf('t_sign')<0) req.push('t_sign');
  // 直接使用 REQUIRED_STUDENT_FIELDS，不再硬寫 override（原本的硬寫已過時）

  function hasRealVal(v){if(v===undefined||v===null||v===false)return false;return String(v).trim()!=='';}
  function checkField(k){
    var v=d[k];if(!hasRealVal(v))return false;
    if(k==='s_date'){var sv=String(v).trim();if(sv.indexOf(' - ')>=0){var pts=sv.split(' - ');return pts.length===2&&pts[0].trim().length>=8&&pts[1].trim().length>=8;}return sv.length>=8;}
    if(k==='t_sign'||k==='s_sign'){var sv2=String(v).trim();return sv2!==''&&sv2!=='請選擇學生'&&sv2!=='請選擇老師'&&sv2!=='請選擇臨床老師'&&sv2!=='請選擇實習總指導教師'&&sv2!=='請選擇指導老師';}
    if(k==='t_sign_date'||k==='s_sign_date')return String(v).trim().length>=8;
    return true;
  }

  console.group('🔍 診斷：'+id+' | formKey='+formKey);
  console.log('📁 APP.formData[id]:', JSON.stringify(dById));
  console.log('📁 APP.formData[formKey]:', JSON.stringify(dByKey));
  console.log('📁 localStorage draft:', JSON.stringify(dFromDraft));
  console.log('📝 historyLog 合計:', allLogs.length,'筆');
  if(allLogs.length>0) console.log('   最新:', allLogs[0].role, allLogs[0].ts);
  console.log('');
  console.log('必填欄位 ('+req.length+'個):');
  req.forEach(function(k){
    var ok=checkField(k);
    console.log(' '+(ok?'✅':'❌')+' ['+k+'] =',JSON.stringify(d[k]));
  });
  var allOk=req.every(function(k){return checkField(k);});
  console.log('');
  console.log('→ 必填全滿:',allOk,'| 有記錄:',allLogs.length>0);
  console.log('→ getStatus:',getStatus(id));
  console.groupEnd();
};
